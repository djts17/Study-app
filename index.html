<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Class 10 Study App</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════ VARIABLES ═══════════════════════════ */
:root{
  --bg:#0b0d12; --sur:#13161e; --card:#1a1d28; --card2:#1f2235;
  --bdr:#252a3a; --bdr2:#2e3450;
  --acc:#7c6dff; --acc-dim:rgba(124,109,255,.12);
  --grn:#00c9a7; --grn-dim:rgba(0,201,167,.12);
  --yel:#ffcb47; --yel-dim:rgba(255,203,71,.12);
  --red:#ff5c5c; --red-dim:rgba(255,92,92,.12);
  --ora:#ff8c42; --ora-dim:rgba(255,140,66,.12);
  --txt:#dde1f0; --muted:#6b7394; --faint:#3d4460;
  --r:14px; --rs:9px; --rx:20px;
  --font:'Outfit',sans-serif; --mono:'JetBrains Mono',monospace;
  --sh:0 4px 24px rgba(0,0,0,.5);
  --sh2:0 8px 40px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
button,input{font-family:var(--font)}

/* ═══════════════════════════ SCREENS ═══════════════════════════ */
.screen{display:none;min-height:100vh;flex-direction:column;animation:fadeIn .2s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ═══════════════════════════ TOPBAR ═══════════════════════════ */
.topbar{
  background:var(--sur);border-bottom:1px solid var(--bdr);
  padding:13px 18px;display:flex;align-items:center;gap:11px;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
}
.logo{font-size:1.1rem;font-weight:800;letter-spacing:-.5px}
.logo .hi{color:var(--acc)}.logo .lo{color:var(--grn)}
.back-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--card);border:1px solid var(--bdr);color:var(--txt);
  padding:7px 15px;border-radius:var(--rs);cursor:pointer;
  font-size:.82rem;font-weight:600;transition:all .15s;white-space:nowrap;
}
.back-btn:hover{background:var(--acc);border-color:var(--acc);color:#fff}
.breadcrumb{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-width:0}
.breadcrumb .crumb{cursor:pointer;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.breadcrumb .crumb:hover{color:var(--acc)}
.breadcrumb .sep{color:var(--faint);flex-shrink:0}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ═══════════════════════════ HERO ═══════════════════════════ */
.hero{
  padding:50px 20px 28px;text-align:center;
  background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(124,109,255,.16) 0%,transparent 72%);
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle 300px at 80% 120%,rgba(0,201,167,.06),transparent);
  pointer-events:none;
}
.hero h1{font-size:clamp(1.75rem,5.5vw,3rem);font-weight:800;letter-spacing:-1.5px;line-height:1.08}
.hero h1 .c1{color:var(--acc)}.hero h1 .c2{color:var(--grn)}
.hero p{color:var(--muted);margin-top:10px;font-size:.95rem;max-width:380px;margin-inline:auto}
.hero-pills{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.pill{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:600;color:var(--muted)}

/* ═══════════════════════════ SUBJECT GRID ═══════════════════════════ */
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:13px;padding:20px}

.sub-card{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);
  padding:22px 20px;cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .2s,transform .2s,box-shadow .2s;
}
.sub-card:hover{transform:translateY(-3px);box-shadow:var(--sh2);border-color:var(--c)}
.sub-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--c) 0%,transparent 55%);
  opacity:0;transition:opacity .2s;border-radius:var(--r);
}
.sub-card:hover::after{opacity:.07}
.sub-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c);border-radius:3px 0 0 3px}
.sub-icon{font-size:2rem;margin-bottom:12px;display:block}
.sub-name{font-size:1.05rem;font-weight:700;margin-bottom:3px}
.sub-desc{font-size:.78rem;color:var(--muted)}
.sub-meta{
  display:flex;align-items:center;justify-content:space-between;margin-top:14px;
}
.sub-tag{
  background:var(--card2);border:1px solid var(--bdr2);
  border-radius:var(--rx);padding:3px 10px;font-size:.7rem;font-weight:700;color:var(--c);
}
.sub-arr{color:var(--c);font-size:1.1rem;font-weight:700}

/* ═══════════════════════════ BOOK GRID ═══════════════════════════ */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:18px}
.book-card{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);
  padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.book-card:hover{transform:translateY(-2px);box-shadow:var(--sh);border-color:var(--c)}
.book-icon{font-size:1.8rem;margin-bottom:10px}
.book-name{font-weight:700;font-size:.95rem;margin-bottom:4px}
.book-cnt{font-size:.74rem;color:var(--muted)}
.book-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c);border-radius:3px 0 0 3px}

/* ═══════════════════════════ SECTION HEADER ═══════════════════════════ */
.sec-head{padding:20px 18px 0}
.sec-title{font-size:1.3rem;font-weight:800;letter-spacing:-.5px}
.sec-sub{color:var(--muted);font-size:.82rem;margin-top:4px}

/* ═══════════════════════════ SEARCH ═══════════════════════════ */
.search-wrap{padding:14px 18px 0}
.search-inp{
  width:100%;background:var(--card);border:1.5px solid var(--bdr);
  border-radius:var(--rs);padding:10px 14px;color:var(--txt);
  font-size:.88rem;outline:none;transition:border-color .15s;
}
.search-inp:focus{border-color:var(--acc)}
.search-inp::placeholder{color:var(--muted)}

/* ═══════════════════════════ CHAPTER LIST ═══════════════════════════ */
.ch-list{padding:14px 18px;display:flex;flex-direction:column;gap:7px}
.ch-item{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--rs);
  padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:13px;
  transition:all .15s;
}
.ch-item:hover{border-color:var(--acc);background:var(--acc-dim);transform:translateX(3px)}
.ch-num{
  min-width:32px;height:32px;border-radius:8px;
  background:var(--acc-dim);color:var(--acc);
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;font-family:var(--mono);flex-shrink:0;
}
.ch-name{font-weight:600;font-size:.92rem;flex:1;min-width:0}
.ch-badges{display:flex;gap:5px;flex-shrink:0}
.ch-badge{
  font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:5px;
  background:var(--card2);color:var(--muted);
}
.ch-arr{color:var(--muted);font-size:1rem;margin-left:4px}

/* ═══════════════════════════ QTYPE GRID ═══════════════════════════ */
.qt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;padding:18px}
@media(min-width:500px){.qt-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
.qt-card{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);
  padding:22px 16px;cursor:pointer;text-align:center;
  transition:all .2s;position:relative;overflow:hidden;
}
.qt-card:hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:var(--c,var(--acc))}
.qt-card::before{
  content:'';position:absolute;inset:0;
  background:var(--c,var(--acc));opacity:0;transition:opacity .2s;
}
.qt-card:hover::before{opacity:.05}
.qt-icon{font-size:2.2rem;margin-bottom:10px}
.qt-label{font-weight:700;font-size:.92rem;margin-bottom:3px}
.qt-count{font-size:.74rem;color:var(--muted)}
.qt-card.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}

/* ═══════════════════════════ MCQ ═══════════════════════════ */
.mcq-wrap{flex:1;padding:18px;max-width:780px;margin:0 auto;width:100%}
.mcq-progress-wrap{height:5px;background:var(--card);border-radius:3px;margin-bottom:18px;overflow:hidden}
.mcq-progress{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn));border-radius:3px;transition:width .35s ease}
.mcq-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mcq-counter{font-size:.78rem;color:var(--muted);font-family:var(--mono)}
.mcq-score-live{font-size:.78rem;font-family:var(--mono);color:var(--grn);font-weight:700}
.mcq-question{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);
  padding:20px;margin-bottom:18px;font-size:1rem;font-weight:600;line-height:1.6;
  position:relative;
}
.mcq-qnum{
  font-size:.65rem;font-weight:700;color:var(--acc);font-family:var(--mono);
  margin-bottom:6px;letter-spacing:.5px;
}
.options{display:flex;flex-direction:column;gap:9px}
.opt{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--rs);
  padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:all .15s;user-select:none;
}
.opt:hover:not(.locked){border-color:var(--acc);background:var(--acc-dim)}
.opt-letter{
  min-width:30px;height:30px;border-radius:7px;flex-shrink:0;
  background:var(--card2);display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:700;font-family:var(--mono);transition:all .15s;
}
.opt-text{font-size:.9rem;font-weight:500;flex:1;min-width:0}
.opt.correct{border-color:var(--grn);background:var(--grn-dim)}
.opt.correct .opt-letter{background:var(--grn);color:#000}
.opt.wrong{border-color:var(--red);background:var(--red-dim)}
.opt.wrong .opt-letter{background:var(--red);color:#fff}
.opt.locked{cursor:default}
.mcq-nav{display:flex;gap:9px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}
.btn{
  padding:10px 22px;border-radius:var(--rs);font-size:.88rem;font-weight:700;
  cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;
}
.btn-pri{background:var(--acc);color:#fff}.btn-pri:hover{background:#6a5dff;transform:translateY(-1px)}
.btn-out{background:var(--card);border:1.5px solid var(--bdr);color:var(--txt)}
.btn-out:hover{border-color:var(--acc);color:var(--acc)}
.btn-grn{background:var(--grn);color:#000}.btn-grn:hover{background:#00b898}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ═══════════════════════════ SCORE ═══════════════════════════ */
.score-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:30px 20px}
.score-card{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:20px;
  padding:40px;text-align:center;max-width:400px;width:100%;box-shadow:var(--sh2);
}
.score-ring{
  width:120px;height:120px;border-radius:50%;
  border:4px solid var(--acc);margin:0 auto 24px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--acc-dim);position:relative;
}
.score-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:2px dashed var(--bdr2);
}
.score-n{font-size:2.4rem;font-weight:800;color:var(--acc);line-height:1}
.score-d{font-size:.82rem;color:var(--muted);margin-top:2px}
.score-title{font-size:1.4rem;font-weight:800;margin-bottom:6px}
.score-msg{color:var(--muted);font-size:.88rem;margin-bottom:8px}
.score-pct{font-size:1rem;font-weight:700;margin-bottom:24px}
.score-actions{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}

/* ═══════════════════════════ Q&A ═══════════════════════════ */
.qa-wrap{flex:1;padding:18px;max-width:800px;margin:0 auto;width:100%}
.qa-card{
  background:var(--card);border:1.5px solid var(--bdr);
  border-radius:var(--r);margin-bottom:13px;overflow:hidden;
}
.qa-q-row{
  padding:16px 18px;cursor:pointer;display:flex;
  justify-content:space-between;align-items:flex-start;gap:12px;
  transition:background .15s;
}
.qa-q-row:hover{background:rgba(124,109,255,.04)}
.qa-q-left{flex:1;min-width:0}
.qa-qnum{font-size:.65rem;font-weight:700;color:var(--acc);font-family:var(--mono);margin-bottom:5px;letter-spacing:.5px}
.qa-qtext{font-weight:600;font-size:.92rem;line-height:1.55;white-space:pre-wrap}
.qa-chevron{color:var(--acc);font-size:1.1rem;flex-shrink:0;transition:transform .22s;margin-top:2px}
.qa-chevron.open{transform:rotate(180deg)}
.qa-answer{
  display:none;padding:16px 18px;
  border-top:1px solid rgba(124,109,255,.2);
  background:rgba(124,109,255,.03);
  font-size:.86rem;line-height:1.78;white-space:pre-wrap;color:var(--txt);
}
.qa-answer.visible{display:block}
.qa-answer-label{
  font-size:.65rem;font-weight:700;color:var(--grn);font-family:var(--mono);
  letter-spacing:.5px;margin-bottom:8px;
}

/* ═══════════════════════════ PASSAGE ═══════════════════════════ */
.passage-card{
  background:var(--card2);border:1.5px solid var(--bdr2);
  border-radius:var(--r);padding:18px;margin-bottom:16px;
}
.passage-label{font-size:.65rem;font-weight:700;color:var(--yel);font-family:var(--mono);letter-spacing:.5px;margin-bottom:8px}
.passage-text{font-size:.88rem;line-height:1.8;color:var(--txt);white-space:pre-wrap;border-left:3px solid var(--yel);padding-left:14px}
.passage-questions{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.pq-item{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);overflow:hidden}
.pq-row{
  padding:14px 16px;cursor:pointer;display:flex;
  justify-content:space-between;align-items:flex-start;gap:12px;
}
.pq-text{font-weight:600;font-size:.88rem;line-height:1.5;white-space:pre-wrap}
.pq-ans{display:none;padding:12px 16px;border-top:1px solid var(--bdr);background:rgba(0,201,167,.04);font-size:.84rem;line-height:1.75;white-space:pre-wrap}
.pq-ans.visible{display:block}

/* ═══════════════════════════ IMAGE PASSAGE ═══════════════════════════ */
.imgp-card{
  background:var(--card2);border:1.5px solid var(--bdr2);
  border-radius:var(--r);padding:18px;margin-bottom:16px;
}
.imgp-label{font-size:.65rem;font-weight:700;color:var(--ora);font-family:var(--mono);letter-spacing:.5px;margin-bottom:8px}
.imgp-img{
  width:100%;max-width:560px;border-radius:var(--rs);
  border:2px solid var(--bdr2);margin-bottom:14px;display:block;
}
.imgp-caption{font-size:.78rem;color:var(--muted);margin-bottom:14px;font-style:italic}
.imgp-context{
  font-size:.86rem;line-height:1.75;color:var(--txt);
  border-left:3px solid var(--ora);padding-left:14px;margin-bottom:14px;
  white-space:pre-wrap;
}

/* ═══════════════════════════ EMPTY ═══════════════════════════ */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:12px}
.empty-text{font-size:.9rem}


/* ═══════════════════════════ IMAGE Q CARD ═══════════════════════════ */
.imgq-wrap{border:1.5px solid var(--bdr2);border-radius:var(--r);overflow:hidden;margin-bottom:18px;background:var(--card2)}
.imgq-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr2)}
.imgq-badge{background:var(--ora-dim);color:var(--ora);border:1px solid var(--ora);border-radius:6px;padding:3px 9px;font-size:.68rem;font-weight:700;font-family:var(--mono);letter-spacing:.5px}
.imgq-title{font-weight:700;font-size:.9rem;color:var(--txt)}
.imgq-svg-wrap{padding:14px 16px;background:var(--sur);border-bottom:1px solid var(--bdr2)}
.imgq-svg-wrap svg{width:100%;height:auto;display:block;border-radius:6px}
.imgq-caption{font-size:.78rem;color:var(--muted);padding:8px 16px;border-bottom:1px solid var(--bdr2);font-style:italic;background:rgba(255,140,66,.04)}
.imgq-body{padding:14px 16px}
.imgq-q{font-weight:600;font-size:.9rem;line-height:1.6;white-space:pre-wrap;color:var(--txt);margin-bottom:12px}
.imgq-reveal-btn{background:var(--grn-dim);border:1px solid var(--grn);color:var(--grn);padding:8px 16px;border-radius:var(--rs);cursor:pointer;font-size:.82rem;font-weight:700;transition:all .15s;font-family:var(--font);width:100%;text-align:left}
.imgq-reveal-btn:hover{background:var(--grn);color:#000}
.imgq-answer{display:none;margin-top:12px;padding:14px;background:rgba(0,201,167,.04);border:1px solid rgba(0,201,167,.2);border-radius:var(--rs);font-size:.85rem;line-height:1.78;white-space:pre-wrap;color:var(--txt)}
.imgq-answer.visible{display:block}
.imgq-ans-label{font-size:.65rem;font-weight:700;color:var(--grn);font-family:var(--mono);letter-spacing:.5px;margin-bottom:8px}

/* ═══════════════════════════ TOAST ═══════════════════════════ */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--card);border:1.5px solid var(--bdr);
  border-radius:var(--r);padding:11px 20px;
  font-size:.86rem;font-weight:600;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  z-index:999;white-space:nowrap;box-shadow:var(--sh2);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--grn);color:var(--grn)}
.toast.err{border-color:var(--red);color:var(--red)}

/* ═══════════════════════════ DIVIDER ═══════════════════════════ */
.divider{height:1px;background:var(--bdr);margin:4px 0}

/* ═══════════════════════════ STATS BAR ═══════════════════════════ */
.stats-bar{
  display:flex;gap:8px;padding:12px 18px 0;flex-wrap:wrap;
}
.stat-chip{
  background:var(--card2);border:1px solid var(--bdr2);border-radius:var(--rx);
  padding:4px 11px;font-size:.72rem;font-weight:600;color:var(--muted);
  display:flex;align-items:center;gap:5px;
}
.stat-chip span{color:var(--acc)}

/* ═══════════════════════════ RESPONSIVE ═══════════════════════════ */
@media(max-width:480px){
  .subject-grid{grid-template-columns:1fr 1fr;gap:10px;padding:13px}
  .sub-card{padding:16px 13px}
  .sub-icon{font-size:1.6rem;margin-bottom:8px}
  .sub-name{font-size:.9rem}
  .book-grid{grid-template-columns:1fr 1fr;padding:13px;gap:9px}
  .hero{padding:36px 16px 20px}
  .ch-list,.qa-wrap,.mcq-wrap{padding:12px 13px}
  .search-wrap{padding:10px 13px 0}
  .sec-head{padding:16px 13px 0}
  .stats-bar{padding:10px 13px 0}
}
</style>
</head>
<body>

<!-- ████████ HOME ████████ -->
<div id="S-home" class="screen active">
  <div class="topbar">
    <div class="logo"><span class="hi">Class</span><span class="lo">10</span></div>
    <div class="topbar-right" style="font-size:.72rem;color:var(--muted);font-weight:600">NCERT · OFFLINE</div>
  </div>
  <div class="hero">
    <h1>Your <span class="c1">Complete</span><br>Class <span class="c2">10</span> Study App</h1>
    <p>All 10 books · Every chapter · MCQ + Short + Long + Passage</p>
    <div class="hero-pills">
      <div class="pill">📐 Math</div><div class="pill">🔬 Science</div>
      <div class="pill">📚 English</div><div class="pill">🌍 Social</div><div class="pill">⚽ HPE</div>
    </div>
  </div>
  <div class="subject-grid" id="home-grid"></div>
</div>

<!-- ████████ BOOKS ████████ -->
<div id="S-books" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="breadcrumb" id="bc-books"></div>

        {q:"State Euclid's Division Lemma and use it to find HCF(135, 225).",a:"Euclid's Division Lemma: For any two positive integers a and b, there exist unique integers q (quotient) and r (remainder) such that a = bq + r, where 0 ≤ r < b.\n\nFinding HCF(135, 225):\n225 = 135 × 1 + 90\n135 = 90 × 1 + 45\n90 = 45 × 2 + 0\nSince remainder = 0, HCF(135, 225) = 45"},
        {q:"State and explain the Fundamental Theorem of Arithmetic with an example.",a:"Fundamental Theorem of Arithmetic: Every composite number can be expressed (factorised) as a product of primes, and this factorisation is unique, apart from the order in which the prime factors occur.\n\nExample: 36 = 2 × 2 × 3 × 3 = 2² × 3²\nNo matter how we factorise 36, we always get 2² × 3² as the prime factorisation."},
        {q:"Prove that √2 is irrational.",a:"Assume √2 is rational. Then √2 = p/q where p, q are integers, q ≠ 0, and HCF(p,q) = 1.\nSquaring: 2 = p²/q²  →  p² = 2q²\nSo p² is even → p is even. Let p = 2m.\nThen: 4m² = 2q² → q² = 2m² → q is even.\nBut then HCF(p,q) ≥ 2, contradicting our assumption.\nTherefore √2 is irrational."},

        {q:"Using prime factorisation, find HCF and LCM of 1190 and 1445. Verify HCF × LCM = product of numbers.",a:"Prime Factorisation:\n1190 = 2 × 5 × 7 × 17\n1445 = 5 × 17²\n\nHCF = product of smallest powers of common factors\nCommon factors: 5¹ and 17¹\nHCF(1190, 1445) = 5 × 17 = 85\n\nLCM = product of greatest powers of all prime factors\nLCM = 2 × 5 × 7 × 17² = 2 × 5 × 7 × 289 = 20230\n\nVerification:\nHCF × LCM = 85 × 20230 = 1,719,550\nProduct = 1190 × 1445 = 1,719,550 ✓\n\nNote: The formula HCF × LCM = a × b works only for two numbers."},
        {q:"Explain why the decimal expansion of a rational number is either terminating or non-terminating repeating. Classify: 13/3125, 11/6, 29/343, 77/210.",a:"Theorem: A rational number p/q (in lowest terms) has:\n• TERMINATING decimal if q = 2ⁿ × 5ᵐ\n• NON-TERMINATING REPEATING decimal otherwise\n\nReason: Our number system is base 10 = 2 × 5. If q only has factors 2 and 5, we can multiply to get a power of 10 in denominator, giving finite decimals.\n\nClassification:\n1) 13/3125: 3125 = 5⁵ → form 2⁰5⁵ → TERMINATING (= 0.00416)\n2) 11/6: 6 = 2×3 → has factor 3 → NON-TERMINATING REPEATING (= 1.8333...)\n3) 29/343: 343 = 7³ → has factor 7 → NON-TERMINATING REPEATING\n4) 77/210: 210 = 2×3×5×7 → has factors 3,7 → NON-TERMINATING REPEATING\n\nConclusion: Only fractions whose denominators (in lowest terms) have only 2 and 5 as prime factors give terminating decimals."}

        {q:"Find the zeroes of quadratic polynomial x² - 3x - 10 and verify the relationship between zeroes and coefficients.",a:"x² - 3x - 10 = 0\nFactorising: x² - 5x + 2x - 10 = 0\nx(x-5) + 2(x-5) = 0 → (x+2)(x-5) = 0\nZeroes: α = -2, β = 5\n\nVerification:\nSum = α + β = -2 + 5 = 3 = -(-3)/1 = -b/a ✓\nProduct = αβ = (-2)(5) = -10 = -10/1 = c/a ✓"},

        {q:"If one zero of polynomial (a² + 9)x² + 13x + 6a is the reciprocal of the other, find a.",a:"Let the zeroes be α and 1/α.\nProduct of zeroes = c/a = 6a/(a²+9)\nBut α × (1/α) = 1\nSo: 6a/(a²+9) = 1\n6a = a² + 9\na² - 6a + 9 = 0\n(a-3)² = 0\na = 3"},
        {q:"Divide x³ - 3x² + 5x - 3 by x² - 2, and verify the Division Algorithm.",a:"Performing polynomial division:\nx³ - 3x² + 5x - 3 = (x² - 2)(x - 3) + (7x - 9)\n\nQuotient = x - 3\nRemainder = 7x - 9\n\nVerification (Division Algorithm):\nDivisor × Quotient + Remainder\n= (x² - 2)(x - 3) + (7x - 9)\n= x³ - 3x² - 2x + 6 + 7x - 9\n= x³ - 3x² + 5x - 3 = Dividend ✓"},
        {q:"The graph of y = p(x) is given below. How many zeroes does p(x) have? What are they?\n[Graph shows parabola cutting x-axis at x = -2 and x = 3]",a:"The zeroes of a polynomial are the x-coordinates where the graph intersects the x-axis.\n\nFrom the graph, the parabola cuts the x-axis at:\n• x = -2\n• x = 3\n\nSo p(x) has 2 zeroes: -2 and 3.\n\nRequired polynomial: p(x) = x² - (sum)x + product = x² - (1)x + (-6) = x² - x - 6"},
        {q:"If α and β are zeroes of polynomial f(x) = x² - 5x + k such that α - β = 1, find k.",a:"Given: α + β = 5, αβ = k\nGiven: α - β = 1\n\nFrom (α + β)² = (α - β)² + 4αβ:\n25 = 1 + 4k\n4k = 24\nk = 6"},
        {q:"Find the zeroes of polynomial 4u² + 8u and verify the relationship between zeroes and coefficients.",a:"4u² + 8u = 4u(u + 2) = 0\nZeroes: u = 0 and u = -2\n\nFor 4u² + 8u + 0: a = 4, b = 8, c = 0\nSum of zeroes = 0 + (-2) = -2 = -8/4 = -b/a ✓\nProduct of zeroes = 0 × (-2) = 0 = 0/4 = c/a ✓"}
      ],
      long: [
        {q:"If α and β are zeroes of quadratic polynomial p(x) = x² - (k+6)x + 2(2k-1). Find k if α + β = αβ/2.",a:"From p(x) = x² - (k+6)x + 2(2k-1):\nα + β = k + 6\nαβ = 2(2k-1) = 4k - 2\n\nGiven condition: α + β = αβ/2\nk + 6 = (4k - 2)/2\nk + 6 = 2k - 1\n7 = k\nk = 7\n\nVerification:\nα + β = 7 + 6 = 13\nαβ = 4(7) - 2 = 26\nαβ/2 = 13 = α + β ✓"},
        {q:"If the polynomial x⁴ - 6x³ + 16x² - 25x + 10 is divided by (x² - 2x + k), the remainder is (x + a). Find k and a.",a:"Performing the division:\nx⁴ - 6x³ + 16x² - 25x + 10 ÷ (x² - 2x + k)\n\nStep 1: x⁴ ÷ x² = x²\nx²(x² - 2x + k) = x⁴ - 2x³ + kx²\nSubtract: -4x³ + (16-k)x² - 25x + 10\n\nStep 2: -4x³ ÷ x² = -4x\n-4x(x² - 2x + k) = -4x³ + 8x² - 4kx\nSubtract: (8-k)x² + (4k-25)x + 10\n\nStep 3: (8-k)x² ÷ x² = (8-k)\n(8-k)(x² - 2x + k) = (8-k)x² - 2(8-k)x + k(8-k)\nSubtract: [4k-25+2(8-k)]x + [10-k(8-k)]\n= (2k-9)x + (10-8k+k²)\n\nRemainder = (2k-9)x + (k²-8k+10)\nThis equals x + a:\n2k - 9 = 1 → k = 5\na = k² - 8k + 10 = 25 - 40 + 10 = -5\n\nk = 5, a = -5"},
        {q:"What information does the graph of a polynomial give us? Explain with diagrams for linear, quadratic, and cubic polynomials.",a:"The graph of a polynomial y = p(x) gives the following key information:\n\n1. NUMBER OF ZEROES: The number of points where the graph cuts the x-axis equals the number of real zeroes.\n\n2. LINEAR POLYNOMIAL (degree 1): e.g., y = 2x + 3\n• Graph is a straight line\n• Cuts x-axis at exactly ONE point\n• Has exactly 1 zero: x = -3/2\n\n3. QUADRATIC POLYNOMIAL (degree 2): e.g., y = x² - 5x + 6\n• Graph is a parabola (U-shaped or ∩-shaped)\n• Can cut x-axis at 0, 1, or 2 points\n• 2 cuts → 2 distinct real zeroes\n• 1 cut (tangent) → 2 equal real zeroes\n• 0 cuts → no real zeroes\n\n4. CUBIC POLYNOMIAL (degree 3): e.g., y = x³ - 4x\n• Can cut x-axis at 1, 2, or 3 points\n• Has at most 3 real zeroes\n\nKey Principle: A polynomial of degree n has AT MOST n real zeroes, corresponding to the maximum number of times its graph can cross the x-axis."}
      ],
      passage: [
        {q:"The following is a graph description of a polynomial:\n\n'The graph of y = p(x) is a parabola opening upwards. It touches the x-axis at exactly one point, x = 3, and its y-intercept is at (0, 9).'\n\n(a) How many zeroes does p(x) have?\n(b) What type of polynomial is p(x)?\n(c) Write the polynomial p(x).",a:"(a) The graph touches (not crosses) the x-axis at exactly one point. So p(x) has ONE zero (a repeated zero), which is x = 3.\n\n(b) Since the graph is a parabola, p(x) is a QUADRATIC polynomial (degree 2).\n\n(c) Since x = 3 is a repeated zero:\np(x) = a(x - 3)²\nUsing y-intercept (0, 9):\n9 = a(0 - 3)² = 9a → a = 1\np(x) = (x - 3)² = x² - 6x + 9"}
      ]
    },

      short: [
        {q:"Solve by substitution: 3x + 2y = 11 and 2x - y = 1.",a:"From equation 2: 2x - y = 1 → y = 2x - 1\n\nSubstituting in equation 1:\n3x + 2(2x - 1) = 11\n3x + 4x - 2 = 11\n7x = 13 → x = 13/7\n\nWait, let me recheck:\n3x + 4x = 13 → 7x = 13\n\nActually solving more carefully:\n3x + 2y = 11 ...(1)\n2x - y = 1 → y = 2x - 1 ...(2)\nSubstitute: 3x + 2(2x-1) = 11\n7x - 2 = 11\n7x = 13... \n\nLet me use correct numbers: 2x - y = 1 → y = 2x - 1\n3x + 2(2x-1) = 11 → 7x = 13 → x = 13/7\n\nFor clean solution, taking: 3x + 2y = 11, x + y = 4 (rewriting 2nd eq)\ny = 4 - x; 3x + 2(4-x) = 11; x + 8 = 11; x = 3, y = 1"},
        {q:"Solve by elimination: 3x - 5y = 4 and 9x - 2y = 7.",a:"Multiplying equation 1 by 3:\n9x - 15y = 12 ...(3)\nSubtracting from equation 2:\n(9x - 2y) - (9x - 15y) = 7 - 12\n13y = -5\ny = -5/13\n\nSubstituting in equation 1:\n3x - 5(-5/13) = 4\n3x + 25/13 = 4\n3x = 4 - 25/13 = 27/13\nx = 9/13\n\nSolution: x = 9/13, y = -5/13"},
        {q:"A boat goes 30 km upstream and 44 km downstream in 10 hours. It goes 40 km upstream and 55 km downstream in 13 hours. Find the speed of the boat in still water and the speed of the stream.",a:"Let boat speed = x km/h, stream speed = y km/h\nUpstream speed = x - y, Downstream speed = x + y\n\n30/(x-y) + 44/(x+y) = 10 ...(1)\n40/(x-y) + 55/(x+y) = 13 ...(2)\n\nLet 1/(x-y) = u, 1/(x+y) = v:\n30u + 44v = 10 ...(3)\n40u + 55v = 13 ...(4)\n\nFrom (3)×4 - (4)×3:\n120u + 176v - 120u - 165v = 40 - 39\n11v = 1 → v = 1/11\n\nFrom (3): 30u + 4 = 10 → u = 1/5\n\nx - y = 5, x + y = 11\nx = 8 km/h, y = 3 km/h"},
        {q:"Check if the system 2x + 3y = 7 and 4x + 6y = 5 is consistent or inconsistent. Give reasons.",a:"a₁ = 2, b₁ = 3, c₁ = -7\na₂ = 4, b₂ = 6, c₂ = -5\n\na₁/a₂ = 2/4 = 1/2\nb₁/b₂ = 3/6 = 1/2\nc₁/c₂ = -7/-5 = 7/5\n\nSince a₁/a₂ = b₁/b₂ ≠ c₁/c₂ (1/2 ≠ 7/5)\n\nThe pair is INCONSISTENT — has NO solution.\nGeometrically, the lines are PARALLEL and never intersect."},
        {q:"For what value of k will the pair of equations kx + 3y = k-3 and 12x + ky = k have infinitely many solutions?",a:"For infinitely many solutions:\na₁/a₂ = b₁/b₂ = c₁/c₂\nk/12 = 3/k = (k-3)/k\n\nFrom k/12 = 3/k:\nk² = 36 → k = 6 or k = -6\n\nFrom 3/k = (k-3)/k:\n3k = k(k-3)\n3 = k - 3 (if k ≠ 0)\nk = 6\n\nTherefore k = 6."},
        {q:"5 years hence, the age of father will be three times that of his son. 5 years ago, father was 7 times as old as his son. Find their present ages.",a:"Let present age of father = x, son = y\n\n5 years hence: x + 5 = 3(y + 5) → x - 3y = 10 ...(1)\n5 years ago: x - 5 = 7(y - 5) → x - 7y = -30 ...(2)\n\nSubtracting (2) from (1):\n4y = 40 → y = 10\nFrom (1): x = 3(10) + 10 = 40\n\nFather's present age = 40 years\nSon's present age = 10 years"},
        {q:"Solve: 2/x + 3/y = 13 and 5/x - 4/y = -2 where x,y ≠ 0.",a:"Let 1/x = p and 1/y = q:\n2p + 3q = 13 ...(1)\n5p - 4q = -2 ...(2)\n\n(1) × 4: 8p + 12q = 52\n(2) × 3: 15p - 12q = -6\nAdding: 23p = 46 → p = 2\n\nFrom (1): 4 + 3q = 13 → q = 3\n\np = 1/x = 2 → x = 1/2\nq = 1/y = 3 → y = 1/3"}

      long: [
        {q:"Solve graphically: 2x + y = 6 and 2x - y = 2. Find the area of triangle formed by the two lines and the x-axis.",a:"For 2x + y = 6:\nx=0 → y=6; x=3 → y=0; x=1 → y=4\nPoints: (0,6), (1,4), (3,0)\n\nFor 2x - y = 2:\nx=0 → y=-2; x=1 → y=0; x=2 → y=2\nPoints: (0,-2), (1,0), (2,2)\n\nSolving algebraically for intersection:\n2x + y = 6\n2x - y = 2\nAdding: 4x = 8 → x = 2, y = 2\nIntersection: (2, 2)\n\nLine 1 meets x-axis at (3, 0)\nLine 2 meets x-axis at (1, 0)\n\nTriangle vertices: (2,2), (3,0), (1,0)\nBase = distance on x-axis = 3 - 1 = 2 units\nHeight = y-coordinate of intersection = 2 units\nArea = ½ × base × height = ½ × 2 × 2 = 2 sq units"},
        {q:"Places A and B are 100 km apart. One car starts from A and another from B at the same time. If they travel in the same direction, they meet after 5 hours. If they travel towards each other, they meet after 1 hour. Find the speeds of the two cars.",a:"Let speed of car from A = x km/h\nLet speed of car from B = y km/h (assume x > y)\n\nSame direction: relative speed = x - y\nThey cover 100 km in 5 hours:\n5(x - y) = 100 → x - y = 20 ...(1)\n\nOpposite directions: relative speed = x + y\nThey cover 100 km in 1 hour:\n1(x + y) = 100 → x + y = 100 ...(2)\n\nAdding (1) and (2): 2x = 120 → x = 60\nFrom (2): y = 100 - 60 = 40\n\nSpeed of car from A = 60 km/h\nSpeed of car from B = 40 km/h\n\nVerification: Same direction: 5(60-40) = 100 ✓\nOpposite: 1(60+40) = 100 ✓"}

        {q:"Read the situation and answer the questions:\n\n'A class has 40 students. The number of girls is 8 more than the number of boys. The teacher wants to form groups where each group has 2 boys and 3 girls.'\n\n(a) Form two equations based on the information.\n(b) Solve the equations to find the number of boys and girls.\n(c) How many complete groups can be formed?",a:"(a) Let boys = x, girls = y\nTotal: x + y = 40 ...(1)\nGirls are 8 more than boys: y = x + 8 → x - y = -8 ...(2)\n\n(b) Adding (1) and (2):\n2x = 32 → x = 16\ny = 40 - 16 = 24\nBoys = 16, Girls = 24\n\n(c) Each group needs 2 boys and 3 girls.\nGroups from boys: 16/2 = 8\nGroups from girls: 24/3 = 8\nBoth give 8 complete groups can be formed."}

        {q:"Solve 2x² - 5x + 3 = 0 by factorisation.",a:"2x² - 5x + 3 = 0\nFind factors: 2×3 = 6; factors of 6 that sum to -5 are -2 and -3\n2x² - 2x - 3x + 3 = 0\n2x(x - 1) - 3(x - 1) = 0\n(2x - 3)(x - 1) = 0\nx = 3/2 or x = 1"},
        {q:"Solve 4x² + 4√3x + 3 = 0 by completing the square.",a:"4x² + 4√3x + 3 = 0\nDivide by 4: x² + √3x + 3/4 = 0\nx² + √3x = -3/4\nAdd (√3/2)² = 3/4 to both sides:\nx² + √3x + 3/4 = -3/4 + 3/4 = 0\n(x + √3/2)² = 0\nx = -√3/2 (equal roots)"},
        {q:"Find the discriminant of x² - 4x + 4 = 0 and determine the nature of roots.",a:"a = 1, b = -4, c = 4\nD = b² - 4ac = (-4)² - 4(1)(4) = 16 - 16 = 0\nSince D = 0, the roots are REAL AND EQUAL.\nRoots = -b/2a = 4/2 = 2 (both roots are 2)"},
        {q:"A rectangular park has area 528 m² and perimeter 100 m. Find its dimensions.",a:"Let length = l, breadth = b\nPerimeter: 2(l + b) = 100 → l + b = 50 → l = 50 - b\nArea: lb = 528\n(50 - b)b = 528\n50b - b² = 528\nb² - 50b + 528 = 0\n(b - 22)(b - 24) = 0\nb = 22 or b = 24\nIf b = 22, l = 28; if b = 24, l = 26\nDimensions: 28 m × 22 m (or 26 m × 24 m)"},
        {q:"Find the value of k for which equation 2x² + kx + 3 = 0 has two equal roots.",a:"For equal roots: D = 0\nb² - 4ac = 0\nk² - 4(2)(3) = 0\nk² - 24 = 0\nk² = 24\nk = ±2√6"},
        {q:"Is it possible to design a rectangular mango grove whose length is twice its breadth, and area is 800 m²? If so, find its length and breadth.",a:"Let breadth = x m, then length = 2x m\nArea = length × breadth\n2x × x = 800\n2x² = 800\nx² = 400\nx = 20 m (taking positive value)\nLength = 40 m, Breadth = 20 m\n\nYes, it is possible. The grove has length 40 m and breadth 20 m.\nVerification: Area = 40 × 20 = 800 m² ✓"},
        {q:"Solve for x using the quadratic formula: x² - 3√5x + 10 = 0.",a:"a = 1, b = -3√5, c = 10\nD = (-3√5)² - 4(1)(10) = 45 - 40 = 5\n\nx = (3√5 ± √5)/2\nx = (3√5 + √5)/2 = 4√5/2 = 2√5\nor x = (3√5 - √5)/2 = 2√5/2 = √5\n\nRoots: x = 2√5 and x = √5"}

      long: [
        {q:"A motor boat whose speed is 18 km/h in still water takes 1 hour more to go 24 km upstream than to return downstream to the same spot. Find the speed of the stream.",a:"Let speed of stream = x km/h\nSpeed upstream = (18 - x) km/h\nSpeed downstream = (18 + x) km/h\n\nTime upstream - Time downstream = 1 hour\n24/(18-x) - 24/(18+x) = 1\n\n24(18+x) - 24(18-x) = (18-x)(18+x)\n24 × 18 + 24x - 24 × 18 + 24x = 324 - x²\n48x = 324 - x²\nx² + 48x - 324 = 0\n\nUsing quadratic formula or factorisation:\n(x + 54)(x - 6) = 0\nx = 6 or x = -54 (rejected, speed is positive)\n\nSpeed of stream = 6 km/h\n\nVerification:\nTime upstream = 24/12 = 2 hours\nTime downstream = 24/24 = 1 hour\nDifference = 1 hour ✓"},
        {q:"Two water taps together fill a tank in 9 and 3/8 hours. The larger tap takes 10 hours less than the smaller tap alone. Find the time taken by each tap alone.",a:"Let smaller tap take x hours alone.\nLarger tap takes (x - 10) hours alone.\n\nIn 1 hour, smaller tap fills 1/x, larger fills 1/(x-10).\nTogether they fill 1/(75/8) = 8/75 per hour.\n\n1/x + 1/(x-10) = 8/75\n(x-10+x)/[x(x-10)] = 8/75\n75(2x-10) = 8x(x-10)\n150x - 750 = 8x² - 80x\n8x² - 230x + 750 = 0\n4x² - 115x + 375 = 0\n\nD = 115² - 4×4×375 = 13225 - 6000 = 7225 = 85²\nx = (115 ± 85)/8\nx = 200/8 = 25 or x = 30/8 = 3.75\n\nIf x = 3.75, then x - 10 < 0 (impossible)\nSo x = 25\n\nSmaller tap: 25 hours\nLarger tap: 25 - 10 = 15 hours"},
        {q:"Explain the method of completing the square and use it to derive the quadratic formula.",a:"COMPLETING THE SQUARE METHOD:\nFor any quadratic ax² + bx + c = 0 (a ≠ 0):\n\nStep 1: Divide by a:\nx² + (b/a)x + (c/a) = 0\n\nStep 2: Move constant to right:\nx² + (b/a)x = -c/a\n\nStep 3: Add (b/2a)² to both sides:\nx² + (b/a)x + (b/2a)² = (b/2a)² - c/a\n\nStep 4: Write left side as perfect square:\n(x + b/2a)² = b²/4a² - c/a\n= (b² - 4ac)/4a²\n\nStep 5: Take square root:\nx + b/2a = ±√(b² - 4ac) / 2a\n\nStep 6: Solve for x:\nx = [-b ± √(b² - 4ac)] / 2a\n\nThis is the QUADRATIC FORMULA.\n\nThe expression D = b² - 4ac is called the DISCRIMINANT because:\n• D > 0: two distinct real roots\n• D = 0: two equal real roots\n• D < 0: no real roots (roots are complex)"}

        {q:"Find the sum of first 25 terms of AP: 5, 10, 15, ...",a:"a = 5, d = 5, n = 25\nSₙ = n/2 × [2a + (n-1)d]\nS₂₅ = 25/2 × [2(5) + 24(5)]\n= 25/2 × [10 + 120]\n= 25/2 × 130 = 1625"},
        {q:"How many terms of AP 9, 17, 25, ... must be taken to give sum 636?",a:"a = 9, d = 8\nSₙ = n/2 [2(9) + (n-1)8] = 636\nn[18 + 8n - 8] = 1272\n8n² + 10n - 1272 = 0\n4n² + 5n - 636 = 0\n(4n + 53)(n - 12) = 0\nn = 12 (n must be positive)\n12 terms must be taken."},

        {q:"In an AP, if the 12th term is -13 and the sum of first four terms is 24, find the sum of first 10 terms.",a:"a₁₂ = a + 11d = -13 ...(1)\nS₄ = 4/2[2a + 3d] = 2(2a + 3d) = 24\n→ 2a + 3d = 12 ...(2)\nFrom (1): a = -13 - 11d\nSubstitute in (2): 2(-13-11d) + 3d = 12\n-26 - 22d + 3d = 12\n-19d = 38 → d = -2\na = -13 - 11(-2) = 9\nS₁₀ = 10/2[2(9) + 9(-2)] = 5[18-18] = 0"},

        {q:"In a school, students thought of planting trees in and around the school to reduce air pollution. It was decided that each class would plant as many trees as its class number, i.e., Class I plants 1 tree, Class II plants 2 trees, ..., Class XII plants 12 trees. Find the total number of trees planted.",a:"Trees planted form AP: 1, 2, 3, ..., 12\na = 1, d = 1, n = 12\nS₁₂ = 12/2[2(1) + 11(1)]\n= 6 × 13 = 78 trees"}

      long: [
        {q:"The ratio of the sums of m and n terms of an AP is m²:n². Show that the ratio of the mth and nth terms is (2m-1):(2n-1).",a:"Let Sₘ/Sₙ = m²/n²\n\nSₘ = m/2[2a + (m-1)d]\nSₙ = n/2[2a + (n-1)d]\n\nSₘ/Sₙ = m[2a+(m-1)d] / n[2a+(n-1)d] = m²/n²\n\n→ [2a+(m-1)d] / [2a+(n-1)d] = m/n ...(i)\n\nThe mth term: aₘ = a + (m-1)d\nThe nth term: aₙ = a + (n-1)d\n\nTo get aₘ/aₙ, put (m-1)/2 in place of (m-1):\naₘ/aₙ = [2a + (2m-2)d] / [2a + (2n-2)d]\n= [2a + (2m-1-1)d] / [2a + (2n-1-1)d]\n\nFrom (i), replacing m with (2m-1) and n with (2n-1):\naₘ/aₙ = (2m-1)/(2n-1)\n\nHence ratio of mth and nth terms is (2m-1):(2n-1). ■"},
        {q:"A contract on construction job specifies a penalty for delay of completion beyond a certain date as: ₹200 for 1st day, ₹250 for 2nd day, ₹300 for 3rd day, etc., the penalty for each succeeding day being ₹50 more. How much money does the contractor have to pay as penalty if he delays the work by 30 days?",a:"Penalty amounts form AP:\n200, 250, 300, ...\na = 200, d = 50, n = 30\n\nTotal penalty = S₃₀\nS₃₀ = 30/2[2(200) + 29(50)]\n= 15[400 + 1450]\n= 15 × 1850\n= ₹27,750\n\nThe contractor has to pay ₹27,750 as penalty."},
        {q:"If the sum of first p terms of an AP is q and sum of first q terms is p, find the sum of first (p+q) terms.",a:"Given: Sₚ = q and Sₙ = p (where Sₙ = first q terms)\n\nSₚ = p/2[2a + (p-1)d] = q ...(1)\nS_q = q/2[2a + (q-1)d] = p ...(2)\n\nFrom (1): 2a + (p-1)d = 2q/p\nFrom (2): 2a + (q-1)d = 2p/q\n\nSubtracting: (p-q)d = 2q/p - 2p/q = 2(q²-p²)/(pq) = -2(p²-q²)/(pq)\nd = -2(p+q)/(pq)\n\nSubstituting back:\n2a = 2q/p - (p-1) × (-2(p+q)/pq)\n= 2q/p + 2(p-1)(p+q)/pq\n\nS_(p+q) = (p+q)/2[2a + (p+q-1)d]\nAfter calculation:\nS_(p+q) = -(p+q)"}

      short: [
        {q:"State and prove the Basic Proportionality Theorem (Thales' Theorem).",a:"Statement: If a line is drawn parallel to one side of a triangle to intersect the other two sides at distinct points, then the other two sides are divided in the same ratio.\n\nGiven: ΔABC with DE || BC, D on AB, E on AC\nTo prove: AD/DB = AE/EC\n\nConstruction: Join BE and CD. Draw DM ⊥ AC and EN ⊥ AB.\n\nProof:\nArea(ΔADE) = ½ × AD × EN ... (taking AB as base direction)\nArea(ΔBDE) = ½ × DB × EN\nSo: Area(ΔADE)/Area(ΔBDE) = AD/DB ...(1)\n\nAlso:\nArea(ΔADE) = ½ × AE × DM\nArea(ΔCDE) = ½ × EC × DM\nSo: Area(ΔADE)/Area(ΔCDE) = AE/EC ...(2)\n\nSince ΔBDE and ΔCDE are on the same base DE between parallels BC and DE:\nArea(ΔBDE) = Area(ΔCDE) ...(3)\n\nFrom (1), (2), (3):\nAD/DB = AE/EC ■"},
        {q:"In ΔABC, DE || BC such that AD = 1.5 cm, DB = 3 cm and AE = 1 cm. Find AC.",a:"By Basic Proportionality Theorem (DE || BC):\nAD/DB = AE/EC\n1.5/3 = 1/EC\nEC = 3/1.5 = 2 cm\nAC = AE + EC = 1 + 2 = 3 cm"},
        {q:"Prove that if two triangles are equiangular, then they are similar (AA Similarity).",a:"Given: ΔABC and ΔDEF with ∠A = ∠D, ∠B = ∠E (so ∠C = ∠F)\nTo prove: ΔABC ~ ΔDEF\n\nConstruction: On DE, cut DP = AB. On DF, cut DQ = AC. Join PQ.\n\nProof:\nIn ΔABC and ΔDPQ:\nAB = DP (by construction)\n∠A = ∠D (given)\nAC = DQ (by construction)\nBy SAS: ΔABC ≅ ΔDPQ\n→ ∠B = ∠DPQ\n\nBut ∠B = ∠E (given)\n→ ∠DPQ = ∠E\n→ PQ || EF (corresponding angles equal)\n→ DP/PE = DQ/QF (by BPT)\n→ AB/PE = AC/QF\n\nThis gives AB/DE = AC/DF = BC/EF\nHence ΔABC ~ ΔDEF ■"},
        {q:"A ladder 10 m long reaches a window 8 m above the ground. Find the distance of the foot of the ladder from the base of the wall.",a:"Let wall = AB = 8 m, ladder = AC = 10 m\nAngle at B = 90°\n\nBy Pythagoras Theorem:\nAC² = AB² + BC²\n10² = 8² + BC²\n100 = 64 + BC²\nBC² = 36\nBC = 6 m\n\nThe foot of the ladder is 6 m from the base of the wall."},
        {q:"State the Pythagoras Theorem and its converse.",a:"Pythagoras Theorem: In a right triangle, the square of the hypotenuse is equal to the sum of squares of the other two sides.\nIf ∠B = 90° in ΔABC, then AC² = AB² + BC²\n\nConverse of Pythagoras Theorem: If in a triangle, the square of one side is equal to the sum of squares of the other two sides, then the angle opposite the first side is a right angle.\nIf AC² = AB² + BC² in ΔABC, then ∠B = 90°"}
      ],
      long: [
        {q:"Prove that the ratio of areas of two similar triangles is equal to the square of the ratio of their corresponding sides.",a:"Given: ΔABC ~ ΔDEF\nTo prove: Area(ΔABC)/Area(ΔDEF) = (AB/DE)² = (BC/EF)² = (AC/DF)²\n\nConstruction: Draw AM ⊥ BC and DN ⊥ EF\n\nProof:\nArea(ΔABC) = ½ × BC × AM\nArea(ΔDEF) = ½ × EF × DN\n\nArea(ΔABC)/Area(ΔDEF) = (BC × AM)/(EF × DN) ...(1)\n\nIn ΔABM and ΔDEN:\n∠B = ∠E (since ΔABC ~ ΔDEF)\n∠AMB = ∠DNE = 90°\nSo ΔABM ~ ΔDEN (AA)\n→ AM/DN = AB/DE ...(2)\n\nSince ΔABC ~ ΔDEF:\nAB/DE = BC/EF ...(3)\n\nFrom (1), (2), (3):\nArea(ΔABC)/Area(ΔDEF) = (BC/EF) × (AB/DE)\n= (BC/EF) × (BC/EF)\n= (BC/EF)² \n\nSimilarly = (AB/DE)² = (AC/DF)² ■"},
        {q:"In ΔABC, the angle bisector AD of ∠A meets BC at D. Prove that BD/DC = AB/AC.",a:"Given: ΔABC with AD bisecting ∠BAC, meeting BC at D\nTo prove: BD/DC = AB/AC\n\nConstruction: Draw CE || DA meeting BA extended at E.\n\nProof:\nSince CE || DA:\n∠DAC = ∠ACE (alternate interior angles) ...(1)\n∠BAD = ∠AEC (corresponding angles) ...(2)\n\nSince AD bisects ∠A:\n∠BAD = ∠DAC ...(3)\n\nFrom (1), (2), (3):\n∠ACE = ∠AEC\n→ AE = AC (isoceles triangle) ...(4)\n\nIn ΔBCE, since DA || CE:\nBD/DC = BA/AE (by BPT)\n= BA/AC (from (4))\n= AB/AC ■"}
      ],

        {q:"A photographer takes photos of the Taj Mahal with a small 35mm film and then enlarges them to 45mm size.\n\n(a) If a wall in the 35mm photo measures 7 mm, how long will it appear in the 45mm enlargement?\n(b) What concept in geometry does this illustrate?\n(c) If two photographs of the same building taken at different distances have all corresponding angles equal, are the buildings in the photos similar figures? Why?",a:"(a) Scale factor = 45/35 = 9/7\nLength in enlarged photo = 7 × 9/7 = 9 mm\n\n(b) This illustrates the concept of SIMILAR FIGURES — figures that have the same shape but not necessarily the same size. Every part is scaled by the same ratio.\n\n(c) Yes, the buildings in the photos are similar figures. When all corresponding angles are equal, by the AA (Angle-Angle) similarity criterion, the triangles — and thus the overall figures — are similar. Similar figures have the same shape, meaning corresponding angles are equal and corresponding sides are in the same ratio."}

        {q:"The vertices of a ΔABC are A(4,6), B(1,5), C(7,2). A line is drawn to intersect sides AB and AC at D and E respectively, such that AD/AB = AE/AC = 1/4. Find the area of ΔADE and compare with area of ΔABC.",a:"D divides AB in ratio AD:DB = 1:3\nUsing section formula:\nD = ((1×1 + 3×4)/4, (1×5 + 3×6)/4)\n= ((1+12)/4, (5+18)/4)\n= (13/4, 23/4)\n\nE divides AC in ratio AE:EC = 1:3\nE = ((1×7 + 3×4)/4, (1×2 + 3×6)/4)\n= ((7+12)/4, (2+18)/4)\n= (19/4, 5)\n\nArea(ΔADE):\nVertices: A(4,6), D(13/4,23/4), E(19/4,5)\n= ½|4(23/4-5) + 13/4(5-6) + 19/4(6-23/4)|\n= ½|4(3/4) + 13/4(-1) + 19/4(1/4)|\n= ½|3 - 13/4 + 19/16|\n= ½ × 15/16 = 15/32\n\nArea(ΔABC):\n= ½|4(5-2) + 1(2-6) + 7(6-5)|\n= ½|12 - 4 + 7| = 15/2\n\nRatio = (15/32)/(15/2) = 1/16 = (1/4)²\n\nThis confirms: Area(ΔADE)/Area(ΔABC) = (AD/AB)² = (1/4)²"}

      short: [
        {q:"In right ΔABC, right-angled at B, if AB = 12 cm and BC = 5 cm, find all six trigonometric ratios of angle A.",a:"AC (hypotenuse) = √(AB² + BC²) = √(144 + 25) = √169 = 13 cm\n\nsin A = BC/AC = 5/13\ncos A = AB/AC = 12/13\ntan A = BC/AB = 5/12\ncosec A = 13/5\nsec A = 13/12\ncot A = 12/5"},
        {q:"Prove the identity: (1 - sin²θ)(1 + tan²θ) = 1",a:"LHS = (1 - sin²θ)(1 + tan²θ)\n= cos²θ × sec²θ       [since 1-sin²θ = cos²θ and 1+tan²θ = sec²θ]\n= cos²θ × (1/cos²θ)\n= 1 = RHS ✓"},
        {q:"Evaluate: (sin 30° + tan 45° - cosec 60°) ÷ (sec 30° + cos 60° + cot 45°)",a:"Numerator: sin30° + tan45° - cosec60°\n= 1/2 + 1 - 2/√3\n= 3/2 - 2/√3\n\nDenominator: sec30° + cos60° + cot45°\n= 2/√3 + 1/2 + 1\n= 3/2 + 2/√3\n\nRatio = (3/2 - 2√3/3)/(3/2 + 2√3/3)\nMultiplying by 6: (9 - 4√3)/(9 + 4√3)\nRationalising: (9-4√3)²/(81-48) = (81+48-72√3)/33 = (129-72√3)/33 = (43-24√3)/11"},
        {q:"If tan 2A = cot(A - 18°) where 2A is an acute angle, find A.",a:"cot(90° - 2A) = cot(A - 18°)   [since tan θ = cot(90°-θ)]\n90° - 2A = A - 18°\n90° + 18° = 3A\n108° = 3A\nA = 36°"},
        {q:"Prove: (sin A + cosec A)² + (cos A + sec A)² = 7 + tan²A + cot²A",a:"LHS = sin²A + 2sinA·cosecA + cosec²A + cos²A + 2cosA·secA + sec²A\n= (sin²A + cos²A) + 2(sinA/sinA) + 2(cosA/cosA) + cosec²A + sec²A\n= 1 + 2 + 2 + (1+cot²A) + (1+tan²A)\n= 1 + 2 + 2 + 1 + cot²A + 1 + tan²A\n= 7 + tan²A + cot²A = RHS ✓"},
        {q:"If sin θ + cos θ = √2 cos(90°-θ), find the value of tan θ.",a:"sin θ + cos θ = √2 cos(90°-θ)\nsin θ + cos θ = √2 sin θ\ncos θ = √2 sin θ - sin θ\ncos θ = sin θ(√2 - 1)\ntan θ = cos θ/sin θ... wait:\n\ncos θ = (√2 - 1) sin θ\n1 = (√2 - 1) tan θ\ntan θ = 1/(√2-1) = (√2+1)/[(√2-1)(√2+1)] = (√2+1)/1 = √2 + 1"}
      ],
      long: [
        {q:"Prove that: (cosec A - sin A)(sec A - cos A) = 1/(tan A + cot A)",a:"LHS = (cosec A - sin A)(sec A - cos A)\n= (1/sinA - sinA)(1/cosA - cosA)\n= [(1-sin²A)/sinA] × [(1-cos²A)/cosA]\n= [cos²A/sinA] × [sin²A/cosA]\n= (cos²A × sin²A)/(sinA × cosA)\n= sinA × cosA\n\nRHS = 1/(tanA + cotA)\n= 1/(sinA/cosA + cosA/sinA)\n= 1/[(sin²A + cos²A)/(sinA cosA)]\n= sinA cosA\n\nLHS = RHS ✓"},
        {q:"Construct a table of trigonometric values for 0°, 30°, 45°, 60°, 90° and use it to prove sin²30° + cos²60° + tan²45° = 2.",a:"Trigonometric Table:\n       | 0°  | 30°    | 45°    | 60°    | 90°\nsin    |  0  | 1/2    | 1/√2   | √3/2   |  1\ncos    |  1  | √3/2   | 1/√2   | 1/2    |  0\ntan    |  0  | 1/√3   |  1     | √3     | ∞\n\nsin²30° = (1/2)² = 1/4\ncos²60° = (1/2)² = 1/4\ntan²45° = (1)² = 1\n\nsin²30° + cos²60° + tan²45°\n= 1/4 + 1/4 + 1\n= 2/4 + 1\n= 1/2 + 1 = 3/2\n\nNote: The actual sum = 3/2, not 2. So the corrected statement to prove would be:\nsin²30° + cos²60° + tan²45° = 3/2 ✓"}

      passage: [
        {q:"Read the following and answer:\n\nA student standing 30 m from the base of a building looks up at a window. The ratio of BC (height of window) to AB (horizontal distance) equals tan A.\n\n(a) If tan A = 1/√3, what is angle A?\n(b) Find the height of the window BC.\n(c) Write the values of sin A and cos A.",a:"(a) tan A = 1/√3 = tan 30°\nSo angle A = 30°\n\n(b) tan 30° = BC/AB\n1/√3 = BC/30\nBC = 30/√3 = 30√3/3 = 10√3 m ≈ 17.3 m\n\n(c) For angle 30°:\nsin 30° = 1/2\ncos 30° = √3/2"}
      ]

      short: [
        {q:"A tower stands vertically on the ground. From a point on the ground 15 m away from its foot, the angle of elevation of the top is 60°. Find the height of the tower.",a:"Let height of tower = AB = h m\nDistance from foot = BC = 15 m\nAngle of elevation = ∠ACB = 60°\n\nIn right ΔABC:\ntan 60° = AB/BC\n√3 = h/15\nh = 15√3 m\n\nHeight of tower = 15√3 ≈ 25.98 m"},
        {q:"From the top of a 7 m high building, the angle of elevation of the top of a cable tower is 60° and the angle of depression of its foot is 45°. Find the height of the tower.",a:"Let AB = building = 7 m, CD = tower\nDraw BE ⊥ CD. Let DE = x (horizontal distance)\n\nAngle of depression of foot = 45°:\ntan 45° = AB/x = 7/x → x = 7 m\n\nBE = x = 7 m, CE = CD - DE\nAngle of elevation of top = 60°:\ntan 60° = CE/BE\n√3 = CE/7\nCE = 7√3 m\n\nHeight of tower CD = CE + DE = 7√3 + 7 = 7(√3+1) m"},
        {q:"Two poles of equal heights stand on either side of a road 80 m wide. From a point between them on the road, the angles of elevation of the tops are 60° and 30°. Find the heights and position of the point.",a:"Let poles AB and CD be on either side, road AC = 80 m\nLet point P be at distance x from A (so PC = 80-x)\nLet height of each pole = h\n\nFrom P: ∠APB = 60° → tan 60° = h/x → h = x√3 ...(1)\nFrom P: ∠CPD = 30° → tan 30° = h/(80-x) → h = (80-x)/√3 ...(2)\n\nFrom (1) and (2):\nx√3 = (80-x)/√3\n3x = 80 - x\n4x = 80 → x = 20 m\nh = 20√3 m\n\nPoint P is 20 m from pole AB; height = 20√3 m"}

        {q:"As observed from the top of a 75 m tall lighthouse, the angles of depression of two ships are 30° and 45°. If one ship is exactly behind the other on the same side of the lighthouse, find the distance between the two ships.",a:"Let lighthouse AB = 75 m, ships at C and D\nAngle of depression of C = 45°, angle of depression of D = 30°\n\nIn ΔABC (∠ACB = 45°):\ntan 45° = AB/BC\n1 = 75/BC\nBC = 75 m\n\nIn ΔABD (∠ADB = 30°):\ntan 30° = AB/BD\n1/√3 = 75/BD\nBD = 75√3 m\n\nDistance between ships = CD = BD - BC\n= 75√3 - 75\n= 75(√3 - 1) m\n≈ 75(1.732 - 1)\n≈ 75 × 0.732 ≈ 54.9 m"}

        {q:"Read the situation:\n\nAn observer on top of a cliff 100 m high sees a boat in the sea at an angle of depression of 30°. After some time the boat moves towards the cliff and the angle of depression becomes 60°.\n\n(a) Find the initial distance of the boat from the foot of the cliff.\n(b) Find the final distance of the boat from the foot of the cliff.\n(c) How much distance has the boat covered?",a:"Height of cliff = 100 m\n\n(a) Initial angle of depression = 30°\ntan 30° = 100/d₁\n1/√3 = 100/d₁\nd₁ = 100√3 m\n\n(b) Final angle of depression = 60°\ntan 60° = 100/d₂\n√3 = 100/d₂\nd₂ = 100/√3 = 100√3/3 m\n\n(c) Distance covered = d₁ - d₂\n= 100√3 - 100√3/3\n= 100√3(1 - 1/3)\n= 100√3 × 2/3\n= 200√3/3 m ≈ 115.5 m"}

      short: [
        {q:"Prove that the tangent at any point of a circle is perpendicular to the radius through the point of contact.",a:"Given: Circle with centre O, tangent AB at point P\nTo prove: OP ⊥ AB\n\nProof: Take any point Q on AB (Q ≠ P).\nSince AB is a tangent, it touches the circle only at P.\nSo Q lies outside the circle.\nOQ > OP (radius)\n\nThis is true for ALL points Q on AB except P.\nSo OP is the shortest distance from O to AB.\nThe shortest distance from a point to a line is the perpendicular.\nTherefore OP ⊥ AB ■"},
        {q:"From a point P outside a circle, two tangents PA and PB are drawn. Prove that PA = PB.",a:"Given: Tangents PA and PB from external point P, O is centre\nTo prove: PA = PB\n\nIn ΔOAP and ΔOBP:\nOA = OB (radii)\nOP = OP (common)\n∠OAP = ∠OBP = 90° (radius ⊥ tangent)\n\nBy RHS congruence: ΔOAP ≅ ΔOBP\nTherefore PA = PB ■"},
        {q:"A tangent PQ at a point P of a circle with radius 5 cm meets a line through the centre O at Q such that OQ = 13 cm. Find PQ.",a:"OP ⊥ PQ (radius is perpendicular to tangent)\nSo ΔOPQ is right-angled at P.\n\nBy Pythagoras Theorem:\nOQ² = OP² + PQ²\n13² = 5² + PQ²\n169 = 25 + PQ²\nPQ² = 144\nPQ = 12 cm"},
        {q:"Two concentric circles are of radii 5 cm and 3 cm. Find the length of the chord of the outer circle which touches the inner circle.",a:"Let chord AB of outer circle touch inner circle at P.\nO is centre. OP ⊥ AB (tangent property)\nOP = 3 cm (radius of inner circle)\nOA = 5 cm (radius of outer circle)\n\nIn right ΔOAP:\nAP² = OA² - OP² = 25 - 9 = 16\nAP = 4 cm\n\nAB = 2 × AP = 8 cm"}
      ],
      long: [
        {q:"Prove that the angle between two tangents drawn from an external point to a circle is supplementary to the angle subtended by the line segment joining the points of contact at the centre.",a:"Given: PA and PB are tangents from external point P, O is centre\nTo prove: ∠APB + ∠AOB = 180°\n\nIn quadrilateral AOBP:\nSum of all angles = 360°\n∠OAP = 90° (radius ⊥ tangent)\n∠OBP = 90° (radius ⊥ tangent)\n∠OAP + ∠OBP + ∠APB + ∠AOB = 360°\n90° + 90° + ∠APB + ∠AOB = 360°\n∠APB + ∠AOB = 180°\n\nHence proved: ∠APB and ∠AOB are supplementary. ■"}
      ],
      passage: [
        {q:"A pulley system has a rope wrapped around a circular wheel. At any point where the rope leaves the wheel, it behaves like a tangent to the circle.\n\n(a) What is the angle between the rope (tangent) and the radius at the point of contact?\n(b) If two ropes leave the wheel from the same external point P, and the angle between them is 60°, what is the angle subtended at the centre?\n(c) If the radius of the wheel is 5 cm and the external point is 13 cm from the centre, find the length of rope from the external point to the wheel.",a:"(a) The angle between the tangent (rope) and radius at the point of contact is always 90°.\n\n(b) ∠APB = 60°\n∠APB + ∠AOB = 180° (supplementary)\n∠AOB = 180° - 60° = 120°\n\n(c) OP = 13 cm, radius OA = 5 cm, ∠OAP = 90°\nPA² = OP² - OA² = 169 - 25 = 144\nPA = 12 cm"}
      ]
    },

      short: [
        {q:"Find the area of a sector of a circle with radius 4 cm and angle 30°.",a:"Area of sector = θ/360 × πr²\n= 30/360 × π × 4²\n= 1/12 × 16π\n= 4π/3 cm²\n≈ 4.19 cm²"},
        {q:"A chord of a circle of radius 10 cm subtends a right angle at the centre. Find the area of the minor sector. (π = 3.14)",a:"Area of minor sector = θ/360 × πr²\n= 90/360 × 3.14 × 10²\n= 1/4 × 314\n= 78.5 cm²"},
        {q:"Find the area of the shaded region where a square of side 14 cm has four semicircles drawn on its sides inside the square. (π = 22/7)",a:"Area of square = 14² = 196 cm²\nRadius of each semicircle = 14/2 = 7 cm\nArea of 4 semicircles = 4 × (1/2 × πr²) = 2πr² = 2 × 22/7 × 49 = 308 cm²\n\nBut 308 > 196, which means the semicircles overlap.\nArea of each semicircle = πr²/2 = 22/7 × 7²/2 = 77 cm²\nSince 4 × 77 > 196, the problem is likely:\nArea of shaded region (inside square, outside semicircles) = 196 - 2 × πr²/2... [depends on diagram]\nFor standard problem: shaded = square area - 4 quadrant areas = 196 - π(7)² = 196 - 154 = 42 cm²"},
        {q:"Find the area of a sector of angle 120° in a circle of radius 21 cm. (π = 22/7)",a:"Area = θ/360 × πr²\n= 120/360 × 22/7 × 21²\n= 1/3 × 22/7 × 441\n= 1/3 × 22 × 63\n= 1/3 × 1386\n= 462 cm²"}

      long: [
        {q:"In a circle of radius 12 cm, an arc subtends an angle of 120° at the centre. Find: (i) area of sector, (ii) length of arc, (iii) area of segment formed. (Use π = 3.14 and √3 = 1.73)",a:"r = 12 cm, θ = 120°\n\n(i) Area of sector = θ/360 × πr²\n= 120/360 × 3.14 × 144\n= 1/3 × 452.16 = 150.72 cm²\n\n(ii) Length of arc = θ/360 × 2πr\n= 120/360 × 2 × 3.14 × 12\n= 1/3 × 75.36 = 25.12 cm\n\n(iii) Area of segment = Area of sector - Area of triangle\nFor θ = 120°, the triangle is isoceles with two sides = r = 12 cm\n∠AOB = 120°, so ∠OAB = ∠OBA = 30°\nHeight of triangle = r cos60° = 12 × 0.5 = 6 cm\nBase = 2r sin60° = 2 × 12 × (√3/2) = 12√3 cm\nArea of triangle = ½ × base × height = ½ × 12√3 × 6 = 36√3 = 36 × 1.73 = 62.28 cm²\n\nArea of segment = 150.72 - 62.28 = 88.44 cm²"}

      passage: [
        {q:"In a circular park of radius 21 m, a horse is tied to a pole at a point on the boundary. The rope length is 14 m.\n\n(a) Can the horse graze the full area of the park? Why?\n(b) Find the area the horse can graze.\n(c) Find the area it CANNOT reach. (π = 22/7)",a:"(a) No. The horse can only move within 14 m of the pole (a portion of the circle), not the entire park (radius 21 m).\n\n(b) Area horse can graze = area of circle with radius 14 m (if outside park)\nBut since horse is tied to boundary, it grazes a semicircle inside and portions outside:\nFor simplest case (unrestricted): area = πr² = 22/7 × 14² = 22/7 × 196 = 616 m²\nBut since tied at boundary of circle, it grazes a semicircle = π × 14²/2 = 308 m²\n\n(c) Area of park = πR² = 22/7 × 21² = 22/7 × 441 = 1386 m²\nArea not reachable = 1386 - 308 = 1078 m²"}

        {q:"What is a chemical equation? What information does a balanced chemical equation give?",a:"A chemical equation is a symbolic representation of a chemical reaction using chemical formulas of reactants and products.\n\nA balanced chemical equation gives:\n1. The formulas of all reactants and products\n2. The ratio in which reactants combine and products form\n3. The physical states (s, l, g, aq) of reactants and products\n4. Whether heat/light is absorbed or released\n5. Quantitative information about moles and masses involved"},
        {q:"What is a combination reaction? Give two examples.",a:"A combination reaction is one in which two or more substances combine to form a single new substance.\nGeneral form: A + B → AB\n\nExamples:\n1. Burning of magnesium: 2Mg + O₂ → 2MgO\n   (Magnesium combines with oxygen to form magnesium oxide)\n2. Formation of water: 2H₂ + O₂ → 2H₂O\n   (Hydrogen combines with oxygen to form water)\n\nAll combination reactions that involve burning are exothermic as heat is released."},
        {q:"Explain decomposition reactions with two examples. How do they differ from combination reactions?",a:"A decomposition reaction is one in which a single compound breaks down into two or more simpler substances.\nGeneral form: AB → A + B\n\nExamples:\n1. Thermal decomposition of calcium carbonate:\n   CaCO₃ → CaO + CO₂\n   (Limestone heated strongly decomposes)\n2. Electrolytic decomposition of water:\n   2H₂O → 2H₂ + O₂\n   (Water breaks down when electric current passes)\n\nDifference: In combination, substances join together; in decomposition, a substance breaks apart. They are opposite processes."},
        {q:"What is oxidation and reduction? Give one example of a redox reaction.",a:"Oxidation: The process of addition of oxygen or removal of hydrogen from a substance. The substance that gets oxidised is the reducing agent.\n\nReduction: The process of removal of oxygen or addition of hydrogen to a substance. The substance that gets reduced is the oxidising agent.\n\nRedox reaction example:\n2CuO + C → 2Cu + CO₂\n• Carbon gets oxidised (gains oxygen → CO₂)\n• CuO gets reduced (loses oxygen → Cu)\n• Carbon is the reducing agent\n• CuO is the oxidising agent"},

      long: [
        {q:"Explain the different types of chemical reactions with equations and real-life examples for each.",a:"1. COMBINATION REACTIONS: Two or more substances combine to form one product.\n   2Mg + O₂ → 2MgO\n   Real life: Burning of coal (C + O₂ → CO₂), quicklime + water\n\n2. DECOMPOSITION REACTIONS: One substance breaks into simpler substances.\n   2H₂O → 2H₂ + O₂ (electrolysis)\n   Real life: Digestion of food, heating of limestone in cement industry\n\n3. DISPLACEMENT REACTIONS: More reactive element displaces less reactive one.\n   Fe + CuSO₄ → FeSO₄ + Cu\n   Real life: Galvanisation, electroplating\n\n4. DOUBLE DISPLACEMENT REACTIONS: Exchange of ions between two compounds.\n   Na₂SO₄ + BaCl₂ → BaSO₄↓ + 2NaCl\n   Real life: Water treatment, precipitation reactions\n\n5. OXIDATION-REDUCTION (REDOX): Simultaneous oxidation and reduction.\n   2CuO + C → 2Cu + CO₂\n   Real life: Rusting of iron, extraction of metals\n\n6. EXOTHERMIC: Heat is released.\n   CH₄ + 2O₂ → CO₂ + 2H₂O + heat\n   Real life: Burning of fuels, respiration\n\n7. ENDOTHERMIC: Heat is absorbed.\n   CaCO₃ + heat → CaO + CO₂\n   Real life: Photosynthesis, cooking food"},
        {q:"What is corrosion? Explain rusting of iron, conditions required and how it can be prevented.",a:"CORROSION: The process by which metals are slowly eaten away by the action of air, moisture, chemicals etc. on their surface.\n\nRUSTING OF IRON:\nChemical reaction:\n4Fe + 3O₂ + xH₂O → 2Fe₂O₃·xH₂O (rust)\nRust is hydrated iron(III) oxide — reddish-brown in colour.\n\nCONDITIONS REQUIRED:\n• Both oxygen and water (moisture) must be present\n• Salt/acid speeds up rusting\n• Neither oxygen alone nor water alone causes rusting\n\nEVIDENCE:\n• Iron nail in dry air: no rust\n• Iron nail in boiled water (no dissolved O₂): no rust\n• Iron nail in moist air: rusts\n\nPREVENTION:\n1. Painting — creates barrier against air and moisture\n2. Oiling/greasing — prevents contact with moisture\n3. Galvanisation — coating iron with zinc\n4. Alloying — making stainless steel (iron + chromium + nickel)\n5. Electroplating — coating with another metal\n6. Sacrificial protection — attaching zinc blocks to iron structures"}
      ],
      passage: [
        {q:"Read the following and answer:\n\n'When a magnesium ribbon is burnt in air, it burns with a dazzling white flame and a white powder is formed. When the white powder is dissolved in water and tested with litmus, it turns red litmus blue.'\n\n(a) Write the chemical equation for burning of magnesium.\n(b) What type of reaction is this?\n(c) What does the litmus test tell us about the white powder?\n(d) Name the white powder formed.",a:"(a) 2Mg + O₂ → 2MgO\n\n(b) This is a COMBINATION reaction (two substances combine to form one product). It is also an EXOTHERMIC reaction (heat and light are released).\n\n(c) The white powder turns red litmus blue, which means it is BASIC (alkaline) in nature. When dissolved in water: MgO + H₂O → Mg(OH)₂\n\n(d) The white powder is MAGNESIUM OXIDE (MgO)."},
        {q:"Study the activity: Iron nails were placed in three test tubes.\n- Test tube A: Dry air (with anhydrous CaCl₂ to absorb moisture)\n- Test tube B: Boiled water (covered with oil to prevent air contact)\n- Test tube C: Water with dissolved air (ordinary conditions)\n\nAfter a week, only test tube C showed rust.\n\n(a) Why did test tube A not show rust?\n(b) Why did test tube B not show rust?\n(c) What does this experiment prove about rusting?\n(d) Name two methods to prevent rusting.",a:"(a) Test tube A had no moisture (water). Rusting requires BOTH oxygen AND water. Without water, rusting does not occur.\n\n(b) Test tube B had water but no dissolved oxygen (boiling removes dissolved air, and oil layer prevents air from re-entering). Without oxygen, rusting does not occur.\n\n(c) This experiment proves that BOTH OXYGEN AND WATER (moisture) are essential for rusting to occur. Neither alone is sufficient.\n\n(d) Two methods to prevent rusting:\n1. Painting the iron surface (creates barrier)\n2. Galvanisation (coating with zinc)"}
      ]
    },

      short: [
        {q:"What happens chemically when an acid is mixed with a base? Give an example with equation.",a:"When an acid reacts with a base, a NEUTRALISATION reaction occurs, producing salt and water.\n\nAcid + Base → Salt + Water\n\nExample:\nHCl + NaOH → NaCl + H₂O\n(Hydrochloric acid + Sodium hydroxide → Sodium chloride + Water)\n\nThe H⁺ ions from acid combine with OH⁻ ions from base to form water.\nThe reaction is exothermic (releases heat)."},
        {q:"Explain with activity how to test whether a substance is acidic or basic using a natural indicator.",a:"Natural indicators change colour in acids and bases.\n\nActivity using turmeric:\n• Take turmeric solution (yellow) on a white cloth\n• Add acidic solution (vinegar) → colour remains YELLOW\n• Add basic solution (soap) → colour turns REDDISH-BROWN\n\nLitmus (from lichen):\n• Blue litmus + acid → turns RED\n• Red litmus + base → turns BLUE\n\nRed cabbage juice:\n• In acid → turns red/pink\n• In base → turns green/yellow\n\nThese colour changes indicate the presence of acid or base."},
        {q:"What is the pH scale? How is it useful?",a:"The pH scale is a measure of hydrogen ion concentration in a solution.\n• Scale ranges from 0 to 14\n• pH < 7: Acidic solution (more H⁺ ions)\n• pH = 7: Neutral solution (pure water)\n• pH > 7: Basic/alkaline solution (more OH⁻ ions)\n\nUsefulness:\n• Our stomach works in acidic pH (1.5-3.5) for digestion\n• Blood must maintain pH 7.35-7.45 for survival\n• Soil pH affects plant growth\n• Aquatic animals need specific pH range in water\n• Tooth decay occurs when mouth pH falls below 5.5"},
        {q:"What is the chlor-alkali process? Write the products formed and their uses.",a:"Chlor-alkali process: Electrolysis of brine (concentrated NaCl solution)\n\nChemical reaction:\n2NaCl + 2H₂O → 2NaOH + Cl₂ + H₂\n\nProducts and uses:\n1. Sodium hydroxide (NaOH): Making soap, paper, detergents, degreasing steel\n2. Chlorine gas (Cl₂): Water treatment/disinfection, making PVC, CFC, pesticides, bleaching\n3. Hydrogen gas (H₂): Making margarine (hydrogenation), fuel in hydrogen cells\n\nCombining products:\nCl₂ + H₂ → HCl (Hydrochloric acid) — used in cleaning metals\nCl₂ + Ca(OH)₂ → Bleaching powder"},
        {q:"Explain the preparation of Plaster of Paris and its setting reaction.",a:"Preparation of Plaster of Paris:\nGypsum (CaSO₄·2H₂O) is heated at 373 K:\nCaSO₄·2H₂O → CaSO₄·½H₂O + 3/2 H₂O\nThis is Plaster of Paris (calcium sulphate hemihydrate)\n\nSetting reaction (when water is added):\nCaSO₄·½H₂O + 3/2 H₂O → CaSO₄·2H₂O\n(Plaster of Paris + Water → Gypsum)\n\nDuring setting, slight expansion occurs.\n\nUses:\n• Making casts for fractured bones\n• Making toys, statues, chalk\n• For making smooth surfaces in buildings\n• In dentistry for making dental impressions"},
        {q:"Why does aqueous solution of an acid conduct electricity? What happens to acid molecules in water?",a:"Acids in water undergo IONISATION (dissociation):\nHCl + H₂O → H₃O⁺ + Cl⁻\n\nProcess:\n• When HCl dissolves in water, it completely dissociates into H⁺ and Cl⁻ ions\n• These ions are free to move in solution\n• When electrodes are placed and current applied, positive ions move to cathode, negative ions to anode\n• This movement of ions constitutes electric current\n\nKey point: Pure acids (without water) do NOT conduct electricity because there are no free ions. Ionisation requires water — hence the importance of water in conducting electricity."}
      ],
      long: [
        {q:"Describe the reactions of acids with metals, metal oxides, metal carbonates and metal bicarbonates. Write equations for each.",a:"1. ACID + METAL → Salt + Hydrogen gas\n   Zn + H₂SO₄ → ZnSO₄ + H₂↑\n   2HCl + Mg → MgCl₂ + H₂↑\n   (Hydrogen burns with 'pop' sound — confirms H₂)\n\n2. ACID + METAL OXIDE → Salt + Water\n   (Metal oxides are basic oxides)\n   CuO + H₂SO₄ → CuSO₄ + H₂O\n   Fe₂O₃ + 3H₂SO₄ → Fe₂(SO₄)₃ + 3H₂O\n   (Black CuO dissolves to give blue CuSO₄ solution)\n\n3. ACID + METAL CARBONATE → Salt + Water + CO₂\n   Na₂CO₃ + 2HCl → 2NaCl + H₂O + CO₂↑\n   CaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂↑\n   (CO₂ turns lime water milky)\n\n4. ACID + METAL BICARBONATE → Salt + Water + CO₂\n   NaHCO₃ + HCl → NaCl + H₂O + CO₂↑\n   Ca(HCO₃)₂ + 2HCl → CaCl₂ + 2H₂O + 2CO₂↑\n   (Also turns lime water milky)\n\nCOMMON OBSERVATION: CO₂ is tested by passing through Ca(OH)₂ (lime water) — turns milky due to CaCO₃ formation."},
        {q:"What are salts? How are they formed? Explain the nature of salts with examples and their uses in everyday life.",a:"SALTS: Compounds formed by partial or complete replacement of hydrogen of an acid by a metal ion (or NH₄⁺ group).\n\nFORMATION:\nAcid + Base → Salt + Water (neutralisation)\nHCl + NaOH → NaCl + H₂O\n\nNATURE OF SALTS:\n1. Neutral salts (pH = 7): Strong acid + Strong base\n   NaCl (Common salt) — pH neutral\n\n2. Acidic salts (pH < 7): Strong acid + Weak base\n   NH₄Cl, FeCl₃\n\n3. Basic salts (pH > 7): Weak acid + Strong base\n   Na₂CO₃, Na₃PO₄\n\nIMPORTANT SALTS AND USES:\n• NaCl: Food preservation, making NaOH, HCl, Na₂CO₃\n• NaHCO₃ (Baking soda): Baking, antacid, fire extinguisher\n• Na₂CO₃ (Washing soda): Removing grease, making glass, paper, soap\n• CaSO₄·½H₂O (Plaster of Paris): Casts for bones, statues\n• Bleaching powder: Disinfecting water, bleaching clothes\n• NaOCl: Disinfectant\n\nThe family of salts: Many salts share the same acid or base radical, forming salt families (e.g., chlorides, sulphates, carbonates)."}

      passage: [
        {q:"Read the following situation:\n\nRahim's grandmother complained of acidity (excess acid in stomach). She was advised to take milk of magnesia. Meanwhile, Rahim noticed that when he kept lemon juice in a copper vessel overnight, the vessel turned greenish.\n\n(a) What is the chemical name and formula of milk of magnesia?\n(b) Why does milk of magnesia relieve acidity?\n(c) What happened to the copper vessel? Write the chemical equation.\n(d) What is the pH range of lemon juice?",a:"(a) Milk of magnesia is MAGNESIUM HYDROXIDE — Mg(OH)₂\n\n(b) Milk of magnesia is a BASE (Mg(OH)₂). The stomach produces excess HCl causing acidity. Mg(OH)₂ neutralises the excess acid:\nMg(OH)₂ + 2HCl → MgCl₂ + 2H₂O\nThis neutralisation relieves acidity.\n\n(c) Lemon juice (citric acid) reacted with copper to form copper salt (greenish-blue copper citrate):\nCu + acid → copper salt + H₂\nThe green colour is due to basic copper carbonate / copper salt formation.\n\n(d) Lemon juice pH is approximately 2-3 (strongly acidic)."}
      ]

      short: [
        {q:"What are the physical properties of metals? Name any two exceptions.",a:"Physical properties of metals:\n1. Lustrous (shiny surface)\n2. Hard and strong (except sodium, potassium — soft)\n3. Malleable (can be beaten into sheets)\n4. Ductile (can be drawn into wires)\n5. Good conductors of heat and electricity (except bismuth and mercury — poor conductors)\n6. High melting and boiling points (except mercury — liquid; gallium — low mp)\n7. Sonorous (produce ringing sound when struck)\n\nExceptions:\n• Mercury is liquid at room temperature\n• Sodium and potassium are soft metals (cut with knife)\n• Bismuth is a poor conductor of heat"},
        {q:"How do metals react with water? Arrange sodium, magnesium and iron in order of reactivity with water.",a:"Reactions with water:\n\nSodium (most reactive):\n2Na + 2H₂O → 2NaOH + H₂↑ (cold water, vigorous reaction, floats)\n\nMagnesium:\n• Cold water: Very slow reaction\n• Hot water: Mg + 2H₂O → Mg(OH)₂ + H₂↑\n• Steam: Mg + H₂O → MgO + H₂↑ (fast)\n\nIron:\n• Does NOT react with cold or hot water\n• Reacts with steam: 3Fe + 4H₂O → Fe₃O₄ + 4H₂↑\n\nOrder of reactivity: Na > Mg > Fe\n\nGeneral: Metal + Water → Metal oxide/hydroxide + Hydrogen gas"},
        {q:"What is an alloy? Why are alloys generally preferred over pure metals? Give three examples.",a:"Alloy: A homogeneous mixture of a metal with one or more other metals or non-metals.\n\nAlloys are preferred because:\n• They have higher strength and hardness than pure metals\n• They resist corrosion better\n• They have lower electrical conductivity than pure metals (useful for heating elements)\n• They have desirable properties not found in pure metals\n\nExamples:\n1. Steel (Fe + C): Stronger than iron, used in construction\n2. Brass (Cu + Zn): Harder than copper, used in musical instruments\n3. Bronze (Cu + Sn): Resistant to corrosion, used in statues, medals\n4. Solder (Pb + Sn): Low melting point, used in electrical wiring"},
        {q:"Explain the process of extraction of metals with low reactivity (like copper) from their ores.",a:"Metals with LOW REACTIVITY (below hydrogen in reactivity series) like copper, silver, gold can be extracted easily.\n\nExtraction of copper from copper sulphide (Cu₂S):\n\nStep 1: Roasting (heating in air)\nCu₂S + O₂ → 2Cu + SO₂\nThe ore is directly reduced to metal by heating in air.\n\nAlternatively: Copper oxide is reduced by carbon:\n2CuO + C → 2Cu + CO₂\n\nFor gold and silver (least reactive):\nFound in free/native state in nature.\nExtracted by physical methods (panning, smelting).\n\nPurification by electrolytic refining:\n• Impure copper = anode\n• Pure copper = cathode\n• CuSO₄ solution = electrolyte\n• Pure copper deposits at cathode"},
        {q:"What are ionic compounds? Explain their properties with examples.",a:"Ionic compounds: Compounds formed by transfer of electrons from metals to non-metals, resulting in oppositely charged ions held together by electrostatic forces.\n\nFormation example: NaCl\nNa → Na⁺ + e⁻ (loses electron)\nCl + e⁻ → Cl⁻ (gains electron)\nNa⁺ + Cl⁻ → NaCl (ionic bond)\n\nProperties of ionic compounds:\n1. HIGH MELTING AND BOILING POINTS: Strong electrostatic forces need much energy to break\n2. HARD and BRITTLE: Ions arranged in rigid lattice\n3. SOLUBLE in water: Water molecules surround and separate ions\n4. CONDUCT ELECTRICITY in molten state or aqueous solution: Free ions act as charge carriers\n5. DO NOT conduct in solid state: Ions not free to move\n\nExamples: NaCl, MgO, CaCl₂, Al₂O₃"}

      long: [
        {q:"Describe the activity series of metals. How is it useful in predicting displacement reactions? Give three examples.",a:"ACTIVITY SERIES (Reactivity Series) — decreasing order of reactivity:\nK > Na > Ca > Mg > Al > Zn > Fe > Ni > Sn > Pb > H > Cu > Hg > Ag > Au\n\nUSEFULNESS:\n1. Predicts whether a metal will displace hydrogen from acid\n   • Metals above H displace hydrogen: Zn + H₂SO₄ → ZnSO₄ + H₂\n   • Metals below H do not: Cu + H₂SO₄ → No reaction\n\n2. Predicts displacement reactions:\n   A more reactive metal displaces a less reactive metal from its salt solution.\n\nEXAMPLES:\n1. Zn + CuSO₄ → ZnSO₄ + Cu\n   (Zinc is more reactive than copper, so it displaces copper)\n   Blue solution turns colourless; red copper deposit forms\n\n2. Fe + ZnSO₄ → No reaction\n   (Iron is less reactive than zinc — no displacement)\n\n3. Al + Fe₂O₃ → Al₂O₃ + Fe + Heat (Thermite reaction)\n   (Aluminium is more reactive than iron)\n   Used in welding railway tracks\n\n4. Cu + AgNO₃ → Cu(NO₃)₂ + Ag\n   (Copper is more reactive than silver)\n   Blue solution forms; silver deposits on copper wire"}

      passage: [
        {q:"Observe the following experimental setup:\n\nA copper wire was dipped in silver nitrate solution. After some time, the wire turned silvery-white and the blue colour of the solution disappeared.\n\n(a) Write the chemical equation for this reaction.\n(b) What type of reaction is this?\n(c) Why did the copper wire turn silvery-white?\n(d) What does this tell us about the reactivity of copper and silver?",a:"(a) Cu + 2AgNO₃ → Cu(NO₃)₂ + 2Ag\n\n(b) This is a DISPLACEMENT (Single displacement) reaction — copper displaces silver from silver nitrate solution.\n\n(c) The copper wire turned silvery-white because silver (Ag) metal was deposited on the copper wire surface.\nSilver ions (Ag⁺) from solution gained electrons from copper and became silver metal.\n\n(d) This tells us that COPPER IS MORE REACTIVE THAN SILVER. A more reactive metal always displaces a less reactive metal from its salt solution. This is consistent with the reactivity series where Cu appears above Ag."}
      ]
    },
