<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study App - 10 Books</title>
  
  <script src="math_questions_db.js"></script>
  <script src="science_questions_db.js"></script>
  <script src="social_hist_questions_db.js"></script>
  <script src="social_ci_questions_db.js"></script>
  <script src="social_dp_questions_db.js"></script>
  <script src="social_eco_questions_db.js"></script>
  <script src="english_ff_questions_db.js"></script>
  <script src="english_fp_questions_db.js"></script>
  <script src="english_we_questions_db.js"></script>
  <script src="hpe_questions_db.js"></script>

  <style>
    :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; }
    .card { background: white; padding: 20px; margin: 10px 0; border-radius: 12px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
    .card:hover { border-color: var(--primary); background: #f5f3ff; }
    .btn-back { background: #64748b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
    .hidden { display: none; }
    .ans-box { background: #f1f5f9; padding: 15px; margin-top: 10px; border-radius: 8px; display: none; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <div class="header"><h1>📚 Study App</h1></div>
  
  <button id="backBtn" class="btn-back hidden" onclick="goBack()">⬅ Back</button>

  <div id="subjectScreen"></div>

  <div id="chapterScreen" class="hidden"></div>

  <div id="questionScreen" class="hidden"></div>
</div>

<script>
  // This is the "Map" that tells the app which data belongs to which button
  const subjects = [
    { id: 'math', name: 'Mathematics', data: typeof QUESTIONS_DB !== 'undefined' ? QUESTIONS_DB.mathematics : null },
    { id: 'sci', name: 'Science', data: typeof SCIENCE_QUESTIONS_DB !== 'undefined' ? SCIENCE_QUESTIONS_DB.science : null },
    { id: 'hist', name: 'History (SST)', data: typeof SOCIAL_HIST_QUESTIONS_DB !== 'undefined' ? SOCIAL_HIST_QUESTIONS_DB.social_hist : null },
    { id: 'geo', name: 'Geography (SST)', data: typeof SOCIAL_CI_QUESTIONS_DB !== 'undefined' ? SOCIAL_CI_QUESTIONS_DB.social_ci : null },
    { id: 'civ', name: 'Civics (SST)', data: typeof SOCIAL_DP_QUESTIONS_DB !== 'undefined' ? SOCIAL_DP_QUESTIONS_DB.social_dp : null },
    { id: 'eco', name: 'Economics (SST)', data: typeof SOCIAL_ECO_QUESTIONS_DB !== 'undefined' ? SOCIAL_ECO_QUESTIONS_DB.social_eco : null },
    { id: 'eff', name: 'English: First Flight', data: typeof ENGLISH_FF_QUESTIONS_DB !== 'undefined' ? ENGLISH_FF_QUESTIONS_DB.english_ff : null },
    { id: 'efp', name: 'English: Footprints', data: typeof ENGLISH_FP_QUESTIONS_DB !== 'undefined' ? ENGLISH_FP_QUESTIONS_DB.english_fp : null },
    { id: 'ewe', name: 'English: Expressions', data: typeof ENGLISH_WE_QUESTIONS_DB !== 'undefined' ? ENGLISH_WE_QUESTIONS_DB.english_we : null },
    { id: 'hpe', name: 'Health & Sports', data: typeof HPE_QUESTIONS_DB !== 'undefined' ? HPE_QUESTIONS_DB.hpe : null }
  ];

  let currentData = null;

  function init() {
    const screen = document.getElementById('subjectScreen');
    screen.innerHTML = '';
    subjects.forEach(sub => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>${sub.name}</h3>`;
      div.onclick = () => showChapters(sub.data);
      screen.appendChild(div);
    });
  }

  function showChapters(data) {
    if(!data) { alert("File not found! Make sure your .js files are in the same folder."); return; }
    currentData = data;
    document.getElementById('subjectScreen').classList.add('hidden');
    document.getElementById('backBtn').classList.remove('hidden');
    const screen = document.getElementById('chapterScreen');
    screen.classList.remove('hidden');
    screen.innerHTML = '<h2>Select Chapter</h2>';
    
    Object.keys(data).forEach(chap => {
      const div = document.createElement('div');
      div.className = 'card';
      div.textContent = chap;
      div.onclick = () => showQuestions(chap);
      screen.appendChild(div);
    });
  }

  function showQuestions(chapName) {
    document.getElementById('chapterScreen').classList.add('hidden');
    const screen = document.getElementById('questionScreen');
    screen.classList.remove('hidden');
    screen.innerHTML = `<h2>${chapName}</h2>`;
    
    const questions = currentData[chapName].mcq || currentData[chapName].short || [];
    
    questions.forEach((q, index) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<p><strong>Q${index+1}:</strong> ${q.q}</p>
                       <button onclick="toggleAns(${index})">👁 Show Answer</button>
                       <div id="ans-${index}" class="ans-box">${q.ans !== undefined ? q.opts[q.ans] : q.a}</div>`;
      screen.appendChild(div);
    });
  }

  function toggleAns(id) {
    const el = document.getElementById(`ans-${id}`);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  }

  function goBack() {
    location.reload(); // Simple way to go back to main screen
  }

  init();
</script>
</body>
</html>
