      a:"Three Sectors of Economy:\n\n1. Primary Sector:\nDirectly uses natural resources.\nExamples: Agriculture, fishing, mining, forestry\nMost workers in India (historically) in this sector.\n\n2. Secondary Sector:\nTransforms raw materials into goods (manufacturing).\nExamples: Steel mills, textile factories, construction\nAlso called Industrial sector.\n\n3. Tertiary Sector:\nProvides services (doesn't produce physical goods).\nExamples: Transport, banking, IT, healthcare, education, tourism\nAlso called Service sector.\n\nWhich sector has grown most:\nThe TERTIARY (Service) sector has grown most since 1970s.\n\nReasons:\n• Rise of IT and software industry (Bangalore, Hyderabad)\n• Growth of banking and finance\n• Expansion of telecom, transport, tourism\n• Outsourcing from developed countries to India (BPO)\n• Government spending on services like education and health\n\nHowever, despite tertiary sector's high contribution to GDP, agriculture still employs the most people in India."

  social_hist: {
    "The Rise of Nationalism in Europe": [{
      svg:`<svg viewBox="0 0 500 230" xmlns="http://www.w3.org/2000/svg" style="background:#1a1d28;border-radius:8px">
        <text x="250" y="20" text-anchor="middle" fill="#7c6dff" font-size="13" font-weight="bold">French Revolution — Impact on Nationalism</text>
        <rect x="30" y="35" width="200" height="170" rx="8" fill="#1a2535" stroke="#4a5568" stroke-width="1"/>
        <text x="130" y="55" text-anchor="middle" fill="#7c6dff" font-size="11" font-weight="bold">Key Ideas (1789)</text>
        <text x="40" y="75" fill="#00c9a7" font-size="10">• Liberty (Liberté)</text>
        <text x="40" y="92" fill="#00c9a7" font-size="10">• Equality (Égalité)</text>
        <text x="40" y="109" fill="#00c9a7" font-size="10">• Fraternity (Fraternité)</text>
        <text x="40" y="126" fill="#ffcb47" font-size="10">• La Patrie (Fatherland)</text>
        <text x="40" y="143" fill="#ffcb47" font-size="10">• Le Citoyen (Citizen)</text>
        <text x="40" y="160" fill="#ff8c42" font-size="10">• Nation as sovereign</text>
        <text x="40" y="177" fill="#ff8c42" font-size="10">• Uniform laws for all</text>
        <rect x="265" y="35" width="205" height="170" rx="8" fill="#1a2535" stroke="#4a5568" stroke-width="1"/>
        <text x="368" y="55" text-anchor="middle" fill="#ff8c42" font-size="11" font-weight="bold">Napoleon's Impact</text>
        <text x="275" y="75" fill="#dde1f0" font-size="10">• Civil Code (1804)</text>
        <text x="275" y="92" fill="#dde1f0" font-size="10">• Equal laws everywhere</text>
        <text x="275" y="109" fill="#dde1f0" font-size="10">• Abolished feudalism</text>
        <text x="275" y="126" fill="#dde1f0" font-size="10">• Uniform weights/measures</text>
        <text x="275" y="143" fill="#6b7394" font-size="10">But also: colonial ruler</text>
        <text x="275" y="160" fill="#6b7394" font-size="10">Raised taxes, censorship</text>
        <text x="275" y="177" fill="#6b7394" font-size="10">→ triggered local nationalism</text>
        <text x="250" y="218" text-anchor="middle" fill="#6b7394" font-size="10">The French Revolution showed that 'the people' could create and change a nation</text>
      </svg>`,
      caption:"French Revolution ideas and Napoleon's impact on European nationalism",
      q:"How did the French Revolution contribute to the rise of nationalism in Europe? Mention any two ideas it spread.",
      a:"French Revolution (1789) and Rise of Nationalism:\n\nThe French Revolution was the first clear expression of nationalism. It introduced the idea that sovereignty (supreme power) belongs to the PEOPLE, not kings.\n\nTwo key ideas spread by French Revolution:\n\n1. The Concept of Nation-State:\nFrance became a 'nation' — the people of France were now 'citizens' with equal rights under the same laws. This idea of a unified people sharing laws, language, and identity spread across Europe.\n\n2. Liberty, Equality, Fraternity:\nThese ideas inspired people across Europe to overthrow monarchies and create their own nation-states. The slogan spread revolutionary ideas beyond France.\n\nNapoleon's Role:\n• His Civil Code (1804) abolished feudal privileges and established equal laws\n• He removed the old aristocratic order in conquered regions\n• Paradoxically, his conquests triggered COUNTER-nationalism — people in Spain, Germany, and elsewhere began asserting their own national identities in opposition to French rule\n\nResult: By mid-19th century, nationalism led to unification of Germany and Italy, and independence movements across Europe."
    }]
  },

      q:"Name the eight limbs of Ashtanga Yoga. Which two are most commonly practiced for physical health?",
      a:"Eight Limbs of Ashtanga Yoga (Patanjali's Yoga Sutras):\n\n1. Yama — Moral restraints (non-violence, truthfulness, non-stealing, celibacy, non-possessiveness)\n2. Niyama — Personal disciplines (cleanliness, contentment, austerity, self-study, surrender to God)\n3. Asana — Physical postures (yoga poses for health and stability)\n4. Pranayama — Breath control (regulated breathing exercises)\n5. Pratyahara — Withdrawal of senses (turning inward, away from distractions)\n6. Dharana — Concentration (fixing mind on one point)\n7. Dhyana — Meditation (uninterrupted flow of concentration)\n8. Samadhi — Enlightenment (complete absorption, union with universal consciousness)\n\nMost commonly practiced for physical health:\n1. Asana (3rd limb): Physical postures like Tadasana, Trikonasana, Surya Namaskar improve flexibility, strength, and balance.\n2. Pranayama (4th limb): Breathing exercises like Anulom-Vilom, Kapalbhati improve respiratory function, reduce stress, and energize the body.\n\nTogether, Asana and Pranayama form the foundation of yoga as practiced worldwide for physical and mental wellness."

        <text x="250" y="56" text-anchor="middle" fill="#00c9a7" font-size="11" font-weight="bold">Tricki</text>
        <text x="195" y="76" fill="#dde1f0" font-size="9">• Mrs. P's dog</text>
        <text x="195" y="91" fill="#dde1f0" font-size="9">• Overfed, lazy</text>
        <text x="195" y="106" fill="#dde1f0" font-size="9">• Falls ill (obese)</text>

        <text x="195" y="151" fill="#ffcb47" font-size="9">True 'surgery'</text>
        <text x="195" y="166" fill="#ffcb47" font-size="9">= diet + exercise</text>
        <rect x="330" y="35" width="140" height="155" rx="8" fill="#1a2535" stroke="#ff8c42" stroke-width="1.5"/>
        <text x="400" y="56" text-anchor="middle" fill="#ff8c42" font-size="11" font-weight="bold">Dr. Herriot</text>
        <text x="340" y="76" fill="#dde1f0" font-size="9">• Vet surgeon</text>
        <text x="340" y="91" fill="#dde1f0" font-size="9">• Practical, witty</text>
        <text x="340" y="106" fill="#dde1f0" font-size="9">• Diagnoses quickly</text>
        <text x="340" y="121" fill="#dde1f0" font-size="9">• Diet as treatment</text>
        <text x="340" y="136" fill="#dde1f0" font-size="9">• Enjoys food sent!</text>
        <text x="340" y="151" fill="#ffcb47" font-size="9">Humorous,</text>
        <text x="340" y="166" fill="#ffcb47" font-size="9">honest narrator</text>
      </svg>`,
      caption:"Character map for 'A Triumph of Surgery'",
      q:"From the character map, what was the real 'triumph of surgery' in the story? What is the irony in the title?",
      a:"The Real 'Triumph of Surgery':\nThe story's title is deeply ironic. Dr. Herriot performs NO actual surgical operation. The 'triumph' was simply:\n• Separating Tricki from his overindulgent owner\n• Putting him on a strict diet (no food for first two days)\n• Making him exercise with other dogs at the surgery\n• Tricki naturally recovered through diet and physical activity\n\nThe 'Surgery' = the veterinary clinic/hospital, not a surgical procedure!\n\nIrony in the Title:\nMrs. Pumphrey believes Dr. Herriot performed a miraculous medical intervention. She calls it 'a triumph of surgery' and is overwhelmed with gratitude. But the truth is:\n• No medicine was given\n• No operation was performed\n• The cure was simply proper diet and exercise — what the owner should have been doing all along\n\nFurther irony: Dr. Herriot and his colleagues enjoyed eating Mrs. Pumphrey's expensive food hampers (sent for Tricki) — a humorous self-confessed benefit.\n\nMessage: Misguided, excessive love can harm those we care for. True care means responsible decisions, not emotional overindulgence."
    }]
  }
};

// Merge extra math chapters
Object.assign(QUESTIONS_DB.mathematics, MATH_EXTRA);

// Merge all image questions
const dbMap = {
  mathematics: QUESTIONS_DB.mathematics,
  science: SCIENCE_QUESTIONS_DB.science,
  english_ff: ENGLISH_FF_QUESTIONS_DB.english_ff,
  english_fp: ENGLISH_FP_QUESTIONS_DB.english_fp,
  social_dp: SOCIAL_DP_QUESTIONS_DB.social_dp,
  social_eco: SOCIAL_ECO_QUESTIONS_DB.social_eco,
  social_hist: SOCIAL_HIST_QUESTIONS_DB.social_hist,
  social_ci: SOCIAL_CI_QUESTIONS_DB.social_ci,
  hpe: HPE_QUESTIONS_DB.hpe,
};

Object.keys(ALL_IMAGE_QUESTIONS).forEach(subject => {
  const db = dbMap[subject];
  if (!db) return;
  Object.keys(ALL_IMAGE_QUESTIONS[subject]).forEach(ch => {
    if (db[ch]) db[ch].image = ALL_IMAGE_QUESTIONS[subject][ch];
  });
});

const ALL_QUESTIONS = {
  mathematics:  QUESTIONS_DB.mathematics,
  science:      SCIENCE_QUESTIONS_DB.science,
  english_ff:   ENGLISH_FF_QUESTIONS_DB.english_ff,
  english_fp:   ENGLISH_FP_QUESTIONS_DB.english_fp,
  english_we:   ENGLISH_WE_QUESTIONS_DB.english_we,
  hpe:          HPE_QUESTIONS_DB.hpe,
  social_ci:    SOCIAL_CI_QUESTIONS_DB.social_ci,
  social_dp:    SOCIAL_DP_QUESTIONS_DB.social_dp,
  social_eco:   SOCIAL_ECO_QUESTIONS_DB.social_eco,
  social_hist:  SOCIAL_HIST_QUESTIONS_DB.social_hist,
};
</script>
<script>
/* ─────────────────────────── CONFIG ─────────────────────────── */
const SUBJECTS = {
  mathematics: {
    label:'Mathematics', icon:'📐', color:'#7c6dff',
    desc:'14 Chapters · Algebra, Geometry, Trigonometry & more',
    books:[{key:'mathematics', label:'Mathematics', icon:'📐'}]
  },
  science: {
    label:'Science', icon:'🔬', color:'#00c9a7',
    desc:'13 Chapters · Physics, Chemistry & Biology',
    books:[{key:'science', label:'Science', icon:'🔬'}]
  },
  english: {
    label:'English', icon:'📚', color:'#ffcb47',
    desc:'3 Books · Literature, Supplementary & Grammar',
    books:[
      {key:'english_ff', label:'First Flight',           icon:'✈️'},
      {key:'english_fp', label:'Footprints Without Feet', icon:'👣'},
      {key:'english_we', label:'Words & Expressions',    icon:'✍️'},
    ]
  },
  social: {
    label:'Social Science', icon:'🌍', color:'#ff8c42',
    desc:'4 Books · History, Civics, Geography & Economics',
    books:[
      {key:'social_ci',   label:'Contemporary India',      icon:'🗺️'},
      {key:'social_dp',   label:'Democratic Politics',      icon:'🏛️'},
      {key:'social_hist', label:'India & the World',        icon:'📜'},
      {key:'social_eco',  label:'Understanding Economics',  icon:'💰'},
    ]
  },
  hpe: {
    label:'Health & PE', icon:'⚽', color:'#ff5c5c',
    desc:'13 Chapters · Health, Sports, Yoga & Fitness',
    books:[{key:'hpe', label:'Health & Physical Education', icon:'🏃'}]
  },
};

const QTYPES = [
  {key:'mcq',     label:'MCQ Quiz',        icon:'🎯', color:'var(--acc)', desc:'Multiple choice · Instant feedback'},
  {key:'short',   label:'Short Answer',    icon:'📝', color:'var(--grn)', desc:'2–3 mark questions'},
  {key:'long',    label:'Long Answer',     icon:'📄', color:'var(--yel)', desc:'5 mark detailed answers'},
  {key:'passage', label:'Passage / Case',  icon:'📖', color:'var(--ora)', desc:'Comprehension & case-based'},
  {key:'image',   label:'Image / Diagram', icon:'🖼️', color:'var(--red)', desc:'Diagram & graph based'},
];

/* ─────────────────────────── STATE ─────────────────────────── */
let ST = {
  subKey:null, book:null, chapter:null, qtype:null,
  hist:[],
  mcqQs:[], mcqIdx:0, mcqAns:{}, mcqScore:0,
};

/* ─────────────────────────── NAVIGATION ─────────────────────────── */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('S-'+id).classList.add('active');
  window.scrollTo(0,0);
}
function nav(id,push=true){ if(push) ST.hist.push(id); show(id); }
function goHome(){ ST.hist=['home']; buildHome(); show('home'); }
function goBack(){
  if(ST.hist.length>1){
    ST.hist.pop();
    const prev=ST.hist[ST.hist.length-1];
    redraw(prev); show(prev);
  } else goHome();
}
function redraw(id){
  if(id==='home') buildHome();
  else if(id==='books') buildBooks();
  else if(id==='chapters') buildChapters();
  else if(id==='qtypes') buildQTypes();
  else if(id==='mcq') startMCQ();
  else if(id==='qa') buildQA();
  else if(id==='passage') buildPassage();
  else if(id==='image') buildImageQs();
}

/* ─────────────────────────── HOME ─────────────────────────── */
function buildHome(){
  const g = document.getElementById('home-grid');
  g.innerHTML = Object.entries(SUBJECTS).map(([k,s])=>`
    <div class="sub-card" style="--c:${s.color}" onclick="openSubject('${k}')">
      <div class="sub-stripe"></div>
      <span class="sub-icon">${s.icon}</span>
      <div class="sub-name">${s.label}</div>
      <div class="sub-desc">${s.desc}</div>
      <div class="sub-meta">
        <div class="sub-tag">${s.books.length>1 ? s.books.length+' Books' : 'View Chapters'}</div>
        <div class="sub-arr">→</div>
      </div>
    </div>`).join('');
}

function openSubject(k){
  ST.subKey=k; ST.hist=['home'];
  const sub = SUBJECTS[k];
  if(sub.books.length===1){
    ST.book = sub.books[0];
    nav('chapters'); buildChapters();
  } else {
    nav('books'); buildBooks();
  }
}

/* ─────────────────────────── BOOKS ─────────────────────────── */
function buildBooks(){
  const sub = SUBJECTS[ST.subKey];
  document.getElementById('books-title').textContent = sub.label;
  document.getElementById('bc-books').innerHTML =
    `<span>${sub.icon} ${sub.label}</span>`;

  document.getElementById('books-grid').innerHTML = sub.books.map((b,i)=>{
    const cnt = ALL_QUESTIONS[b.key] ? Object.keys(ALL_QUESTIONS[b.key]).length : 0;
    return `
      <div class="book-card" style="--c:${sub.color}" onclick="openBook(${i})">
        <div class="book-stripe"></div>
        <div class="book-icon">${b.icon}</div>
        <div class="book-name">${b.label}</div>
        <div class="book-cnt">${cnt} chapters</div>
      </div>`;
  }).join('');
}

function openBook(i){
  ST.book = SUBJECTS[ST.subKey].books[i];
  nav('chapters'); buildChapters();
}

/* ─────────────────────────── CHAPTERS ─────────────────────────── */
let _chapters = [];

function buildChapters(){
  const sub = SUBJECTS[ST.subKey], b = ST.book;
  document.getElementById('ch-title').textContent = b.label;
  document.getElementById('ch-sub').textContent = 'Select a chapter to practise';

  // breadcrumb
  const multi = sub.books.length > 1;
  document.getElementById('bc-chapters').innerHTML = `
    <span class="crumb" onclick="goHome()">Home</span><span class="sep">›</span>
    ${multi ? `<span class="crumb" onclick="goBack()">${sub.label}</span><span class="sep">›</span>` : ''}
    <span>${b.label}</span>`;

  _chapters = Object.keys(ALL_QUESTIONS[b.key]||{});

  // stats
  const totalQ = _chapters.reduce((acc,ch)=>{
    const d = ALL_QUESTIONS[b.key][ch];
    return acc + (d.mcq||[]).length + (d.short||[]).length + (d.long||[]).length + (d.passage||[]).length;
  },0);
  document.getElementById('ch-stats').innerHTML = `
    <div class="stat-chip">📚 <span>${_chapters.length}</span> Chapters</div>
    <div class="stat-chip">❓ <span>${totalQ}</span> Total Questions</div>`;

  document.getElementById('ch-search').value = '';
  renderChList(_chapters);
}

function renderChList(list){
  const el = document.getElementById('ch-list');
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No chapters found</div></div>';
    return;
  }
  const bk = ST.book.key;
  el.innerHTML = list.map((ch,i)=>{
    const d = (ALL_QUESTIONS[bk]||{})[ch]||{};
    const badges = [
      d.mcq?.length    ? `${d.mcq.length} MCQ`  : '',
      d.short?.length  ? `${d.short.length} SA`  : '',
      d.long?.length   ? `${d.long.length} LA`   : '',
      d.passage?.length? `${d.passage.length} PA`: '',
    ].filter(Boolean);
    return `
      <div class="ch-item" onclick="openChapter(this)" data-ch="${ch.replace(/"/g,'&quot;')}">
        <div class="ch-num">${String(i+1).padStart(2,'0')}</div>
        <div class="ch-name">${ch}</div>
        <div class="ch-badges">${badges.map(b=>`<span class="ch-badge">${b}</span>`).join('')}</div>
        <div class="ch-arr">›</div>
      </div>`;
  }).join('');
}

function filterChapters(){
  const q = document.getElementById('ch-search').value.toLowerCase();
  renderChList(_chapters.filter(c=>c.toLowerCase().includes(q)));
}

function openChapter(el){ const ch = (el && el.dataset && el.dataset.ch) ? el.dataset.ch : el;
  ST.chapter = ch;
  nav('qtypes'); buildQTypes();
}

/* ─────────────────────────── QTYPES ─────────────────────────── */
function buildQTypes(){
  const sub = SUBJECTS[ST.subKey], b = ST.book, ch = ST.chapter;
  document.getElementById('qt-ch-name').textContent = ch;

  const multi = sub.books.length > 1;
  document.getElementById('bc-qtypes').innerHTML = `
    <span class="crumb" onclick="goHome()">Home</span><span class="sep">›</span>
    ${multi ? `<span class="crumb" onclick="goBack()">${b.label}</span><span class="sep">›</span>` : ''}
    <span class="crumb" onclick="goBack()">${b.label}</span><span class="sep">›</span>
    <span>${trunc(ch,28)}</span>`;

  const data = (ALL_QUESTIONS[b.key]||{})[ch]||{};
  document.getElementById('qt-grid').innerHTML = QTYPES.map(qt=>{
    const qs = data[qt.key]||[];
    const empty = !qs.length;
    const cls = 'qt-card' + (empty ? ' disabled' : '');
    const count = empty ? 'Not available' : qs.length + ' question' + (qs.length !== 1 ? 's' : '');
    const clickAttr = empty ? '' : ' onclick="openQType(this)" data-key="' + qt.key + '"';
    return '<div class="' + cls + '" style="--c:' + qt.color + '"' + clickAttr + '>'
      + '<div class="qt-icon">' + qt.icon + '</div>'
      + '<div class="qt-label">' + qt.label + '</div>'
      + '<div class="qt-count">' + count + '</div>'
      + '</div>';
  }).join('');
}

function openQType(el){ const qt = (el && el.dataset && el.dataset.key) ? el.dataset.key : el;
  ST.qtype = qt;
  if(qt==='mcq'){ nav('mcq'); startMCQ(); }
  else if(qt==='passage'){ nav('passage'); buildPassage(); }
  else if(qt==='image'){ nav('image'); buildImageQs(); }
  else { nav('qa'); buildQA(); }
}

/* ─────────────────────────── MCQ ENGINE ─────────────────────────── */
function startMCQ(){
  const data = (ALL_QUESTIONS[ST.book.key]||{})[ST.chapter]||{};
  ST.mcqQs  = data.mcq||[];
  ST.mcqIdx = 0; ST.mcqAns = {}; ST.mcqScore = 0;

  document.getElementById('bc-mcq').innerHTML = `
    <span class="crumb" onclick="goHome()">Home</span><span class="sep">›</span>
    <span class="crumb" onclick="goBack()">${trunc(ST.chapter,24)}</span><span class="sep">›</span>
    <span>MCQ Quiz</span>`;

  drawMCQ();
}

function drawMCQ(){
  const total = ST.mcqQs.length, idx = ST.mcqIdx;
  if(!total){ nav('score',false); drawScore(); return; }

  const q = ST.mcqQs[idx];
  const answered = ST.mcqAns[idx] !== undefined;
  const done = Object.keys(ST.mcqAns).length;

  document.getElementById('mcq-ctr').textContent = `Question ${idx+1} of ${total}`;
  document.getElementById('mcq-pb').style.width = `${((idx+1)/total)*100}%`;
  document.getElementById('mcq-live').textContent = done ? `✓ ${ST.mcqScore}/${done}` : '';

  document.getElementById('mcq-q').innerHTML =
    `<div class="mcq-qnum">Q${idx+1}</div>${esc(q.q)}`;

  const L = ['A','B','C','D'];
  document.getElementById('mcq-opts').innerHTML = q.opts.map((o,i)=>{
    let cls = 'opt';
    if(answered){
      cls += ' locked';
      if(i===q.ans) cls += ' correct';
      else if(i===ST.mcqAns[idx]) cls += ' wrong';
    }
    return `
      <div class="${cls}" onclick="${answered?'':'pickOpt('+i+')'}">
        <div class="opt-letter">${L[i]}</div>
        <div class="opt-text">${esc(o)}</div>
      </div>`;
  }).join('');

  document.getElementById('btn-prev').disabled = idx===0;
  const nb = document.getElementById('btn-next');
  nb.textContent = idx===total-1 ? 'Finish ✓' : 'Next →';
  nb.disabled = !answered;
}

function pickOpt(i){
  if(ST.mcqAns[ST.mcqIdx] !== undefined) return;
  ST.mcqAns[ST.mcqIdx] = i;
  const correct = i === ST.mcqQs[ST.mcqIdx].ans;
  if(correct){ ST.mcqScore++; showToast('✅ Correct!','ok'); }
  else showToast('❌ Wrong! Answer: '+['A','B','C','D'][ST.mcqQs[ST.mcqIdx].ans],'err');
  drawMCQ();
}

function mcqNext(){
  if(ST.mcqIdx < ST.mcqQs.length-1){ ST.mcqIdx++; drawMCQ(); }
  else { nav('score'); drawScore(); }
}
function mcqPrev(){ if(ST.mcqIdx>0){ ST.mcqIdx--; drawMCQ(); } }

function drawScore(){
  const t=ST.mcqQs.length, s=ST.mcqScore, p=t?Math.round(s/t*100):0;
  document.getElementById('sc-n').textContent = s;
  document.getElementById('sc-d').textContent = '/ '+t;
  document.getElementById('sc-title').textContent =
    p>=90?'🏆 Outstanding!':p>=75?'🥇 Excellent!':p>=60?'👍 Good Job!':p>=40?'📚 Keep Going!':'💪 Study More!';
  document.getElementById('sc-msg').textContent = ST.chapter;
  document.getElementById('sc-pct').textContent = `${p}% · ${s} correct out of ${t}`;

  // colour ring
  const ring = document.querySelector('.score-ring');
  const col = p>=75?'var(--grn)':p>=40?'var(--yel)':'var(--red)';
  ring.style.borderColor = col;
  ring.style.background = p>=75?'var(--grn-dim)':p>=40?'var(--yel-dim)':'var(--red-dim)';
  document.querySelector('.score-n').style.color = col;
}

function retryMCQ(){ nav('mcq',false); startMCQ(); }

/* ─────────────────────────── SHORT / LONG Q&A ─────────────────────────── */
let _qaAllVisible = false;

function buildQA(){
  const qt=ST.qtype, ch=ST.chapter, bk=ST.book.key;
  const data = (ALL_QUESTIONS[bk]||{})[ch]||{};
  const qs = data[qt]||[];
  _qaAllVisible = false;
  document.getElementById('toggle-all-btn').textContent = 'Show All';

  const labels = {short:'Short Answer Questions',long:'Long Answer Questions'};
  const icons  = {short:'📝',long:'📄'};
  const marks  = {short:'(2–3 marks each)',long:'(5 marks each)'};

  document.getElementById('qa-title').textContent = ch;
  document.getElementById('qa-sub').textContent =
    `${icons[qt]} ${labels[qt]} ${marks[qt]} · ${qs.length} question${qs.length!==1?'s':''}`;

  document.getElementById('bc-qa').innerHTML = `
    <span class="crumb" onclick="goHome()">Home</span><span class="sep">›</span>
    <span class="crumb" onclick="goBack()">${trunc(ch,22)}</span><span class="sep">›</span>
    <span>${labels[qt]}</span>`;

  const wrap = document.getElementById('qa-list');
  if(!qs.length){
    wrap.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No questions available</div></div>';
    return;
  }

  wrap.innerHTML = qs.map((item,i)=>`
    <div class="qa-card">
      <div class="qa-q-row" onclick="togQA(${i})">
        <div class="qa-q-left">
          <div class="qa-qnum">Q${i+1} · ${qt==='short'?'Short':'Long'} Answer</div>
          <div class="qa-qtext">${esc(item.q)}</div>
        </div>
        <div class="qa-chevron" id="qach-${i}">⌄</div>
      </div>
      <div class="qa-answer" id="qaa-${i}">
        <div class="qa-answer-label">▸ ANSWER</div>
        ${esc(item.a)}
      </div>
    </div>`).join('');
}

function togQA(i){
  const a=document.getElementById('qaa-'+i);
  const c=document.getElementById('qach-'+i);
  const v=a.classList.toggle('visible');
  c.classList.toggle('open',v);
}

function toggleAll(){
  _qaAllVisible = !_qaAllVisible;
  document.getElementById('toggle-all-btn').textContent = _qaAllVisible?'Hide All':'Show All';
  document.querySelectorAll('.qa-answer').forEach((el,i)=>{
    el.classList.toggle('visible',_qaAllVisible);
    const c=document.getElementById('qach-'+i);
    if(c) c.classList.toggle('open',_qaAllVisible);
  });
}

/* ─────────────────────────── PASSAGE / CASE-BASED ─────────────────────────── */
let _passAllVisible = false;

function buildPassage(){
  const ch=ST.chapter, bk=ST.book.key;
  const data = (ALL_QUESTIONS[bk]||{})[ch]||{};
  const qs = data.passage||[];
  _passAllVisible = false;
  document.getElementById('passage-toggle-btn').textContent = 'Show All';

  document.getElementById('passage-title').textContent = ch;
  document.getElementById('passage-sub').textContent =
    `📖 Passage / Case-Based Questions · ${qs.length} question${qs.length!==1?'s':''}`;

  document.getElementById('bc-passage').innerHTML = `
    <span class="crumb" onclick="goHome()">Home</span><span class="sep">›</span>
    <span class="crumb" onclick="goBack()">${trunc(ch,22)}</span><span class="sep">›</span>
    <span>Passage / Case</span>`;

  const wrap = document.getElementById('passage-list');
  if(!qs.length){
    wrap.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No passage questions available</div></div>';
    return;
  }

  // Each passage item has q (which contains the passage + sub-questions) and a (the full answer)
  // We render each as a structured card
  wrap.innerHTML = qs.map((item,i)=>{
    // Try to split passage from questions in the q field
    // Pattern: passage text above, then sub-questions (a), (b), (c)...
    const qText = item.q || '';
    const aText = item.a || '';

    // Split the question into passage portion and sub-questions
    const subqMatch = qText.match(/^([\s\S]*?)(\n\s*\(a\)[\s\S]*)$/);
    const hasSubQ = subqMatch && subqMatch[2];
    const passageBody = hasSubQ ? subqMatch[1].trim() : qText.trim();
    const subQBody    = hasSubQ ? subqMatch[2].trim() : '';

    // Split answers by (a), (b), (c), (d)
    const subAs = aText.split(/\n(?=\((?:[a-d])\))/i).filter(Boolean);

    return `
      <div class="imgp-card" id="passage-card-${i}">
        <div class="imgp-label">📖 PASSAGE / CASE STUDY ${i+1}</div>
        <div class="imgp-context">${esc(passageBody)}</div>
        ${subQBody ? `
        <div class="passage-questions">
          <div style="font-size:.72rem;font-weight:700;color:var(--yel);font-family:var(--mono);letter-spacing:.5px;margin-bottom:6px">▸ QUESTIONS</div>
          <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);padding:13px 15px;font-size:.88rem;line-height:1.7;white-space:pre-wrap">${esc(subQBody)}</div>
        </div>` : ''}
        <div style="margin-top:12px">
          <div class="pq-item">
            <div class="pq-row" onclick="togPassage(${i})">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:.7rem;font-weight:700;color:var(--grn);font-family:var(--mono)">▸ ANSWER</span>
                <span style="font-size:.82rem;font-weight:600;color:var(--muted)">Tap to reveal</span>
              </div>
              <div class="qa-chevron" id="pach-${i}">⌄</div>
            </div>
            <div class="pq-ans" id="paa-${i}">
              <div style="font-size:.65rem;font-weight:700;color:var(--grn);font-family:var(--mono);letter-spacing:.5px;margin-bottom:8px">▸ DETAILED ANSWER</div>
              ${esc(aText)}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function togPassage(i){
  const a=document.getElementById('paa-'+i);
  const c=document.getElementById('pach-'+i);
  const v=a.classList.toggle('visible');
  c.classList.toggle('open',v);
}

function togglePassageAll(){
  _passAllVisible = !_passAllVisible;
  document.getElementById('passage-toggle-btn').textContent = _passAllVisible?'Hide All':'Show All';
  document.querySelectorAll('.pq-ans').forEach((el,i)=>{
    el.classList.toggle('visible',_passAllVisible);
    const c=document.getElementById('pach-'+i);
    if(c) c.classList.toggle('open',_passAllVisible);
  });
}

/* ─────────────────────────── UTILS ─────────────────────────── */
function esc(s){
  return (s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}
function trunc(s,n){ return s && s.length>n ? s.slice(0,n)+'…' : s; }

let _toastTimer;
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>{ t.className='toast'; },2000);
}

/* ─────────────────────────── IMAGE / DIAGRAM Q&A ─────────────────────────── */
let _imgAllVisible = false;

function buildImageQs(){
  const ch=ST.chapter, bk=ST.book.key;
  const data = (ALL_QUESTIONS[bk]||{})[ch]||{};
  const qs = data.image||[];
  _imgAllVisible = false;
  document.getElementById('image-toggle-btn').textContent = 'Show All';

  document.getElementById('image-title').textContent = ch;
  document.getElementById('image-sub').textContent =
    `🖼️ Image / Diagram Based Questions · ${qs.length} question${qs.length!==1?'s':''}`;

  document.getElementById('bc-image').innerHTML = `
    <span class="crumb" onclick="goHome()">Home</span><span class="sep">›</span>
    <span class="crumb" onclick="goBack()">${trunc(ch,22)}</span><span class="sep">›</span>
    <span>Image Questions</span>`;

  const wrap = document.getElementById('image-list');
  if(!qs.length){
    wrap.innerHTML='<div class="empty"><div class="empty-icon">🖼️</div><div class="empty-text">No image-based questions for this chapter</div></div>';
    return;
  }

  wrap.innerHTML = qs.map((item,i)=>`
    <div class="imgq-wrap">
      <div class="imgq-header">
        <span class="imgq-badge">🖼️ DIAGRAM Q${i+1}</span>
        <span class="imgq-title">Image / Diagram Based Question</span>
      </div>
      <div class="imgq-svg-wrap">${item.svg||''}</div>
      <div class="imgq-caption">${esc(item.caption||'')}</div>
      <div class="imgq-body">
        <div class="imgq-q">${esc(item.q)}</div>
        <button class="imgq-reveal-btn" id="imgbtn-${i}" onclick="togImgAns(${i})">
          ▸ Show Answer
        </button>
        <div class="imgq-answer" id="imga-${i}">
          <div class="imgq-ans-label">▸ DETAILED ANSWER</div>
          ${esc(item.a)}
        </div>
      </div>
    </div>`).join('');
}

function togImgAns(i){
  const a = document.getElementById('imga-'+i);
  const btn = document.getElementById('imgbtn-'+i);
  const v = a.classList.toggle('visible');
  btn.textContent = v ? '▸ Hide Answer' : '▸ Show Answer';
}

function toggleImageAll(){
  _imgAllVisible = !_imgAllVisible;
  document.getElementById('image-toggle-btn').textContent = _imgAllVisible?'Hide All':'Show All';
  document.querySelectorAll('.imgq-answer').forEach((el,i)=>{
    el.classList.toggle('visible',_imgAllVisible);
    const btn=document.getElementById('imgbtn-'+i);
    if(btn) btn.textContent = _imgAllVisible?'▸ Hide Answer':'▸ Show Answer';
  });
}

/* ─────────────────────────── INIT ─────────────────────────── */
buildHome();
</script>
