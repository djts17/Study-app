      long: [
        {q:"Describe the major plantation crops of India — tea, coffee and rubber. Include their growing conditions, major producing states and importance.",a:"1. TEA:\nGrowing conditions:\n• Temperature: 20-30°C with frost-free conditions\n• Rainfall: 150-250 cm, well distributed throughout year\n• Soil: Deep, fertile well-drained soil, rich in humus\n• Slopes preferred (water doesn't stagnate)\n\nMajor producing states: Assam, West Bengal (Darjeeling and Jalpaiguri), Tamil Nadu, Kerala\nIndia is SECOND LARGEST producer in world (China is first) and largest exporter\n\n2. COFFEE:\nGrowing conditions:\n• Temperature: 15-28°C\n• Rainfall: 150-250 cm\n• Shade trees needed\n• Well-drained soil\n\nArabica variety (superior quality) introduced from Yemen\nMajor producing states: Karnataka (Coorg/Baba Budan Hills), Kerala, Tamil Nadu\nIndia mainly produces Arabica coffee\n\n3. RUBBER:\nGrowing conditions:\n• Equatorial climate — hot and wet throughout year\n• Temperature: Above 25°C\n• Rainfall: 200 cm, evenly distributed\n• Deep, well-drained soil\n\nMajor producing states: Kerala (70%), Tamil Nadu, Karnataka, Andaman & Nicobar Islands\nIndia is FIFTH LARGEST producer in world\n\nIMPORTANCE:\n• All are plantation crops with high commercial value\n• Major export earners\n• Provide employment to millions in hilly regions\n• India known globally for quality tea and coffee"}

      passage: [
        {q:"'Two-thirds of India's population is engaged in agricultural activities. Agriculture is a primary activity which produces most of the food that we consume. Besides food grains, it also produces raw material for various industries.'\n\n(a) Why is agriculture called a 'primary activity'?\n(b) Name two industries that depend on agricultural raw materials.\n(c) What are the main types of farming practised in India?\n(d) What is 'jhumming' and where is it practised?",a:"(a) Agriculture is called a primary activity because it involves direct extraction/collection from nature (land). Primary activities are those that directly use natural resources — farming, fishing, forestry and mining. Agriculture directly produces food from land using natural soil, water and sunlight.\n\n(b) Two industries dependent on agricultural raw materials:\n1. Textile industry — uses cotton, jute and silk from agriculture\n2. Sugar industry — uses sugarcane\n(Other examples: Oil mills use oilseeds; tea/coffee processing industries; rubber industry)\n\n(c) Main types of farming in India:\n1. Primitive subsistence farming (slash and burn)\n2. Intensive subsistence farming\n3. Commercial farming\n4. Plantation farming\n5. Mixed farming\n\n(d) Jhumming is the local name for 'slash and burn' agriculture in north-eastern states of India (Assam, Meghalaya, Mizoram, Nagaland). Farmers clear a patch of forest by cutting and burning trees, cultivate for a few years until soil fertility decreases, then shift to another patch. Also called shifting cultivation. It is known as Pamlou in Manipur and Dipa in Bastar, Chhattisgarh."}

      short: [
        {q:"How are minerals classified based on their chemical and physical properties? Give examples.",a:"FERROUS MINERALS (contain iron):\n• Examples: Iron ore, manganese, nickel, cobalt\n• Form the backbone of industrial development\n• India has large reserves; is a major exporter of iron ore\n\nNON-FERROUS MINERALS (don't contain iron):\n• Examples: Copper, bauxite (aluminium ore), gold, silver, lead, zinc\n• Essential for various industries\n\nNON-METALLIC MINERALS (neither metals):\n• Examples: Limestone, mica, gypsum, salt\n• Limestone: Used in cement and chemical industries\n• Mica: Used in electrical and electronic industries\n\nENERGY MINERALS:\n• Coal, petroleum, natural gas, uranium\n• Used as fuel and for generating electricity\n\nBased on MODE OF OCCURRENCE:\n• In veins and lodes (igneous/metamorphic rocks)\n• In sedimentary rocks (coal, gypsum, limestone)\n• In alluvial deposits (gold, tin)"},
        {q:"Describe the importance of coal in India's economy. What are its types?",a:"COAL — MOST ABUNDANT ENERGY RESOURCE OF INDIA:\n• Provides 65% of India's commercial energy\n• Used for: Electricity generation (thermal power plants), industries (steel, cement), railways, domestic use\n\nTYPES (in order of carbon content and quality):\n1. ANTHRACITE: Highest quality, highest carbon content (>80%), very hard, found in small quantities\n2. BITUMINOUS: Most commonly used, used in metallurgy, iron/steel industry, thermal power\n3. LIGNITE: Low carbon, high moisture content, found mainly in Neyveli (Tamil Nadu)\n4. PEAT: Lowest carbon content, poor quality\n\nMAJOR COALFIELDS:\n• Gondwana coal: Damodar Valley (Jharkhand, West Bengal), Jharia, Raniganj, Bokaro\n• Tertiary coal: Assam, Meghalaya, Nagaland, Arunachal Pradesh; Neyveli (Tamil Nadu)\n\nMAJOR PRODUCERS: Jharkhand, Odisha, West Bengal, Chhattisgarh, Madhya Pradesh"},
        {q:"Describe any three non-conventional energy sources in India.",a:"1. SOLAR ENERGY:\n• India — a tropical country with 300+ sunny days per year\n• Rajasthan and Gujarat have highest solar potential\n• Used in: Solar cookers, heaters, photovoltaic cells (electricity)\n• Solar Mission aims to make India world's largest solar energy producer\n• Advantage: Pollution-free, renewable, free fuel\n\n2. WIND ENERGY:\n• India is 5th largest wind power producer in world\n• Wind farms in Tamil Nadu (largest — Muppandal), Rajasthan, Maharashtra, Gujarat, Karnataka, Kerala\n• India has potential of 45,000 MW wind power\n• Advantage: Renewable, no pollution, no fuel cost\n\n3. BIOGAS:\n• Produced from organic waste (plant/animal waste, sewage)\n• Biogas plants (gobar gas plants) in rural areas\n• Used for: Cooking fuel, electricity generation\n• National Biogas and Manure Management Programme promotes its use\n• Advantage: Converts waste to energy; by-product (slurry) is excellent fertiliser"}

      long: [
        {q:"Distinguish between conventional and non-conventional sources of energy. Why is India promoting non-conventional energy?",a:"CONVENTIONAL SOURCES:\n• Coal, petroleum, natural gas, firewood, nuclear energy\n• Used since long time; familiar technology\n• Mostly NON-RENEWABLE (coal, petroleum, gas)\n• Polluting — produce CO₂, SO₂, greenhouse gases\n• Being rapidly depleted\n• Concentrated in specific regions\n\nNON-CONVENTIONAL SOURCES:\n• Solar, wind, tidal, geothermal, biogas, ocean thermal energy\n• Mostly RENEWABLE and inexhaustible\n• Clean/pollution-free (most)\n• Distributed — available everywhere\n• Newer technology, higher initial costs\n• Lower running costs\n\nWHY INDIA IS PROMOTING NON-CONVENTIONAL:\n1. DEPLETION: Fossil fuels (coal, petroleum) are rapidly being exhausted\n2. ENVIRONMENT: Burning fossil fuels causes air pollution and climate change\n3. ENERGY SECURITY: India imports 80%+ of petroleum — drain on foreign exchange\n4. RURAL NEEDS: Non-conventional energy can serve remote areas without electricity grid\n5. INDIA'S POTENTIAL: India has enormous potential — abundant sunlight, wind, biomass\n6. GLOBAL COMMITMENTS: Climate change agreements require reducing fossil fuel use\n7. EMPLOYMENT: Renewable energy sector creates jobs\n\nGOVERNMENT INITIATIVES: National Solar Mission, National Wind Mission, Biogas plants, targets for renewable energy in National Energy Policy."}
      ],
      passage: [
        {q:"Study the following about energy resources:\n\n'India imports more than 80% of its petroleum requirement. The reserves are limited. At the same time, India has immense potential for solar, wind and tidal energy. The National Solar Mission aims to develop India as a global leader in solar energy.'\n\n(a) Why is India's dependence on petroleum imports a problem?\n(b) What are the major petroleum-producing regions in India?\n(c) Why is solar energy particularly suitable for India?\n(d) What is the significance of the National Solar Mission?",a:"(a) India's dependence on petroleum imports is a problem because:\n• It drains huge amounts of foreign exchange (billions of dollars annually)\n• Makes India vulnerable to global oil price fluctuations\n• Creates energy security risk — any disruption in supply affects the entire economy\n• Increases trade deficit and weakens the economy\n\n(b) Major petroleum-producing regions:\n• Mumbai High (offshore, Arabian Sea) — largest producer\n• Gujarat — Ankeleshwar, Kalol\n• Assam — Digboi (oldest oilfield in Asia, 1867), Naharkatiya, Moran\n• Rajasthan — Barmer (recent discovery)\n• Krishna-Godavari basin\n\n(c) Solar energy is suitable for India because:\n• India is a tropical country with 300+ sunny days per year\n• Receives 5-7 kWh/m² of solar radiation daily\n• Vast arid areas (Rajasthan, Gujarat) with very high solar radiation\n• Can serve rural areas not connected to grid\n• Abundant free 'fuel' — no fuel costs after installation\n\n(d) Significance of National Solar Mission:\n• Part of National Action Plan on Climate Change\n• Aims to make India a global leader in solar energy\n• Target: 100 GW solar by 2022 (later extended)\n• Reduces dependence on imported fossil fuels\n• Creates green jobs and clean energy for millions"}

      short: [
        {q:"Explain the importance of manufacturing industries in India's development.",a:"IMPORTANCE OF MANUFACTURING INDUSTRIES:\n\n1. TRANSFORMATION OF ECONOMY: Changes from an agrarian economy to industrial and service economy — essential for development.\n\n2. EMPLOYMENT: Provides employment to millions — both directly in factories and indirectly in supporting services.\n\n3. GDP CONTRIBUTION: Manufacturing contributes significantly to India's GDP — reduces dependence on primary sector.\n\n4. SELF-RELIANCE: Reduces dependence on foreign goods — India makes steel, textiles, chemicals, electronics.\n\n5. RAW MATERIAL UTILISATION: Processes India's abundant natural resources (iron ore, cotton, sugarcane) into valuable products.\n\n6. EXPORTS: Manufactured goods (textiles, software, chemicals, engineering goods) earn foreign exchange.\n\n7. MULTIPLIER EFFECT: Growth of one industry stimulates others (steel industry stimulates automobile, construction).\n\n8. POVERTY REDUCTION: Industrial growth provides jobs and raises living standards."},
        {q:"Why is the iron and steel industry called a 'basic' industry?",a:"IRON AND STEEL — A BASIC/KEY INDUSTRY because:\n\nAll other industries depend on it for their machinery and infrastructure:\n• Machinery for all industries is made of steel\n• Construction (buildings, bridges, railways) uses steel\n• Automobiles, ships, aircraft all use steel\n• Agricultural machinery (tractors, ploughs) uses steel\n\nCHAIN OF DEPENDENCY:\nSteel → Tools/Machines → ALL other industries\n\nLOCATION FACTORS:\n• Raw materials: Iron ore, coal (coking), manganese, limestone — ideally nearby\n• Water: Large quantities needed for cooling\n• Transport: Railways to bring raw materials and ship products\n• Labour: Both skilled and unskilled\n• Capital: Very high initial investment\n\nMAJOR STEEL PLANTS:\n• Jamshedpur (TISCO) — private sector, oldest\n• Bhilai (SAIL) — with Soviet help\n• Durgapur — with UK help\n• Rourkela — with German help\n• Bokaro — with Soviet help"},
        {q:"What is the significance of the IT and software industry in India?",a:"IT AND SOFTWARE INDUSTRY — INDIA'S STRENGTH:\n\n1. EXPORT EARNINGS: India is world's largest software exporter — earns $100+ billion annually in software exports\n\n2. EMPLOYMENT: Employs millions of educated workers — reduced 'brain drain' by providing high-paying jobs in India\n\n3. BENGALURU — 'SILICON VALLEY OF INDIA': Major hub with world-class companies and talent\n\n4. OTHER HUBS: Hyderabad ('Cyberabad'), Mumbai, Chennai, Kolkata, Pune, Ahmedabad\n\n5. ADVANTAGES India has:\n• Large pool of English-speaking, technically qualified professionals\n• Lower labour costs compared to USA/Europe\n• Time zone advantage (24-hour service to USA/Europe)\n• Strong mathematical and scientific tradition\n\n6. SPILLOVER BENEFITS:\n• Growth of infrastructure (airports, roads, housing)\n• Rise of support services (food, transport, retail)\n• Attracted foreign investment\n• Increased tax revenues for government"}

      long: [
        {q:"Discuss the environmental degradation caused by industries and the measures to control it.",a:"ENVIRONMENTAL DEGRADATION BY INDUSTRIES:\n\nAIR POLLUTION:\n• Smoke and harmful gases (SO₂, CO₂, CO, NO) from factories\n• Suspended particles cause respiratory diseases\n• Thermal power plants, steel plants, chemical industries major culprits\n\nWATER POLLUTION:\n• Industries discharge untreated effluents (waste water) into rivers\n• Contains toxic chemicals, dyes, heavy metals, acids\n• Rivers (Ganga, Yamuna) severely polluted near industrial areas\n• Affects aquatic life and drinking water quality\n\nLAND POLLUTION:\n• Industrial waste (slag, ash, chemicals) dumped on land\n• Mining operations create massive pits and waste dumps\n• Toxic waste leaches into soil\n\nNOISE POLLUTION:\n• Machinery and equipment in factories\n• Affects workers' health — hearing damage, stress\n\nTHERMAL POLLUTION:\n• Hot water discharged from thermal/nuclear power plants into rivers\n• Kills aquatic organisms\n\nCONTROL MEASURES:\n1. Effluent Treatment Plants (ETPs) — treat wastewater before discharge\n2. Use of smokeless fuels and clean technologies\n3. Tall chimneys with electrostatic precipitators\n4. Compulsory Environmental Impact Assessment (EIA) before new industries\n5. Reuse and recycling of industrial waste\n6. ISO 14001 — international environmental management standard\n7. Strict enforcement of pollution control laws\n8. Green belts around industrial areas\n9. Renewable energy use in industries"}

      passage: [
        {q:"'The textile industry is the only industry in India which is self-reliant and complete in the value chain from raw material to the highest value added products. India is second only to China in production of cotton yarn and fabric.'\n\n(a) What makes India's textile industry 'self-reliant'?\n(b) Why did textile mills in Mumbai shift to other cities?\n(c) What are the two main centres of cotton textile industry in India?\n(d) Name any two problems faced by the cotton textile industry.",a:"(a) India's textile industry is self-reliant because it covers the ENTIRE value chain — from growing raw cotton/fibre, through spinning, weaving, processing, dyeing, finishing, to making ready-made garments. India does not need to import raw materials or semi-processed goods at any stage, unlike many other industries.\n\n(b) Mumbai textile mills have been shifting due to:\n• High land costs in Mumbai — factories relocated to cheaper areas\n• Labour problems and high wages\n• Availability of power and cheaper infrastructure elsewhere\n• Mills found it uneconomical to upgrade old machinery\n• Rise of decentralised power loom sector in smaller towns\n\n(c) Two main centres:\n1. Ahmedabad — 'Manchester of India' — in Gujarat near cotton growing areas\n2. Mumbai — historically largest centre; access to port for export\n\n(d) Two problems faced:\n1. COMPETITION: Competition from synthetic fibre industry and cheaper imports (after liberalisation)\n2. TECHNOLOGY: Old machinery in many mills; need for modernisation\n(Other problems: Power shortage, low productivity, competition from powerlooms and handlooms)"}

      short: [
        {q:"Explain the importance of transport in national economy.",a:"TRANSPORT — LIFELINE OF NATIONAL ECONOMY:\n\n1. LINKS PRODUCERS TO CONSUMERS: Moves raw materials to factories and finished goods to markets — essential for trade.\n\n2. CONNECTS REGIONS: Enables specialisation — regions can produce what they are best at and exchange with others.\n\n3. AGRICULTURE: Farmers can sell produce to distant markets; fertilisers and seeds reach remote areas.\n\n4. INDUSTRIES: Raw materials reach factories; finished products distributed nationally and internationally.\n\n5. EMERGENCY AND DEFENCE: Essential for moving troops, supplies, and disaster relief.\n\n6. EMPLOYMENT: Railways, roadways, airways employ millions directly and indirectly.\n\n7. NATIONAL INTEGRATION: Transport connects people across the country — promotes unity.\n\n8. TOURISM: Transport makes tourism possible — significant earner of foreign exchange.\n\nMODES: Railways (most important for goods), Roads (most extensive), Airways (fastest), Waterways (cheapest for heavy goods), Pipelines (for liquids and gases)."},
        {q:"Compare the advantages and disadvantages of roadways and railways in India.",a:"ROADWAYS:\nAdvantages:\n• Door-to-door service — no loading/unloading at terminals\n• Flexible routes — can reach any location\n• Faster for short distances\n• Essential where railways don't reach (hills, remote areas)\n• Lower initial construction cost\n\nDisadvantages:\n• Higher cost per unit for long distances\n• Slower than railways for long hauls\n• Weather dependent\n• More accidents — road safety a major issue\n• More fuel consumption and pollution per unit\n\nRAILWAYS:\nAdvantages:\n• Cheapest for bulk goods over long distances\n• Carry thousands of passengers and huge loads\n• Less traffic congestion\n• More fuel-efficient\n• All-weather transport\n\nDisadvantages:\n• Fixed routes — cannot reach all locations\n• High initial infrastructure cost\n• Requires loading/unloading at stations (not door-to-door)\n• Slower than air transport"},
        {q:"What is the importance of international trade? What are India's major exports and imports?",a:"IMPORTANCE OF INTERNATIONAL TRADE:\n1. Countries differ in natural resources and capabilities — trade allows each to specialise\n2. Earns foreign exchange for imports\n3. Promotes economic growth\n4. Provides access to goods not produced domestically\n5. Technology transfer through trade\n\nINDIA'S MAJOR EXPORTS:\n• Petroleum products (refined)\n• Gems and jewellery\n• Engineering goods (machinery)\n• Software and IT services\n• Textiles and garments\n• Chemicals and pharmaceuticals\n• Agricultural products (rice, spices, tea)\n\nINDIA'S MAJOR IMPORTS:\n• Crude petroleum and petroleum products (biggest import)\n• Electronic goods\n• Gold and silver\n• Machinery\n• Fertilisers\n• Chemicals\n\nMAJOR TRADING PARTNERS: USA (largest), UAE, China, UK, Germany, Japan"}

      long: [
        {q:"Describe the Indian Railways system. Why is it important for the national economy?",a:"INDIAN RAILWAYS — KEY FACTS:\n• Route length: Over 67,000 km — 4th largest network in world\n• Employees: Over 1.3 million — one of world's largest employers\n• Passengers: Carries about 23 million passengers daily\n• Freight: Largest transporter of bulk goods in India\n\nORGANISATION: Divided into 16 zones\n\nTYPES OF LINES:\n• Broad gauge (1.676 m) — most of network\n• Metre gauge (1 m)\n• Narrow gauge (0.762 m)\n\nIMPORTANCE FOR NATIONAL ECONOMY:\n1. TRADE INTEGRATION: Connects all parts of India — allows goods to flow from production centres to consumption markets\n2. RAW MATERIAL SUPPLY: Moves coal to power plants, iron ore to steel plants, food grains to deficit areas\n3. PASSENGER MOVEMENT: Enables people to travel for work, education, pilgrimage, tourism\n4. EMPLOYMENT: Over 1.3 million direct employees; millions more indirectly\n5. STRATEGIC IMPORTANCE: Essential for defence — moves troops and supplies\n6. SOCIAL INTEGRATION: Connects diverse regions and communities\n7. TOURISM: Makes pilgrimage centres, hill stations, national parks accessible\n8. REDUCES ROAD CONGESTION: Each passenger train takes hundreds of vehicles off roads\n\nCHALLENGES:\n• Old infrastructure needs modernisation\n• Safety issues (accidents)\n• Financial sustainability\n• Speed — needs high-speed rail corridors"}

      passage: [
        {q:"'Trade is the backbone of a country's economy. International trade enables countries to sell what they produce in excess and buy what they need. The trade balance of a country shows the difference between its exports and imports. India mainly exports petroleum products, gems and jewellery, engineering goods, software services and textiles.'\n\n(a) What is meant by 'trade balance'?\n(b) What is 'favourable trade balance'?\n(c) Why does India import so much petroleum?\n(d) How has India's trade pattern changed after liberalisation?",a:"(a) Trade balance is the difference between the value of a country's exports and imports. It shows whether a country is selling more (exporting) or buying more (importing) from other countries.\n\n(b) Favourable trade balance (trade surplus): When a country's exports are greater than its imports — it earns more foreign exchange than it spends. India mostly has an unfavourable trade balance (trade deficit) because its imports (especially crude oil) exceed exports.\n\n(c) India imports so much petroleum because:\n• India has limited domestic oil reserves\n• India imports 80%+ of its petroleum requirement\n• Rapid economic growth and rising car ownership have massively increased demand\n• Petroleum is used for transport, industry, electricity generation\n• India's own fields (Mumbai High, Assam, Rajasthan) cannot meet domestic demand\n\n(d) India's trade pattern changed after liberalisation (1991) by:\n• Increase in exports — software, engineering goods, pharmaceuticals expanded\n• Increase in imports — capital goods, electronic goods, gold\n• Greater diversification of trading partners\n• Service exports (IT, tourism) became very important\n• Opening of Indian markets to foreign competition"}

      short: [
        {q:"Describe the ethnic composition of Belgium and the problems it created.",a:"ETHNIC COMPOSITION OF BELGIUM:\n• Total population: slightly over 1 crore\n• 59% in Flemish region — speak Dutch\n• 40% in Wallonia region — speak French\n• 1% speak German\n• In Brussels (capital): 80% French, 20% Dutch-speaking\n\nPROBLEMS CREATED:\n• Minority French-speaking community was relatively rich and powerful\n• Dutch-speaking majority resented this and demanded equal representation\n• Tension arose between the two communities\n• Both communities had strong feelings and this could have led to conflict\n\nSOLUTION:\nBelgium adopted a power-sharing model:\n• Equal representation in central cabinet regardless of majority\n• Community governments for each language group\n• Separate governments for regions\nThis accommodation maintained national unity and helped Belgium become a part of EU."},
        {q:"Why did Sri Lanka fail where Belgium succeeded? Compare the two cases.",a:"BELGIUM — SUCCEEDED:\n• Recognised that cultural diversity was a strength\n• Gave equal representation to both communities\n• Created community governments for each language group\n• Amended constitution multiple times (1970, 1993) to accommodate diversity\n• Result: Peaceful, united country; member of EU\n\nSRI LANKA — FAILED:\n• Adopted majoritarian approach — 'Sinhala Only' Act (1956)\n• Sinhala majority ignored Tamil minority's legitimate concerns\n• Tamils felt alienated, discriminated against in government jobs, universities\n• Tamil parties demanded autonomy → escalated to demand for separate state (Eelam)\n• Led to CIVIL WAR — thousands killed, millions displaced\n• Country deeply divided\n\nKEY LESSON: Power sharing and accommodation of minorities creates unity; majoritarianism creates division and conflict."},
        {q:"What are the different forms of power sharing in modern democracies?",a:"FORMS OF POWER SHARING:\n\n1. HORIZONTAL POWER SHARING:\nPower shared among different organs of government at the same level.\n• Legislature makes laws\n• Executive implements laws\n• Judiciary interprets laws and checks both\n• No single organ has unlimited power\n\n2. VERTICAL POWER SHARING:\nPower shared among different levels of government.\n• Central government\n• State governments\n• Local governments (panchayats, municipalities)\n\n3. SHARING AMONG SOCIAL GROUPS:\nPower given to different communities, linguistic groups:\n• Community government in Belgium\n• Reservations for SC, ST, OBC in India\n\n4. SHARING AMONG POLITICAL PARTIES:\n• Different political parties share power through coalition governments\n• Opposition parties check ruling party\n• Interest groups and pressure groups influence policies"}

      long: [
        {q:"'Power sharing is the very spirit of democracy.' Explain this statement with reference to the prudential and moral reasons for power sharing.",a:"POWER SHARING IS THE SPIRIT OF DEMOCRACY:\n\nMORAL REASONS (Why it is RIGHT):\n1. Democracy means rule of the people, by the people, for the people. If power is shared, it means citizens participate in governance — this IS democracy.\n2. In a diverse society, no single community has the right to dominate others.\n3. Each group has legitimate interests that deserve representation.\n4. Power sharing respects human dignity and autonomy.\n5. It upholds the value of political equality.\n\nPRUDENTIAL REASONS (Why it is WISE/PRACTICAL):\n1. REDUCES CONFLICT: When all groups have share in power, they have less reason to feel alienated and resort to violence. Sri Lanka's civil war shows what happens when minorities are excluded.\n2. ENSURES STABILITY: Countries with power sharing tend to be more politically stable.\n3. PREVENTS TYRANNY: Checks and balances prevent concentration of power and abuse.\n4. LONG-TERM BENEFITS: Even if sharing seems to reduce efficiency short-term, it ensures long-term stability.\n\nBELGIUM EXAMPLE: Belgium's power sharing model maintained unity in a diverse country and made it a strong EU member — showing that sharing power is both morally right AND practically wise.\n\nCONCLUSION: Democracy cannot function without power sharing. It is not just a compromise but the very principle that makes democracy legitimate and stable."}

      passage: [
        {q:"Read the following:\n\n'Sri Lanka adopted a majoritarian policy. The Sinhala Only Act was passed in 1956. The government followed preferential policies favouring Sinhala applicants for university positions and government jobs. The constitution stipulated that the state shall protect and foster Buddhism.'\n\n(a) What is majoritarianism?\n(b) How did this policy affect the Tamil community?\n(c) What was the consequence for Sri Lanka?\n(d) What lesson does this hold for democratic countries?",a:"(a) Majoritarianism is the belief that the majority community should rule the country in whatever way it wants, without considering the needs and wishes of minority communities. It ignores minority rights and interests.\n\n(b) Impact on Tamil community:\n• Tamil language was removed as official language → Tamils couldn't get government jobs\n• Preference given to Sinhalese in universities and government → Tamils discriminated against\n• Buddhism made state religion → non-Buddhists (mostly Tamils who are Hindu/Christian) felt excluded\n• Tamils felt like second-class citizens in their own country\n\n(c) Consequences for Sri Lanka:\n• Tamils demanded equal rights and autonomy\n• When demands were ignored, Tamil groups demanded a separate state (Eelam)\n• Civil war broke out, lasting decades\n• Thousands killed, millions displaced\n• Country suffered economically and socially\n• The civil war ended in 2009 with great violence\n\n(d) Lesson: In diverse societies, majoritarian policies create alienation, resentment and conflict. True democracy requires protecting minority rights and sharing power with all communities. Accommodation and power sharing are essential for national unity."}

      short: [
        {q:"What is federalism? What are its key features?",a:"FEDERALISM: A system of government in which power is divided between a central government and various constituent units of the country (states/provinces).\n\nKEY FEATURES:\n1. TWO LEVELS OF GOVERNMENT: Central and state governments (in India, also local governments — third tier)\n2. EACH HAS JURISDICTION: Each level has its own area of authority — not subject to the other\n3. CONSTITUTIONALLY GUARANTEED: Division of power written in constitution; cannot be changed unilaterally\n4. INDEPENDENT JUDICIARY: Supreme Court/High Courts to resolve disputes between levels\n5. FINANCIAL INDEPENDENCE: Each level has its own revenue sources\n6. DUAL CITIZENSHIP: Citizens have both national and state identity\n7. CONSTITUTIONAL AMENDMENT: Special procedure required to change power division — usually needs approval of both levels"},
        {q:"Distinguish between 'coming together' and 'holding together' federations. Which type is India?",a:"COMING-TOGETHER FEDERATIONS:\n• Independent states voluntarily join to form a larger unit\n• States want to pool sovereignty while retaining identity\n• States have more powers (stronger states)\n• Examples: USA, Switzerland, Australia\n• States agreed to give some powers to centre for common benefit\n\nHOLDING-TOGETHER FEDERATIONS:\n• A large country decides to divide power to accommodate diversity\n• Central government often stronger than states\n• States may have unequal powers\n• Examples: INDIA, Belgium, Spain\n• Centre divided power among states to hold together diverse nation\n\nINDIA'S TYPE:\nIndia is a HOLDING-TOGETHER federation because:\n• India was one country and power was devolved to states\n• Centre is stronger than states in India\n• States have unequal powers (some have special provisions)\n• Created to accommodate linguistic, cultural and regional diversity"},
        {q:"How has decentralisation strengthened democracy in India? What are the functions of Panchayati Raj?",a:"DECENTRALISATION IN INDIA:\nThe 73rd and 74th Constitutional Amendments (1992) made the third tier (local governments) constitutionally mandatory.\n\nPANCHAYATI RAJ (Rural):\n• Three-level structure: Village Panchayat, Block Samiti, Zila Parishad\n• Gram Sabha: All adult members of village — foundation of democracy\n• Elections mandatory every 5 years\n• 1/3 seats RESERVED for women (many states 1/2)\n• Reserved seats for SC and ST\n\nFUNCTIONS:\n1. Village development — roads, drainage, housing\n2. Primary education and health care\n3. Implementation of government schemes\n4. Collection of local taxes\n5. Maintenance of local records\n6. Agriculture and minor irrigation\n\nIMPORTANCE:\n• Brings democracy to grassroots level\n• People directly participate in local governance\n• Women and marginalised communities get representation\n• Local problems solved locally\n• About 30 lakh elected representatives in panchayats — world's largest democratic experiment"}
      ],
      long: [
        {q:"Describe the three-fold distribution of legislative powers in India. How does it maintain federal balance?",a:"THREE LISTS IN THE CONSTITUTION:\n\n1. UNION LIST (97 subjects):\n• Subjects of national importance\n• Only Parliament can make laws\n• Examples: Defence, foreign affairs, banking, communications, currency, railways, atomic energy\n\n2. STATE LIST (66 subjects):\n• Subjects of local and regional importance\n• Only State legislatures can make laws (normally)\n• Examples: Police, trade, commerce, agriculture, irrigation, education (before 1976)\n\n3. CONCURRENT LIST (47 subjects):\n• Both Parliament and State can make laws\n• In case of conflict: Central law prevails\n• Examples: Education, forests, trade unions, marriage, adoption, succession\n\nRESIDUARY POWERS:\n• Any subject not in any list → Central government has power\n• Shows India's tilt towards central authority\n\nFEDERAL BALANCE:\n• Each level has clear jurisdiction — reduces conflicts\n• Concurrent List allows both levels to legislate — flexible\n• Centre's supremacy on Concurrent List resolves conflicts\n• Special courts (Supreme Court) resolve centre-state disputes\n• Amendment to redistribute powers requires special procedure\n\nCRITIQUE: India is more centralised than typical federations — governors appointed by centre, states financially dependent on centre, President's Rule can dismiss state governments."}
      ],
      passage: [
        {q:"'India's Constitution originally provided for a two-tier system of government — the Union Government representing the Indian Union, and the States. Later, a third tier of federalism was added in the form of Panchayats and Municipalities.'\n\n(a) What is the significance of the third tier of government?\n(b) What was the 73rd Constitutional Amendment about?\n(c) What is a Gram Sabha?\n(d) How has decentralisation helped women?",a:"(a) The third tier (Panchayats and Municipalities) brings government closest to the people at the grassroots level. It enables local self-governance, allows people to directly participate in decisions affecting their lives, and ensures that local problems are solved locally by elected representatives from the community itself.\n\n(b) The 73rd Constitutional Amendment (1992) made Panchayati Raj institutions constitutionally mandatory. It required:\n• Elections to panchayats every 5 years\n• Reservation of 1/3 seats for women\n• Reservation for SC and ST\n• State Election Commissions to conduct elections\n• State Finance Commissions for allocation of funds\nThis gave constitutional status to local bodies.\n\n(c) Gram Sabha is the body of ALL adult members of a village. It is the foundation of Panchayati Raj. The Gram Sabha:\n• Meets periodically to discuss village issues\n• Approves the plans and budget of the Gram Panchayat\n• Reviews the work done by the Panchayat\n• It is the primary democratic forum at village level\n\n(d) Decentralisation has helped women by:\n• Constitutional reservation of 1/3 (or 1/2 in some states) of all seats for women\n• About 10 lakh women are elected representatives in Panchayats\n• Women have gained political experience and confidence\n• Issues affecting women (health, water, education) get more attention\n• Challenged patriarchal attitudes at grassroots level"}
      ]
    },

      short: [
        {q:"What is meant by sexual division of labour? How does it affect women's status?",a:"SEXUAL DIVISION OF LABOUR: A social arrangement where all work inside the home (cooking, cleaning, child-rearing) is done by women, and work outside (earning income) is done by men.\n\nThis division:\n• Is not natural — it is based on social expectations and stereotypes\n• Is not absolute — women DO work outside too (in fields, as domestic workers, in offices)\n• But women's work is NOT valued equally\n\nEFFECTS ON WOMEN'S STATUS:\n1. ECONOMIC DEPENDENCE: Women doing unpaid household work = no income = financial dependence on men\n2. POWER IMBALANCE: Economic dependence leads to less decision-making power in family\n3. DOUBLE BURDEN: Working women do both office work AND all household work\n4. UNDERVALUATION: Women's domestic labour contributes to economy but is not counted in GDP\n5. LIMITED POLITICAL PARTICIPATION: Women have less time and resources for public life\n6. LOWER STATUS: Society values paid work more than domestic work → women get lower social status\n\nNEED: Equal sharing of domestic responsibilities between men and women is essential for true gender equality."},
        {q:"What is communalism? How does it manifest in politics?",a:"COMMUNALISM: A belief that people of the same religion have similar political interests and these are different from and opposed to the interests of people of other religions.\n\nFORMS OF COMMUNALISM:\n1. Belief that one's religion is superior to others\n2. Belief that people of different religions cannot live as equal citizens\n3. Using religion for narrow political purposes that harm other communities\n4. Religious identity being used to mobilise votes\n\nHOW IT MANIFESTS IN POLITICS:\n• Politicians make appeals in the name of religion during elections\n• Communal violence is sometimes used to polarise voters\n• Policies framed to benefit one religious community at the expense of others\n• Stereotypes and prejudices about other religions spread for political gain\n• Extreme form: Communal riots and targeted violence\n\nSECULAR RESPONSE:\nIndia is a secular state — the Constitution prohibits discrimination based on religion. The state:\n• Has no official religion\n• Gives equal status to all religions\n• Does not interfere in religious affairs\n• But also does not allow religion to be used against others"},
        {q:"How has caste influenced politics in India? Give examples of positive and negative aspects.",a:"CASTE IN POLITICS — NEGATIVE ASPECTS:\n1. VOTE BANK POLITICS: Politicians appeal to caste sentiments — ask people to vote for candidates of their caste\n2. DISCRIMINATION: Upper castes dominated governance; lower castes excluded\n3. CASTE VIOLENCE: Conflicts between castes over land, water, social status\n4. NEPOTISM: Caste-based favouritism in appointments\n5. DIVISIVE: Caste identity can override national interest\n\nCASTE IN POLITICS — POSITIVE ASPECTS:\n1. MOBILISATION FOR RIGHTS: Dalits, OBCs used political mobilisation to demand equal rights and representation\n2. RESERVATIONS: Political pressure from lower castes led to reservations in education and government jobs\n3. EXPANDED DEMOCRACY: Universal adult franchise reduced dominance of upper castes\n4. ASSERTION: Lower castes gaining political power has helped reduce discrimination\n5. SOCIAL REFORM: Political movements challenged caste hierarchy (Ambedkar, Periyar)\n\nCURRENT SITUATION:\n• No state where caste is the SOLE factor in electoral outcomes\n• Other factors (development, corruption, leadership) also matter\n• Caste and politics interact in complex ways\n• Both reinforce and challenge each other"}
      ],
      long: [
        {q:"Discuss the status of women in Indian politics. What measures are needed to improve women's political participation?",a:"STATUS OF WOMEN IN INDIAN POLITICS:\n\nLEGAL RIGHTS: Women have equal voting rights since 1947. Can contest elections, hold any position.\n\nACTUAL SITUATION:\n• Women constitute less than 15% of Lok Sabha members — far below gender parity\n• Even lower in state assemblies\n• Very few women Chief Ministers, Cabinet Ministers\n• Contrast: Nordic countries (Sweden, Norway) have 40-50% women in parliaments\n\nFACTORS LIMITING PARTICIPATION:\n1. DOMESTIC BURDEN: Women responsible for household work — less time for politics\n2. ECONOMIC DEPENDENCE: Less financial resources for election campaigns\n3. SOCIAL ATTITUDES: Many families/societies don't encourage women in public life\n4. VIOLENCE AND THREATS: Women face intimidation in political arena\n5. PATRIARCHAL PARTIES: Political parties give fewer tickets to women candidates\n\nMEASURES NEEDED:\n1. WOMEN'S RESERVATION BILL: Reserve 33% seats in Parliament and state legislatures for women (like in panchayats)\n2. EDUCATION: Educate girls equally → more qualified women leaders\n3. ECONOMIC EMPOWERMENT: Women with economic independence can participate more\n4. CHANGE IN SOCIAL ATTITUDES: Men must share domestic responsibilities\n5. PARTY COMMITMENT: Political parties should give more tickets to women\n6. ROLE MODELS: More women leaders inspire others\n\nPOSITIVE DEVELOPMENT: Panchayati Raj reservation has created 10 lakh+ women elected representatives — building a pipeline of women leaders."}
      ],
      passage: [
        {q:"'In India, caste can take various forms in politics. When voters and political parties pay attention only to caste of a candidate or voter, that is an unhealthy tendency. But when political mobilisation takes place along caste lines to challenge caste discrimination and demand justice, it can be a positive development.'\n\n(a) Give an example of caste being used in a negative way in politics.\n(b) Give an example of caste mobilisation being used positively.\n(c) What is the role of reservations in addressing caste inequality?\n(d) Is caste the only factor that determines electoral outcomes in India?",a:"(a) Negative use of caste in politics:\n• Political parties distributing election tickets based on caste of candidates rather than their ability\n• Politicians making speeches that appeal to caste pride or prejudice to get votes\n• Using caste violence/discrimination to polarise communities before elections\n• Forming governments based on caste arithmetic rather than governance ability\n\n(b) Positive use of caste mobilisation:\n• Dalit and OBC leaders using caste identity to organise politically and demand reservation, anti-discrimination laws and social justice\n• Ambedkar's movement used Dalit identity to fight untouchability\n• OBC movements demanding Mandal Commission recommendations implementation\n• These movements reduced dominance of upper castes and expanded democracy\n\n(c) Role of reservations:\n• Reservations in education and government jobs for SC, ST and OBC give opportunities to historically disadvantaged groups\n• Political reservations (in panchayats) ensure representation of marginalised communities\n• However, reservations alone cannot end caste discrimination — social attitudes must also change\n\n(d) No, caste is NOT the only factor:\n• Development track record of the government\n• Personal image and integrity of the candidate\n• National issues and leadership\n• Economic conditions\n• Multiple caste groups need to be combined — no single caste is a majority anywhere\n• Other identities (language, religion, class) also matter"}
      ]

      short: [
        {q:"Why do we need political parties? What are their functions?",a:"WHY WE NEED POLITICAL PARTIES:\nWithout parties, all candidates would be independent. Voters would have no way to know what policies a candidate supports. No one would be responsible for running the government. Coordination would be impossible in large democracies.\n\nFUNCTIONS OF POLITICAL PARTIES:\n1. CONTEST ELECTIONS: Put up candidates for elections\n2. FORM GOVERNMENTS: Winning parties form governments and implement their policies\n3. MAKE POLICIES: Parties put forward alternative policies for voters to choose\n4. MAKE LAWS: Parties with majority make laws in legislatures\n5. FORM OPPOSITION: Losing parties form opposition — check ruling party\n6. SHAPE PUBLIC OPINION: Parties raise issues, debate policies, inform citizens\n7. PROVIDE ACCESS: Help citizens access government and its policies/welfare schemes\n8. POLITICAL SOCIALISATION: Parties help form political views and educate citizens"},
        {q:"What are the major challenges faced by political parties in India?",a:"MAJOR CHALLENGES:\n\n1. LACK OF INTERNAL DEMOCRACY:\n• Power concentrated in top leaders (usually a family)\n• Ordinary members have little say in party decisions\n• No transparent internal elections in most parties\n• Leader's personal choice determines candidates\n\n2. DYNASTY (DYNASTIC SUCCESSION):\n• Leaders' children/relatives inherit party leadership\n• Prevents capable but non-connected leaders from rising\n• Affects BJP, Congress, SP, DMK, NCP etc.\n\n3. MONEY AND MUSCLE POWER:\n• Elections are expensive — parties rely on wealthy donors\n• This creates obligations to fund donors\n• Criminalisation — parties give tickets to candidates with criminal records if they can win\n\n4. CORRUPTION:\n• Parties accused of corruption in power\n• 'Quid pro quo' — money for votes, policies for donations\n\n5. LACK OF MEANINGFUL CHOICE:\n• Parties have become very similar in ideology\n• Citizens feel their vote doesn't change fundamental policies\n\nREFORMS NEEDED:\n• Transparent party funding and accounts\n• Mandatory internal elections\n• State funding of elections\n• Stricter enforcement of anti-defection law"},
        {q:"Describe the multi-party system in India. What are its advantages and disadvantages?",a:"MULTI-PARTY SYSTEM IN INDIA:\n• India has many national, state and local parties\n• Currently 6 national parties and hundreds of regional parties\n• No single party has consistently won majority in Lok Sabha since 1989\n• Coalitions have become the norm\n\nADVANTAGES:\n1. Represents India's incredible diversity — caste, language, religion, region\n2. No single ideology dominates\n3. More choices for voters\n4. Minorities and regions get representation through regional parties\n5. Coalition politics forces parties to negotiate and compromise — reduces extremism\n\nDISADVANTAGES:\n1. Government instability — coalitions can collapse\n2. Difficult to implement bold reforms when many parties have different interests\n3. Regional parties can hold national government 'hostage'\n4. Confusing for voters — too many choices\n5. Horse-trading and political opportunism\n\nEXAMPLE: After 1989, India has had mostly coalition governments (UPA, NDA) where regional parties play key roles. This reflects India's diversity but also creates governance challenges."}
      ],
      long: [
        {q:"What are the functions of a political party? How does the party system strengthen democracy?",a:"POLITICAL PARTIES AND DEMOCRACY:\n\nFUNCTIONS:\n1. ELECTORAL FUNCTION: Recruit candidates, campaign for them, help citizens choose\n2. LEGISLATIVE FUNCTION: Party members in legislature debate and vote on laws as a bloc\n3. EXECUTIVE FUNCTION: Winning party forms government, selects ministers\n4. POLICY FORMATION: Develop detailed policies and programmes\n5. OPPOSITION: Losing parties check, criticise and propose alternatives to government\n6. REPRESENTATION: Channel diverse demands and interests of different groups\n7. COMMUNICATION: Inform citizens about policies and gather feedback\n\nHOW PARTIES STRENGTHEN DEMOCRACY:\n1. ACCOUNTABILITY: Makes government accountable — opposition exposes failures\n2. CHOICE: Citizens choose between different visions of governance\n3. STABILITY: Provides organised, stable government rather than chaotic individual rule\n4. REPRESENTATION: Different parties represent different social groups and regions\n5. POLITICAL PARTICIPATION: Parties are channels for citizens to participate in politics\n6. PEACEFUL TRANSFER: Enables democratic alternation of power between parties\n\nWITHOUT PARTIES:\n• No coordination in legislature\n• No clear accountability\n• Citizens would have to evaluate thousands of individual candidates\n• Government could not function effectively\n\nCONCLUSION: Parties are indispensable for democracy, despite their flaws. They make democracy functional and representative."}
      ],
      passage: [
        {q:"'We need parties because we need governments. We need governments to make laws, policies and implement them. We need parties to form governments, make laws and implement policies. We also need parties to check on governments, debate policies and offer alternatives.'\n\n(a) What is the minimum requirement for a political party?\n(b) What would happen if there were no political parties?\n(c) How do parties make democracy more representative?\n(d) Name any two national political parties in India and their ideology.",a:"(a) Minimum requirements for a political party:\n• A party must have at least THREE components: leaders, active members, and followers\n• It must agree on some policies and programmes for society\n• It must seek to implement these by winning governmental power\n• Must contest elections to have a role in governance\n\n(b) Without political parties:\n• All candidates would be independents with no coordinated policies\n• Voters would have no way to know what policies a government would follow\n• Government formation would be chaotic and unstable\n• No organised opposition to check the government\n• The legislature would be unable to function effectively as there would be no coordination\n• Democracy would be dysfunctional\n\n(c) How parties make democracy representative:\n• Different parties represent different social groups, communities, regions and interests\n• Parties bring together people from diverse backgrounds under one platform\n• Regional parties represent specific regional interests in national governance\n• Coalition politics forces even dominant parties to accommodate diverse interests\n• Multiple parties ensure that no single group's interests are ignored\n\n(d) Two national parties:\n1. INDIAN NATIONAL CONGRESS (INC): Founded 1885, secular and centrist ideology, led independence movement, advocates mixed economy and social welfare\n2. BHARATIYA JANATA PARTY (BJP): Founded 1980, Hindu nationalist ideology (Hindutva), advocates cultural nationalism, free market economy"}

      short: [
        {q:"How does democracy promote the dignity and freedom of citizens?",a:"DEMOCRACY AND DIGNITY/FREEDOM:\n\n1. EQUAL RIGHTS: All citizens are equal before law — regardless of birth, caste, gender, religion\n\n2. FREEDOM OF EXPRESSION: Citizens can criticise the government, express opinions freely\n\n3. NO ARBITRARY POWER: Government cannot punish citizens without due process — rule of law protects citizens\n\n4. WOMEN'S DIGNITY: Democracy formally recognises equal rights of women — challenged historic subordination\n\n5. DIGNITY OF LOWER CASTES: Democratic politics gave Dalits and lower castes political rights and voice — challenged caste discrimination\n\n6. MINORITY PROTECTION: Constitutions protect minority rights against majority domination\n\n7. CHANGE WITHOUT VIOLENCE: Citizens can change rulers through elections — no need for violent revolution\n\n8. TRANSPARENCY: Citizens have right to information about government decisions\n\nCOMPARISON:\nIn non-democracies, rulers can imprison citizens without trial, deny freedoms, and discriminate. Democracy provides institutional protections for human dignity."},
        {q:"Why is democracy considered a better form of government even when it is slow and makes mistakes?",a:"DEMOCRACY IS BETTER DESPITE LIMITATIONS because:\n\n1. ACCOUNTABLE: Government can be questioned, removed, and must justify its actions. Non-democratic governments have no accountability.\n\n2. LEGITIMATE: People accept democratic decisions more readily — even when they disagree — because they had a part in the process.\n\n3. SELF-CORRECTING: Mistakes can be corrected through elections, courts, media, civil society. Dictatorships have no correction mechanism.\n\n4. PEACEFUL CONFLICT RESOLUTION: Democracy provides channels to express grievances (courts, elections, protests) without violence.\n\n5. PREVENTS DISASTERS: Democracies rarely have famines because government is accountable to people — Sen's argument.\n\n6. RESPECTS DIGNITY: Even slow processes involve consultation and respect for all citizens.\n\n7. PARTICIPATION: Citizens are active participants, not passive subjects.\n\n8. CHECKS POWER: Multiple institutions prevent one person from becoming too powerful.\n\nDICTATORSHIP may be faster but:\n• No accountability if decisions are wrong\n• Citizens have no recourse\n• Can lead to catastrophic mistakes with no way to correct them"},
        {q:"What are the outcomes of democracy that we should evaluate it on?",a:"OUTCOMES TO EVALUATE DEMOCRACY:\n\n1. ACCOUNTABLE AND RESPONSIVE GOVERNMENT:\n• Does government respond to citizens' needs?\n• Can citizens question government decisions?\n• Is information available to citizens?\n\n2. LEGITIMATE GOVERNMENT:\n• Do people accept the government as legitimate?\n• Was it chosen through fair elections?\n\n3. ECONOMIC GROWTH AND DEVELOPMENT:\n• Does democracy deliver economic development?\n• Reducing poverty and inequality?\n• (Mixed record globally)\n\n4. REDUCTION OF INEQUALITY:\n• Does democracy reduce economic and social inequality?\n• (Not always — economic inequality persists in democracies)\n\n5. ACCOMMODATION OF DIVERSITY:\n• Does democracy manage social diversity peacefully?\n• Are minority rights protected?\n\n6. DIGNITY AND FREEDOM:\n• Are citizens treated with equal dignity?\n• Are fundamental freedoms protected?\n\n7. PEACEFUL CONFLICT RESOLUTION:\n• Are social conflicts resolved through negotiations rather than violence?\n\nCONCLUSION: Democracy performs well on political/social outcomes but has a mixed record on economic outcomes. It is still preferred because the alternatives are worse."}

        {q:"'Democracy is a better form of government when compared to any other alternative.' Justify this statement.",a:"DEMOCRACY IS BETTER — JUSTIFICATION:\n\nPOLITICAL ADVANTAGES:\n1. ACCOUNTABILITY: Government can be questioned, voted out, and must justify decisions. No other system offers this.\n2. RULE OF LAW: All — including rulers — are subject to law. Prevents arbitrary use of power.\n3. RIGHTS AND FREEDOMS: Democracies protect fundamental rights — speech, assembly, press.\n4. PEACEFUL CHANGE: Transfer of power through elections, not violence.\n\nSOCIAL ADVANTAGES:\n1. DIGNITY: All citizens are equal — challenges caste, gender, racial discrimination.\n2. MINORITY PROTECTION: Constitution protects minority rights from majority domination.\n3. CONFLICT RESOLUTION: Provides peaceful mechanisms (elections, courts, negotiations) for resolving disputes.\n4. FAMINE PREVENTION: Sen argued democracies don't have famines — government is accountable.\n\nCOMPARED TO ALTERNATIVES:\n• Dictatorship: No accountability, no rights, no peaceful change possible\n• Monarchy: Rule by birth, not merit or consent\n• Oligarchy: Rule by few elites — ignores majority\n\nDEMOCRACY'S SHORTCOMINGS:\n• Slower decision-making\n• Economic inequality not automatically reduced\n• Can be corrupt\n• Politicians may prioritise short-term over long-term\n\nWHY STILL BETTER:\n• Democracies can correct their mistakes through elections and institutions\n• Citizens have agency and dignity\n• People's participation makes decisions legitimate\n• Has better long-term stability\n\nCONCLUSION: Democracy is not perfect, but as Churchill said, 'Democracy is the worst form of government, except for all the others that have been tried.'"}

        {q:"'Democracies are based on political equality. All individuals have equal weight in electing representatives. Parallel to the process of bringing individuals into political arena on an equal footing, we see a process of growing economic inequalities.'\n\n(a) What is political equality in democracy?\n(b) Despite political equality, why does economic inequality persist?\n(c) How can democracy address economic inequality?\n(d) Does economic growth happen faster in democracy or dictatorship?",a:"(a) Political equality in democracy means:\n• Every citizen has ONE vote — regardless of wealth, caste, gender, education\n• All votes have equal value\n• All citizens have equal rights to contest elections and hold office\n• Equal protection under law for all citizens\n\n(b) Economic inequality persists despite political equality because:\n• Democracy gives equal POLITICAL rights but does not automatically redistribute wealth\n• Rich people and corporations have more influence on policy through donations, media ownership\n• Economic systems create inequalities which political equality alone cannot fix\n• Implementation of redistributive policies is slow due to political compromises\n• Corruption siphons resources meant for the poor\n\n(c) Democracy can address economic inequality through:\n• Progressive taxation (higher taxes on wealthy)\n• Welfare programmes (MGNREGA, PDS, healthcare)\n• Reservations and affirmative action for disadvantaged groups\n• Regulation of industries to protect workers\n• Citizens can vote for parties that promise redistribution\n• RTI Act allows citizens to demand accountability in welfare delivery\n\n(d) Economic growth:\n• Neither democracy nor dictatorship consistently delivers faster growth\n• Some non-democracies (China) have had high growth; some democracies too\n• India (democracy) has had relatively high growth\n• Democracies tend to have more stable, sustainable long-term growth\n• Dictatorships may grow fast initially but lack correction mechanisms for policy mistakes"}

        {q:"Why do different people have different development goals? Give examples.",a:"DIFFERENT DEVELOPMENT GOALS arise because people have different life situations, needs and aspirations.\n\nEXAMPLES:\n• A LANDLESS LABOURER wants more days of work, higher wages and a house. For them, development means better employment and income security.\n• A RICH FARMER wants higher prices for crops and modern irrigation. Their development goals are about improving agricultural productivity.\n• A GIRL from an educated family may want to study further and have a career — she values education and gender equality.\n• A BUSINESSMAN wants stable government, good infrastructure and easy credit.\n• An ENVIRONMENTALIST wants clean air, forests protected and sustainable use of resources.\n• A TRIBAL PERSON may want their traditional land rights protected.\n\nKEY INSIGHT: What is 'development' for one person may not be for another, or may even HARM others. (e.g. a dam provides water for some but displaces others)\n\nTHEREFORE: We need to look at both INDIVIDUAL goals AND NATIONAL development goals, balancing them."},
        {q:"What is the Human Development Index? How is it different from per capita income?",a:"HUMAN DEVELOPMENT INDEX (HDI):\nDeveloped by UNDP, it measures human development on THREE dimensions:\n1. LONG AND HEALTHY LIFE: Measured by life expectancy at birth\n2. KNOWLEDGE/EDUCATION: Measured by mean years of schooling and expected years of schooling\n3. DECENT STANDARD OF LIVING: Measured by Gross National Income per capita\n\nHDI gives equal weight to all three — a composite index from 0 to 1.\n\nDIFFERENCES FROM PER CAPITA INCOME:\n• Per capita income measures only MONEY; HDI measures money + health + education\n• A country can have high per capita income but poor health/education (Saudi Arabia historically)\n• A country can have good HDI with lower income if it invests in health and education (Kerala, Sri Lanka, Cuba)\n• HDI gives a more complete picture of people's actual well-being\n• Distribution matters in HDI (through health and education outcomes) while per capita income ignores inequality\n\nEXAMPLE: Kerala has lower per capita income than Punjab but higher HDI because of better literacy and life expectancy."},
        {q:"What is sustainable development? Why is it important?",a:"SUSTAINABLE DEVELOPMENT: Development that meets the needs of the present generation without compromising the ability of future generations to meet their own needs.\n\nKEY PRINCIPLES:\n• Use renewable resources at or below their regeneration rate\n• Non-renewable resources should be used sparingly\n• Pollution should not exceed absorptive capacity of environment\n• Diversity (biological and cultural) should be preserved\n\nWHY IMPORTANT:\n1. RESOURCE DEPLETION: Many natural resources (coal, oil, groundwater) are being used faster than they form\n2. ENVIRONMENTAL DAMAGE: Development activities cause pollution, deforestation, climate change\n3. FUTURE GENERATIONS: Today's overuse leaves less for future generations\n4. EQUITY: Poor countries and peoples bear more of the costs of environmental damage\n5. SURVIVAL: Climate change threatens the survival of many species and communities\n\nEXAMPLE: Groundwater extraction in India exceeds natural recharge rate → falling water tables → threatens agriculture and drinking water for future generations."}

      long: [
        {q:"'Per capita income is an important indicator of development but has several limitations.' Explain. What are better indicators of development?",a:"PER CAPITA INCOME AS INDICATOR:\n• Measures total national income divided by population\n• Countries classified as Low Income (under $1085), Middle Income ($1086-$13205), High Income (above $13205) by World Bank\n• India is in lower-middle income group; USA is high income\n• Useful for basic comparisons across countries\n\nLIMITATIONS OF PER CAPITA INCOME:\n1. IGNORES DISTRIBUTION: High average income can coexist with extreme inequality. Top 1% can inflate average while most people are poor.\n2. IGNORES QUALITY OF LIFE: Money doesn't capture health, education, freedom, security\n3. IGNORES NON-MONETARY ASPECTS: Clean environment, safe roads, good governance not captured\n4. MEASUREMENT PROBLEMS: Informal economy, unpaid household work not counted\n5. DOESN'T REFLECT SUSTAINABILITY: Income from depleting resources not sustainable\n\nBETTER INDICATORS:\n1. HDI: Combines income, health and education\n2. INFANT MORTALITY RATE: How many children survive — reflects health services\n3. LITERACY RATE: Education access and quality\n4. LIFE EXPECTANCY: Reflects overall health and well-being\n5. NET ATTENDANCE RATIO: Children in school\n6. GINI COEFFICIENT: Measures inequality\n7. MATERNAL MORTALITY RATE: Women's health\n\nEXAMPLE: Kerala vs Haryana:\n• Haryana has higher per capita income\n• Kerala has BETTER health and education indicators\n• Kerala shows that investment in health and education gives better human development even with lower income"}

      passage: [
        {q:"Study the following data:\n\nCountry A: Per capita income $2000, Life expectancy 75 years, Literacy rate 90%\nCountry B: Per capita income $8000, Life expectancy 55 years, Literacy rate 50%\n\n(a) Which country has better HDI? Why?\n(b) What does this tell us about the relationship between income and development?\n(c) How can Country B improve its development?\n(d) What is meant by 'public facilities'? Give two examples.",a:"(a) Country A has BETTER HDI despite lower per capita income because:\n• HDI measures three dimensions: income + health + education\n• Country A has much higher life expectancy (75 vs 55 years)\n• Country A has much higher literacy rate (90% vs 50%)\n• In HDI terms, Country A's people live longer and are better educated — higher human development\n\n(b) This tells us that INCOME ALONE does not determine development:\n• High income can coexist with poor health and education (Country B)\n• Even with moderate income, countries can achieve high human development if they invest wisely in health and education (Country A)\n• Sri Lanka and Kerala are real examples — high human development with relatively lower income\n• Public investment in health and education is more important than raw income levels\n\n(c) Country B can improve development by:\n• Investing more government spending in public health (hospitals, healthcare access)\n• Expanding public education system — building schools, training teachers\n• Reducing inequality so that high income reaches more people\n• Creating public facilities like clean water, sanitation\n• Social programmes targeting literacy among women and marginalised groups\n\n(d) Public facilities are services provided by the government for all citizens, not for profit:\n• Examples: Public schools, public hospitals, public transport, clean water supply, electricity, roads\n• These cannot be provided adequately by private markets alone because poor people cannot afford them\n• They are essential for human development"}

        {q:"Distinguish between the primary, secondary and tertiary sectors with examples.",a:"PRIMARY SECTOR:\n• Activities that involve direct use of natural resources\n• 'Primary' because it forms the base of all production\n• Examples: Agriculture, fishing, mining, forestry, animal husbandry\n• Produces raw materials for other sectors\n• In India: Employs most workers but contributes less to GDP now\n\nSECONDARY SECTOR:\n• Transforms raw materials (from primary sector) into finished goods\n• Also called industrial sector or manufacturing sector\n• Examples: Steel making, textile industry, car manufacturing, construction, mining processing\n• Adds value to primary goods\n\nTERTIARY SECTOR:\n• Provides services that help primary and secondary sectors\n• Also called 'service sector'\n• Examples: Banking, insurance, transport, IT, healthcare, education, trade, tourism, government services\n• Does NOT produce goods — provides services\n• Now largest sector in India by GDP contribution\n\nINTERDEPENCY: All three are interconnected — agriculture (primary) needs inputs from industry (secondary) and is transported by transport (tertiary)."},
        {q:"What is disguised unemployment? How is it different from open unemployment?",a:"DISGUISED UNEMPLOYMENT:\n• A situation where MORE workers are engaged in an activity than actually needed\n• Removing some workers would NOT reduce the total output\n• The 'extra' workers appear to be employed but their marginal productivity is zero\n• Common in AGRICULTURE in India — family farms often have more family members working than necessary\n\nOPEN UNEMPLOYMENT:\n• People who are willing and able to work but CANNOT find work\n• Openly jobless — clearly visible\n• Common in urban areas\n\nSEASONAL UNEMPLOYMENT:\n• Work available only during certain seasons\n• Agricultural workers have no work in off-season\n• Construction workers may have seasonal demand\n\nEXAMPLE OF DISGUISED UNEMPLOYMENT:\nA farm needs 3 workers. A family of 5 all work on it. Output = same with 3 or 5 workers. The extra 2 are disguised unemployed.\n\nIMPORTANCE: India has enormous disguised unemployment in agriculture. If these workers could be absorbed in other sectors (manufacturing, services), agricultural productivity would not fall and overall production would rise."},
        {q:"What are the differences between organised and unorganised sectors? Who are unorganised sector workers?",a:"ORGANISED SECTOR:\n• Registered with government, follows official rules and regulations\n• Workers have formal employment contracts\n• Provides job security — cannot be dismissed without reason\n• Benefits: Provident fund, paid leave, health benefits, pension, gratuity\n• Fixed working hours\n• Higher wages\n• Examples: Government employees, bank staff, factory workers with contracts\n\nUNORGANISED SECTOR:\n• Small-scale, not registered or regulated by government\n• No formal employment contracts\n• No job security — can be dismissed any time\n• No benefits — no PF, no paid leave, no insurance\n• Lower wages, irregular income\n• Long or irregular working hours\n• Examples: Street vendors, domestic workers, agricultural labourers, construction workers, small shopkeepers, home-based workers\n\nSCALE OF UNORGANISED SECTOR IN INDIA:\n• About 90% of workers are in unorganised sector\n• They need protection — minimum wage laws, labour rights, social security\n• MGNREGA provides 100 days guaranteed employment in rural areas\n• Social security schemes like ESIC, EPF should be extended to unorganised workers"}

        {q:"Explain how employment and output have changed across the three sectors in India. Why is the service sector growing so fast?",a:"HISTORICAL CHANGES IN SECTORS:\n\n1850s-1950s: PRIMARY SECTOR DOMINATED\n• Most people in agriculture\n• Both employment and GDP mostly from agriculture\n\nPOST-INDEPENDENCE: SECONDARY SECTOR GREW\n• Government investment in industries — Steel, heavy machinery, chemicals\n• Manufacturing employment increased\n• But agriculture still employed most workers\n\nSINGLE 1991-PRESENT: TERTIARY SECTOR DOMINATES GDP\n• Services sector now contributes 55%+ of GDP\n• Manufacturing is second, agriculture third in GDP\n• But agriculture STILL employs majority of workers (about 44%)\n\nTHIS CREATES A MISMATCH:\n• Agriculture: 44% workers but only ~17% of GDP → low productivity, low incomes\n• Services: ~27% workers but ~55% GDP → high productivity, high incomes\n• Manufacturing: ~25% workers, ~28% GDP\n\nWHY SERVICES GREW SO FAST:\n1. IT REVOLUTION: India became major global software/IT hub (Bengaluru, Hyderabad, Pune)\n2. GLOBALISATION: Demand for Indian IT, BPO, financial services from rich countries\n3. EDUCATED WORKERS: English-speaking engineering graduates available at lower cost\n4. LIBERALISATION: 1991 reforms opened India to global services trade\n5. INFRASTRUCTURE: Telecommunications revolution enabled remote services\n6. DOMESTIC DEMAND: Rising middle class demands more services (restaurants, healthcare, education, entertainment)\n\nCHALLENGE: Most people still in low-productivity agriculture. Need to move them to manufacturing (like China did) and services."}

      passage: [
        {q:"'A large number of people in India are working in the unorganised sector. They are not able to bargain with the employers because in the unorganised sector there is heavy competition for work. NREGA, 2005 guarantees 100 days of wage employment per year to every rural household.'\n\n(a) Who are the unorganised sector workers?\n(b) Why can they not bargain with employers?\n(c) What is the significance of NREGA?\n(d) What else can be done to protect unorganised sector workers?",a:"(a) Unorganised sector workers include:\n• Agricultural labourers (work on others' farms for daily wages)\n• Construction workers and masons\n• Street vendors and hawkers\n• Domestic workers (maids, cooks, security guards)\n• Home-based piece-rate workers\n• Small shop assistants\n• Rickshaw pullers, auto drivers\n• Workers in small workshops and factories not registered with government\nAbout 90% of India's workforce is in the unorganised sector.\n\n(b) They cannot bargain because:\n• There is heavy competition for work — many unemployed or underemployed people ready to take any work\n• They are individually weak and not unionised\n• They have no fallback — cannot afford to be unemployed\n• Employers know workers are desperate and will accept any conditions\n• No legal protection (or enforcement is weak) for minimum wages\n\n(c) Significance of NREGA (National Rural Employment Guarantee Act, 2005):\n• Legally GUARANTEES 100 days of employment per household — first law to guarantee employment\n• Provides income security in lean agricultural seasons\n• Creates productive assets (roads, ponds, afforestation)\n• Sets minimum wage for rural workers\n• Reduces distress migration to cities\n• Empowers rural poor — legal right, not charity\n• Particularly benefits women and SC/ST communities\n\n(d) Other measures to protect unorganised workers:\n• Strict enforcement of minimum wage laws\n• Extension of provident fund, health insurance to all workers\n• Recognition of unions for unorganised workers\n• Skill development programmes\n• Easy access to credit through self-help groups and microfinance"}

      short: [
        {q:"What is money? Why does modern economy need money?",a:"MONEY: Any medium that is generally accepted in exchange for goods and services and for settling debts.\n\nWHY MONEY IS NEEDED:\nIn a barter system (direct exchange), you need 'double coincidence of wants' — both parties must want what the other has. This is very difficult to achieve.\n\nEXAMPLE PROBLEM: A shoemaker wants wheat. He must find a wheat farmer who wants shoes — at the same time, in the right quantities. Very difficult!\n\nMONEY SOLVES THIS:\n• Shoemaker sells shoes for money\n• Then buys wheat with money from any wheat farmer\n• Separates selling and buying — no need for simultaneous double coincidence\n\nMONEY AS MEDIUM OF EXCHANGE:\n• Everyone accepts money → eliminates double coincidence problem\n• Enables specialisation — people can specialise and exchange efficiently\n• Stores value — save now, spend later\n• Standard of value — prices expressed in money for easy comparison\n\nMODERN FORMS OF MONEY:\n• Currency (coins and notes) — authorised by RBI in India\n• Demand deposits in banks — transferred via cheques\n• Digital payments — UPI, credit/debit cards"},
        {q:"What are formal and informal sources of credit in India? Why is it important to expand formal credit?",a:"FORMAL SOURCES:\n• Banks (commercial, cooperative, regional rural banks)\n• Cooperative credit societies\n• Post office savings schemes\n• Microfinance institutions regulated by RBI\n\nFeatures: Lower interest rates, regulated by government, collateral required\n\nINFORMAL SOURCES:\n• Moneylenders\n• Traders and merchants (advance against crops)\n• Employers\n• Relatives and friends\n• Local financiers\n\nFeatures: Higher interest rates, no government regulation, no fixed terms\n\nPROBLEMS WITH INFORMAL CREDIT:\n• Moneylenders charge 36-60% or more interest (banks charge 12-15%)\n• Harsh loan conditions — can lead to debt traps\n• No regulation — borrowers have no legal protection\n• Can seize assets, use coercion for repayment\n\nIMPORTANCE OF EXPANDING FORMAL CREDIT:\n1. CHEAPER: Lower interest rates → less burden on borrowers\n2. REGULATED: Government protects borrowers' rights\n3. INVESTMENT: Enables productive investment for growth\n4. ESCAPE POVERTY: Access to credit helps poor start businesses\n5. REDUCE EXPLOITATION: Less dependence on exploitative moneylenders"},
        {q:"What are Self-Help Groups (SHGs)? How do they help rural women?",a:"SELF-HELP GROUPS (SHGs):\n• Small groups (typically 15-20 members, mostly women)\n• Members regularly save small amounts\n• Group pools savings and members can borrow from the pool at reasonable interest\n• If the group's track record is good, banks give loans to the group\n\nHOW SHGS HELP RURAL WOMEN:\n1. CREDIT ACCESS: Women who have no collateral and cannot access banks individually can borrow through SHG\n2. AFFORDABLE INTEREST: SHG loans at much lower rates than moneylenders\n3. EMPOWERMENT: Women control their own finances, gain confidence\n4. DECISION-MAKING: Women make collective decisions about savings and loans\n5. SOCIAL ISSUES: SHGs also discuss health, nutrition, education, domestic violence\n6. ESCAPE DEBT TRAP: Formal credit at reasonable rates prevents exploitation by moneylenders\n7. SOLIDARITY: Mutual support network\n8. INCOME: Members use loans to start small businesses — earn income\n\nGRAMEEN BANK MODEL: Bangladesh's Grameen Bank pioneered microfinance for poor rural women — now copied worldwide."}

      long: [
        {q:"Credit can be both helpful and harmful. Explain with examples. What conditions determine whether credit is helpful?",a:"CREDIT CAN BE HELPFUL:\n\n1. AGRICULTURAL INVESTMENT:\nSalim, a small farmer, borrows for seeds, fertilisers, irrigation. After harvest he repays and has surplus income.\nCredit → Investment → Higher output → Repayment + profit ✓\n\n2. BUSINESS STARTUP:\nShyam borrows to buy a sewing machine, starts tailoring business, earns regular income, repays loan.\nCredit → Capital → Business → Income ✓\n\n3. EMERGENCY:\nFamily borrows for medical treatment → member recovers → earns back and repays ✓\n\nCREDIT CAN BE HARMFUL:\n\n1. CROP FAILURE + HIGH INTEREST:\nRamkali borrows from moneylender at 36% for farming. Crop fails. Cannot repay. Borrows more to repay, going deeper into debt.\nCredit → Investment → Failure → Debt trap → Poverty ✗\n\n2. INFORMAL CREDIT WITH HARSH TERMS:\nBorrow against land as collateral. Cannot repay → loses land → becomes landless labourer.\n\nCONDITIONS FOR CREDIT TO BE HELPFUL:\n1. REASONABLE INTEREST RATE: Must not be so high that repayment becomes impossible\n2. PRODUCTIVE USE: Credit for investment (not just consumption) can generate income to repay\n3. ACCESSIBLE FORMAL SOURCES: Banks rather than moneylenders\n4. REPAYMENT FLEXIBILITY: Some flexibility in case of emergencies\n5. NO HARSH COLLATERAL: Loss of land/home due to loan failure can push families into permanent poverty\n\nCONCLUSION: Expanding access to cheap formal credit (through banks, SHGs, microfinance) is essential for development, while protecting people from predatory informal lending."}

      passage: [
        {q:"'Swapna, a small farmer, took a loan from a moneylender at 36% per annum to purchase seeds and fertilisers. The harvest was poor and she could not repay. Next year she again borrowed more. Over time her debt grew. Eventually she lost her land which was given as collateral.'\n\n(a) What is a debt trap? How did Swapna fall into it?\n(b) What is collateral? Why is it problematic for small farmers?\n(c) What could have prevented Swapna's situation?\n(d) What are Self-Help Groups and how could they have helped Swapna?",a:"(a) A debt trap is a situation where a borrower cannot repay a loan and borrows more to repay the existing debt, leading to an ever-growing cycle of debt that is impossible to escape.\n\nSwapna fell into it because:\n• Borrowed at very high interest (36%) from moneylender\n• Crop failure meant she had no income to repay\n• Had to borrow more — accumulating more debt\n• High interest compounded the problem each year\n• Eventually lost her land — which was her only asset\n\n(b) Collateral is an asset that the borrower provides to the lender as a guarantee. If the borrower cannot repay, the lender can sell the collateral to recover money.\n\nProblematic for small farmers because:\n• Their land is their only asset and main source of livelihood\n• If they lose the collateral (land), they become landless and even more vulnerable\n• Fear of losing land may prevent farmers from taking necessary loans\n• Banks require collateral — those without assets cannot access bank loans\n\n(c) Prevention methods:\n• Access to bank credit or cooperative credit at lower interest (8-12% vs 36%)\n• Crop insurance to protect against harvest failure\n• Government support during crop failure (Kisan Credit Card, relief funds)\n• SHG membership providing access to affordable group credit\n\n(d) Self-Help Groups (SHGs):\n• 15-20 women pool small savings regularly\n• Members borrow from the pool at reasonable interest\n• Banks give group loans once SHG has good track record\n\nHow SHG could have helped Swapna:\n• Access to credit at much lower interest rate (18-20% vs 36% moneylender)\n• Group support and collective decision-making\n• Would not have required individual land as collateral (group guarantee)\n• Would not have fallen into as deep a debt trap"}
      ]
    },
