      short: [
        {q:"What is globalisation? What factors have enabled it?",a:"GLOBALISATION: The process of rapid integration of countries through greater foreign trade and foreign investments by multinational corporations. It connects production and markets across borders.\n\nFACTORS ENABLING GLOBALISATION:\n\n1. TECHNOLOGY:\n• Rapid improvement in transport — cheaper and faster shipping (container revolution)\n• Internet and telecommunications — instant global communication\n• Digital technology — software, data can be transferred instantly globally\n• Allows coordination of production across countries\n\n2. LIBERALISATION OF TRADE:\n• Countries removed barriers to trade (tariffs, quotas)\n• WTO agreements pushed member countries to reduce trade restrictions\n• More goods and services cross borders freely\n\n3. LIBERALISATION OF INVESTMENT:\n• Countries allow foreign companies to invest (Foreign Direct Investment)\n• Less restrictions on capital movement\n\n4. MNCs:\n• Companies spread production globally to reduce costs\n• Connect global markets with global production\n\nRESULT: Today, the world is more interconnected than ever. A phone made in India has parts from China, Korea, USA, Japan — assembled with Indian labour for global markets."},
        {q:"How has globalisation affected Indian workers? Compare the impact on different groups.",a:"IMPACT ON INDIAN WORKERS — MIXED:\n\nWORKERS WHO BENEFITED:\n1. IT/BPO WORKERS: High-paying jobs in software, call centres, data processing for global companies\n2. SKILLED PROFESSIONALS: Engineers, managers in MNCs get higher salaries, international exposure\n3. CONSUMERS: Lower prices, greater variety of goods\n4. EXPORT-ORIENTED SECTORS: Workers in gems/jewellery, textiles get more employment\n\nWORKERS WHO WERE HARMED:\n1. SMALL MANUFACTURERS: Cannot compete with cheaper imports — many small industries closed (toys, plastics, electronics)\n2. AGRICULTURAL WORKERS: Cheap subsidised imports from rich countries compete with Indian farmers\n3. UNORGANISED WORKERS: MNCs often hire through contractors — no job security, no benefits\n4. CASUALISATION OF WORK: Companies prefer short-term contracts instead of permanent employment\n5. LABOUR STANDARD THREATS: To attract FDI, governments may allow lower labour protections\n\nCONCLUSION: Globalisation has created UNEQUAL benefits. Those with education and skills in growing sectors benefited; those in traditional industries and agriculture were often harmed. Need policies to ensure fair distribution."},
        {q:"Why do some people argue against globalisation? What is 'fair globalisation'?",a:"ARGUMENTS AGAINST GLOBALISATION:\n\n1. UNEQUAL BENEFITS: Rich countries and MNCs gain most; poor countries and workers benefit less\n2. JOB LOSSES: Import competition destroys domestic industries and jobs\n3. CULTURAL HOMOGENISATION: Local cultures replaced by global (mainly Western) consumer culture\n4. ENVIRONMENTAL DAMAGE: MNCs move polluting industries to countries with lax regulations\n5. RACE TO THE BOTTOM: Countries compete for investment by lowering wages and labour standards\n6. POWER IMBALANCE: WTO rules often favour rich countries\n7. FARMERS: Cheap subsidised agricultural imports from US/EU destroy farming in developing countries\n\nFAIR GLOBALISATION:\n• Benefits should reach ALL people, not just wealthy in rich countries\n• Rules of WTO should be fair to developing countries\n• MNCs should follow same labour and environmental standards globally\n• Governments of poor countries should have flexibility to protect infant industries\n• Workers everywhere should get fair wages and safe conditions\n• Technology transfer should help developing countries grow\n• India's government, trade unions and many others have argued for fair globalisation"}
      ],
      long: [
        {q:"Describe the role of Multinational Corporations in the globalisation process. How do they integrate production across countries?",a:"MNCs IN GLOBALISATION:\n\nWHAT MNCs DO:\nMNCs own or control production in more than one country. They spread activities across the world to maximise profit by using:\n• Cheap labour in developing countries\n• Near natural resources\n• Close to major markets\n\nHOW THEY INTEGRATE PRODUCTION:\n\nEXAMPLE — A GARMENT MNC:\n• Design: Headquarters in USA/Europe\n• Fabric: From China or India\n• Cutting and stitching: Bangladesh or Vietnam (cheapest labour)\n• Quality check: Regional hub in Singapore\n• Marketing and retail: Globally in developed countries\n\nEXAMPLE — FORD CARS:\n• Engine from Germany\n• Electronics from Japan/Korea\n• Assembly in India or China\n• Sold globally\n\nMETHODS MNCs USE:\n1. Set up own factories abroad\n2. Buy local companies (acquisitions — Corus by TATA, Jaguar by TATA)\n3. Joint ventures with local companies\n4. Outsourcing — giving work to local companies (Nike to Asian factories)\n\nIMPACT ON HOST COUNTRIES (like India):\nPositive:\n• Employment and income\n• Technology and management skills transfer\n• Tax revenue\n• Better quality products\nNegative:\n• Profits repatriated abroad\n• Competition damages local companies\n• Environmental concerns\n• Low wages, poor conditions in some cases\n\nIMPACT ON HOME COUNTRIES:\n• Jobs may move to cheap labour countries ('outsourcing')\n• Cheaper goods for consumers\n\nCONCLUSION: MNCs are central to globalisation — they are the main mechanism by which production, capital and technology flow across borders."}
      ],
      passage: [
        {q:"'MNCs are looking for locations where they can get cheap manufacturing labour. For large multinationals, even a small difference in wages across countries can mean large differences in overall costs.'\n\n(a) What is a Multinational Corporation?\n(b) Why do MNCs prefer countries with cheaper labour?\n(c) What can Indian workers gain and lose from MNC investment?\n(d) What is outsourcing? Give an example.",a:"(a) A Multinational Corporation (MNC) is a company that owns or controls production in more than one country. It has its headquarters in one country but factories, offices and operations in many countries. Examples: Apple, Samsung, Coca-Cola, Unilever, Toyota.\n\n(b) MNCs prefer countries with cheaper labour because:\n• Labour is often the largest cost in manufacturing\n• Even small differences in wages translate to huge savings at large scales\n• A company making millions of products can save enormous amounts\n• Developing countries like India, China, Bangladesh, Vietnam have labour costs far below USA/Europe\n• This allows MNCs to be more competitive on global markets with lower production costs\n\n(c) Indian workers — gains and losses:\nGAINS:\n• New employment opportunities in factories, IT, BPO\n• Higher wages than in unorganised sector\n• Exposure to modern technology and management\n• Ancillary industries also develop, creating more jobs\n\nLOSSES:\n• Often hired on short-term contracts through contractors — no job security\n• May not get labour law protections (PF, health insurance)\n• Work may be repetitive, low-skill assembly\n• If MNC leaves, workers lose jobs (footloose capital)\n• May suppress wages by threatening to move elsewhere\n\n(d) Outsourcing: When a company gives its work to an outside firm rather than doing it in-house, especially in another country.\n\nExample: American companies outsource customer service call centres to India. Indian workers answer calls from American customers for companies like Amazon, Dell, AT&T. India benefits from IT/BPO jobs; American companies save costs."}
      ]

      short: [
        {q:"What are consumer rights? List and explain any four rights of consumers in India.",a:"CONSUMER RIGHTS IN INDIA (under COPRA 1986):\n\n1. RIGHT TO SAFETY:\n• Protection against products and services that are hazardous to health and property\n• Example: Medicines must meet safety standards; electrical appliances must not cause shock\n• Enforced by: Bureau of Indian Standards, Drug Control Authority\n\n2. RIGHT TO INFORMATION:\n• Consumer has right to know about quality, quantity, potency, purity, standard and price\n• Example: Food packaging must show ingredients, manufacturing date, MRP\n• Enforced by: Labelling laws, RTI Act\n\n3. RIGHT TO CHOOSE:\n• Consumer must have access to variety of goods and services at competitive prices\n• No monopoly should force consumer to buy only one product\n• Example: Telecom sector — consumers choose from multiple operators\n\n4. RIGHT TO BE HEARD:\n• Consumer's interests must be given due consideration\n• Consumer forums where complaints are heard\n• Example: Consumer can file complaint in District Consumer Forum\n\n5. RIGHT TO SEEK REDRESSAL:\n• Compensation for unfair trade practices or exploitation\n• Three-tier consumer court system\n\n6. RIGHT TO CONSUMER EDUCATION:\n• Consumer should have knowledge of all rights\n• 'Jago Grahak Jago' campaign"},
        {q:"How can consumers protect themselves? Describe the three-tier consumer dispute redressal system.",a:"HOW CONSUMERS CAN PROTECT THEMSELVES:\n1. Check quality certifications (ISI, Agmark, Hallmark, FPO)\n2. Always demand a bill/receipt\n3. Check expiry dates on food and medicine\n4. Read labels carefully\n5. Complain if cheated — don't accept exploitation\n6. Join consumer awareness groups\n\nTHREE-TIER CONSUMER DISPUTE REDRESSAL SYSTEM:\n\n1. DISTRICT CONSUMER FORUM:\n• For claims up to ₹1 crore (current limit)\n• Complaints can be filed locally\n• Accessible to common people\n\n2. STATE CONSUMER COMMISSION:\n• For claims between ₹1 crore and ₹10 crore\n• Located at state capital\n• Appeals from District Forum also heard here\n\n3. NATIONAL CONSUMER COMMISSION (NCDRC):\n• For claims above ₹10 crore\n• Located in New Delhi\n• Highest consumer court; appeals from State Commission\n• Final appeal can go to Supreme Court\n\nPROCESS: Consumer files complaint → Forum examines → Company must respond → Redressal ordered (refund, replacement, compensation)"},
        {q:"Why is consumer awareness important in India? What are the factors that lead to consumer exploitation?",a:"CONSUMER EXPLOITATION OCCURS BECAUSE OF:\n\n1. LACK OF INFORMATION: Consumers don't know the right price, quality standards, ingredients\n2. ILLITERACY: Cannot read labels, contracts, instructions\n3. LESS COMPETITION: Monopoly or oligopoly allows sellers to exploit\n4. COMPLICATED PRODUCTS/SERVICES: Financial products, medicines — consumers can't evaluate quality\n5. UNORGANISED CONSUMERS: Sellers are organised; individual consumers are not\n6. WEAK ENFORCEMENT: Consumer protection laws exist but enforcement is weak\n7. REMOTE AREAS: Less competition, less choice for rural consumers\n8. CULTURAL ATTITUDES: 'Customer is always wrong' mentality\n\nIMPORTANCE OF CONSUMER AWARENESS:\n1. Informed consumers can demand value for money\n2. Can identify and report fraud\n3. Can seek redressal when exploited\n4. Creates competition — sellers improve quality\n5. Reduces exploitation of vulnerable groups\n6. Strengthens consumer protection system\n\nGOVERNMENT STEPS:\n• 'Jago Grahak Jago' campaign\n• Consumer courts easily accessible\n• Quality certification marks (ISI, Agmark)\n• RTI Act for information access\n• National Consumer Helpline"}
      ],
      long: [
        {q:"Describe the evolution of consumer rights and the consumer movement in India. How effective is the consumer protection system?",a:"EVOLUTION OF CONSUMER MOVEMENT:\n\nHISTORY:\n• In earlier times: 'caveat emptor' (let the buyer beware) — seller had no responsibility\n• Industrial Revolution: Mass production created distance between producer and consumer\n• USA: Consumer movement started in 1960s — Ralph Nader's campaign against unsafe cars\n• International: March 15 declared World Consumer Rights Day (1962 Kennedy's Consumer Bill of Rights)\n\nINDIA:\n• 1960s-70s: Consumer organisations raised awareness, published reports on adulteration\n• 1986: CONSUMER PROTECTION ACT (COPRA) — landmark legislation\n  - Created consumer courts at district, state, national levels\n  - Gave consumers legal rights and quick redressal\n• 1991: Economic liberalisation brought more choices but also new risks\n• 2005: RTI Act — consumers can access government information\n• 2019: COPRA amended — stronger provisions, product liability, e-commerce\n\nCONSUMER RIGHTS UNDER COPRA:\nSafety, Information, Choice, Heard, Redressal, Consumer Education\n\nEFFECTIVENESS:\nPositive:\n• Consumer courts have given redressal in lakhs of cases\n• Quality certification (ISI, Agmark) improved product standards\n• Greater consumer awareness\nNegative:\n• Courts overwhelmed — long delays\n• Most consumers still unaware of rights\n• Rural consumers face more exploitation\n• Enforcement of labelling and quality standards weak\n• Digital marketplace creates new challenges\n\nCONCLUSION: Progress has been made but much more needed. Consumer awareness, effective enforcement and accessible courts are key needs."}
      ],
      passage: [
        {q:"'The movement began as a VoiCe against profiteering and shortage of food grains. The Consumer Protection Act (COPRA) was passed in India in 1986. Under COPRA, a three-tier quasi-judicial machinery at the district, state and national levels was set up for redressal of consumer disputes.'\n\n(a) Why was COPRA passed?\n(b) What is a 'quasi-judicial' body?\n(c) What can a consumer do if cheated by a shopkeeper?\n(d) Give one example of a quality mark and explain its significance.",a:"(a) COPRA (Consumer Protection Act) was passed in 1986 because:\n• Consumers were being exploited through adulteration, short weights, overcharging, selling defective goods\n• Existing laws (IPC etc.) were not sufficient or accessible for consumer complaints\n• Growing consumer movement demanded specific legislation\n• Need to create accessible, quick and inexpensive dispute resolution for consumers\n• India joined international consumer protection movement (post Kennedy's consumer rights declaration)\n\n(b) Quasi-judicial body: A body that has characteristics of both a government department and a court. It:\n• Is NOT a formal court but has judicial powers\n• Can examine cases, hear evidence, call witnesses\n• Give decisions that are legally binding\n• Consumer forums are quasi-judicial — they act like courts but are more accessible and less formal\n• Their decisions can be appealed to higher consumer forums\n\n(c) If cheated by a shopkeeper, a consumer can:\n1. First demand replacement, refund or apology from shopkeeper\n2. If not satisfied, collect proof (bill, product, photos)\n3. File a complaint at District Consumer Forum (for amounts up to ₹1 crore)\n4. The forum examines the complaint and the shopkeeper must respond\n5. Forum can order refund, compensation, and impose penalty\n6. The process is relatively quick and inexpensive compared to regular courts\n\n(d) ISI (Indian Standards Institute/Bureau of Indian Standards) mark:\n• Printed on electrical goods, cement, packaged food etc.\n• Indicates the product has been tested and meets quality and safety standards set by Bureau of Indian Standards\n• Significance: Consumer can trust the product is safe, not adulterated, meets specifications\n• Other marks: Agmark (agricultural products), Hallmark (gold jewellery), FPO (food products)"}

      short: [
        {q:"What was the significance of the French Revolution for the rise of nationalism?",a:"THE FRENCH REVOLUTION AND NATIONALISM:\n\nThe French Revolution (1789) was the first clear expression of nationalism in Europe.\n\nKEY CONTRIBUTIONS:\n1. SOVEREIGNTY SHIFTED: From monarchy to the 'nation' — the people became sovereign\n2. NEW POLITICAL IDEAS: 'La Patrie' (fatherland), 'Le Citoyen' (citizen) became new concepts\n3. NEW SYMBOLS: Tricolour flag replaced royal standard; new hymns, oaths, Revolutionary calendar\n4. NATIONHOOD: French people saw themselves as a 'national community' for first time\n5. SPREAD BY NAPOLEON: French armies carried revolutionary ideas (equality, liberty, fraternity) across Europe\n6. NAPOLEON'S CODE: Abolished feudal privileges, equality before law, administrative reforms in conquered territories\n\nPARADOX: While spreading ideas of nationhood, Napoleon also aroused nationalist feelings AGAINST French rule in conquered territories — showing that nationalism could unite AND resist.\n\nLEGACY: The French Revolution demonstrated that people could determine their own political fate — inspiring nationalists across Europe."},
        {q:"What was the Congress of Vienna (1815)? What were its main decisions?",a:"CONGRESS OF VIENNA (1815):\nAfter Napoleon's defeat, the conservative powers of Europe — Austria, Britain, Prussia and Russia — met in Vienna hosted by Austrian Chancellor Duke Metternich.\n\nGOAL: Restore the old conservative order (before French Revolution and Napoleon) and prevent future revolutions.\n\nMAIN DECISIONS:\n1. FRANCE CONTAINED: France's boundaries reduced to 1792 limits\n2. BUFFER STATES CREATED: To prevent future French expansion — Belgium added to Holland; Switzerland made independent; German states reformed into 39 states (German Confederation)\n3. MONARCHY RESTORED: Bourbon dynasty restored in France and Spain; other legitimate rulers restored\n4. BALANCE OF POWER: Between Britain, Austria, Prussia and Russia to prevent dominance by any one\n5. CONSERVATIVE PRINCIPLE: Liberty and nationalism were seen as threats — governments could suppress revolutionary movements\n\nLEGACY: Despite its conservative goals, the Vienna settlement could not suppress the growing forces of liberalism and nationalism. Revolutions continued throughout the 19th century."},
        {q:"How did Romanticism contribute to the growth of nationalism in Europe?",a:"ROMANTICISM AND NATIONALISM:\nRomanticism was a cultural movement that emerged as a reaction against the emphasis on reason and science. It sought to revive emotion, intuition and connection to nature and heritage.\n\nCONTRIBUTIONS TO NATIONALISM:\n1. FOLK CULTURE REVIVAL: Romantics collected and celebrated folk songs, folk tales, dances — showing that each nation had a unique culture\n2. LOCAL LANGUAGES: Johann Gottfried Herder (German) argued that true German culture lay in common people's culture — Volksgeist (spirit of the people)\n3. VERNACULAR LANGUAGES: Poets and writers used local languages to reach the masses and promote national feeling\n4. NATIONAL TRADITIONS: Romantics invented or revived national traditions, heroes and history\n5. HISTORY AND MYTH: Stories of past glory inspired national pride\n\nEXAMPLE:\n• Grimm Brothers collected German folk tales\n• Karol Kurpinski in Poland composed operas on national themes\n• Jan Sibelius in Finland composed music celebrating Finnish landscapes\n\nROLE OF WOMEN: Romantic literature and imagery often used female figures to represent the nation (Marianne in France, Germania in Germany)."},
        {q:"Explain the role of Bismarck in the unification of Germany.",a:"BISMARCK AND GERMAN UNIFICATION:\n\nOtto von Bismarck was the Chief Minister (Junker) of Prussia who unified Germany through his 'Blood and Iron' policy.\n\nSTRATEGY:\n• Bismarck believed Germany could not be unified through 'speeches and majority decisions' (as liberals wanted in 1848)\n• Required war and strong army — 'blood and iron'\n\nTHREE WARS LEADING TO UNIFICATION:\n1. WAR AGAINST DENMARK (1864): Prussia + Austria defeated Denmark, gained Schleswig and Holstein\n2. AUSTRO-PRUSSIAN WAR (1866): Prussia defeated Austria; Austria excluded from German affairs; North German Confederation formed\n3. FRANCO-PRUSSIAN WAR (1870-71): Prussia defeated France; southern German states joined Prussia\n\nUNIFICATION (1871):\n• German Empire proclaimed in the Palace of Versailles (symbolic humiliation for France)\n• Prussian King Wilhelm I became Kaiser (Emperor) of Germany\n• Bismarck became Chancellor\n\nLEGACY: German unification through military means set the template for aggressive nationalism, eventually contributing to World War I."}

      long: [
        {q:"Trace the process of unification of Italy. What were the roles of Mazzini, Cavour and Garibaldi?",a:"ITALIAN UNIFICATION:\nItaly before 1871 was divided into multiple states — Kingdom of Sardinia-Piedmont, Papal States, Austrian-controlled regions, Kingdom of Naples etc.\n\nTHREE HEROES OF ITALIAN UNIFICATION:\n\n1. GIUSEPPE MAZZINI (Revolutionary phase):\n• Founded 'Young Italy' (1831) — a secret society to spread republican nationalism\n• Founded 'Young Europe' — pan-European movement\n• Believed Italy should be unified as a democratic republic\n• Organised unsuccessful revolutions in 1834 and 1848\n• Called 'the prophet of Italian nationalism' — inspired generations\n• Limitation: His revolutionary approach failed militarily\n\n2. COUNT CAMILLO DI CAVOUR (Diplomatic phase):\n• Chief Minister of Sardinia-Piedmont (1852-61)\n• Not a mass nationalist but a shrewd diplomat\n• Modernised Piedmont's economy\n• Formed diplomatic alliance with France against Austria (1858)\n• Won Franco-Austrian War (1859) — gained Lombardy\n• Used diplomacy to bring most of north-central Italy under Piedmont\n\n3. GIUSEPPE GARIBALDI (Military phase):\n• Military leader who led 'Red Shirts' (thousand volunteers)\n• Conquered Kingdom of the Two Sicilies (southern Italy) in 1860\n• Handed control to King Victor Emmanuel II\n\nUNIFICATION COMPLETE (1861-1871):\n• 1861: Kingdom of Italy proclaimed with Victor Emmanuel II as king\n• 1866: Venetia joined after war with Austria\n• 1871: Rome included after French troops withdrew (Franco-Prussian War)\n\nItaly finally unified but with significant tensions between north and south that persist today."}
      ],
      passage: [
        {q:"Read the following:\n\n'In 1848, Frédéric Sorrieu, a French artist, prepared a series of four prints visualising his dream of a world made up of democratic and social Republics. The peoples of Europe are grouped as distinct nations, identified through their flags and national costume. Leading the procession are the United States and Switzerland, which by this time were already nation-states.'\n\n(a) What does Sorrieu's vision tell us about ideas prevalent in 1848?\n(b) What is a 'nation-state'? How is it different from a dynastic empire?\n(c) Why were USA and Switzerland leading the procession?\n(d) What is meant by 'utopian'?",a:"(a) Sorrieu's vision tells us that in 1848, there was widespread belief in: 1) Democratic governance (democratic republics), 2) The right of peoples to form their own nation-states, 3) International fraternity among nations, 4) Liberty as a universal value, 5) The idea that nations are natural, eternal entities with distinct identities represented by flags and costumes. It reflects the liberal nationalist spirit of the 1848 revolutions.\n\n(b) A nation-state is a state in which the majority of citizens develop a sense of common identity, shared history, language and culture — and this commonness gives legitimacy to the state's authority.\n\nDifference from dynastic empire: Dynastic empires were ruled by monarchies whose legitimacy came from royal lineage/divine right, not from the 'nation.' They often contained many different ethnic groups, languages and religions under one ruler (e.g., Austro-Hungarian Empire). A nation-state's legitimacy comes from the PEOPLE — citizens who share a national identity.\n\n(c) USA and Switzerland led because they were already established NATION-STATES with democratic constitutions by 1848. USA had been a democratic republic since 1776; Switzerland was a federation of democratic cantons. They represented the ideal that Sorrieu dreamed other nations would achieve.\n\n(d) 'Utopian' means a vision of an ideal society that is so perfect it is unlikely to actually exist. From 'Utopia' (Greek for 'no place' — meaning an ideal that doesn't exist). Sorrieu's vision was utopian because he imagined all peoples of the world peacefully marching together as free democratic nations — a beautiful but unrealistic ideal, especially given the conflicts and inequalities of the real world."}
      ]
    },

      short: [
        {q:"What was the Rowlatt Act? Why did it create widespread anger in India?",a:"ROWLATT ACT (1919):\nAlso called the 'Black Act' — officially the Anarchical and Revolutionary Crimes Act.\n\nPROVISIONS:\n• Allowed government to imprison political prisoners WITHOUT TRIAL for up to 2 years\n• Gave police power to arrest suspected revolutionaries without warrant\n• No appeal allowed — hence called 'no appeal, no vakil, no dalil' (no appeal, no lawyer, no argument)\n\nWHY IT CAUSED ANGER:\n1. CONTRADICTED PROMISES: British had promised Indians reforms and self-rule as reward for WWI support\n2. BETRAYAL: After Indians had sacrificed in WWI, Britain imposed repressive law\n3. UNDERMINED RIGHTS: Basic civil liberties and right to fair trial denied\n4. ARBITRARY POWER: Government could arrest anyone on suspicion — dangerous for political activists\n5. INSULTING: Indians felt they were being treated as criminals without proof\n\nRESPONSE:\n• Gandhi launched a nationwide satyagraha against the Act (April 6, 1919)\n• Hartals (strikes) across India\n• Mass protests in many cities\n• Led to JALLIANWALA BAGH MASSACRE (April 13, 1919)"},
        {q:"What was Satyagraha? How was it different from ordinary resistance?",a:"SATYAGRAHA (developed by Gandhi in South Africa):\nThe word means 'insistence on truth' (Satya = truth, Agraha = insistence).\n\nCORE IDEAS:\n• If the cause is just, physical force is NOT necessary\n• Truth alone has power — a satyagrahi wins through moral power\n• Must be willing to suffer rather than inflict suffering\n• Non-violence is essential — the opponent must be converted, not defeated\n• Respect for opponent's humanity — no hatred\n\nHOW DIFFERENT FROM ORDINARY RESISTANCE:\n1. NON-VIOLENCE: Traditional resistance might involve violence; Satyagraha never\n2. MORAL FORCE: Instead of physical coercion, uses moral persuasion\n3. SUFFERING WILLINGLY: Satyagrahis courted arrest and suffering — strengthened the moral argument\n4. CHANGE OF HEART: Aim was to win over the oppressor through truth, not to crush them\n5. NO HATRED: 'Hate the sin, love the sinner' — no personal animosity\n\nEFFECT ON BRITISH:\nBy courting imprisonment peacefully, Indians exposed the injustice of British rule to the world, making British rule increasingly difficult to justify morally."},
        {q:"Why did Gandhi launch the Civil Disobedience Movement with the Salt March? What was its significance?",a:"BACKGROUND:\n• In 1929, Congress declared 'Purna Swaraj' (complete independence) as goal\n• January 26, 1930 declared as Independence Day\n• Gandhi announced Civil Disobedience Movement\n\nWHY SALT:\n1. SALT TAX — SYMBOL OF BRITISH INJUSTICE: British had monopoly on salt production and charged tax — everyone (rich and poor) needed salt\n2. UNIVERSAL RELEVANCE: Salt affected all classes, castes and religions — a unifying issue\n3. EVERYDAY NECESSITY: Making salt was making common people disobey a law they found unjust\n4. DRAMATIC POTENTIAL: Simple act of picking up salt from the sea shore was visually powerful\n\nTHE MARCH (March 12 – April 6, 1930):\n• Gandhi walked 240 miles from Sabarmati Ashram to Dandi (coastal village) with 78 followers\n• Thousands joined along the way\n• On April 6, Gandhi picked up a handful of salt — breaking the law\n• Nationwide salt-making began\n\nSIGNIFICANCE:\n1. MASS MOVEMENT: Millions participated across India — farmers, workers, women\n2. WOMEN'S PARTICIPATION: Women picketed liquor and foreign cloth shops in large numbers — major change\n3. INTERNATIONAL ATTENTION: World media covered the march\n4. SHOWED UNITY: Hindus, Muslims, all classes participated\n5. WEAKENED BRITISH AUTHORITY: British jailed 60,000 people — but couldn't suppress the movement\n6. GANDHI-IRWIN PACT (1931): British conceded some demands"},
        {q:"How did different social groups participate in the Non-Cooperation Movement?",a:"PARTICIPATION IN NON-COOPERATION MOVEMENT (1920-22):\n\n1. MIDDLE CLASS — URBAN AREAS:\n• Lawyers like Motilal Nehru, C.R. Das gave up law practice\n• Students left government schools and colleges\n• Teachers resigned from government schools\n• Merchants boycotted foreign cloth and liquor shops\n\n2. PEASANTS — RURAL AREAS:\n• Peasants in Awadh (UP) under Baba Ramchandra refused to pay rent to landlords\n• Connected to Gandhi's movement though Gandhiji wanted non-violent non-cooperation\n• Peasant movement sometimes became violent (raiding landlords' homes)\n\n3. TRIBAL PEOPLE:\n• Alluri Sitarama Raju led Gudem Hills rebellion in Andhra Pradesh\n• Protested against forest laws that denied them access to forests\n• Used Gandhian methods and also violent methods — complex relationship with Gandhi's movement\n\n4. PLANTATION WORKERS (Assam):\n• Thousands of workers left tea plantations and tried to return home\n• Believed Gandhi's Swaraj meant they could return to their villages freely\n\n5. LIMITATIONS:\n• Muslim participation declined after Khilafat Movement faded\n• Dalit participation was limited — separate issues of untouchability\n• Called off after Chauri Chaura violence (February 1922)"}
      ],
      long: [
        {q:"Describe the Civil Disobedience Movement. How was it different from the Non-Cooperation Movement?",a:"CIVIL DISOBEDIENCE MOVEMENT (1930-34):\n\nBACKGROUND:\n• 1929 Lahore Congress: Purna Swaraj declared goal\n• Irwin rejected Nehru's demand for Dominion Status\n• Gandhi prepared 11 demands; Irwin ignored most\n• Gandhi chose salt as focus\n\nKEY EVENTS:\n1. SALT MARCH (March 12-April 6, 1930): Gandhi's 240-mile march to Dandi — mass civil disobedience began\n2. NATIONWIDE DISOBEDIENCE: Salt made across India; foreign cloth boycotted; forest laws broken; rent and revenue refused in some areas\n3. PARTICIPATION: Thousands arrested including Gandhi; women took leadership\n4. GANDHI-IRWIN PACT (1931): Gandhi suspended movement; went to Second Round Table Conference\n5. RESUMED (1932): After British communal award; second phase, less effective\n\nDIFFERENCES FROM NON-COOPERATION MOVEMENT:\n\nNON-COOPERATION (1920-22):\n• Focus: Refusing to cooperate — not going to schools, courts, returning honours\n• Phase 1 approach: Withdrawal, non-participation\n• Ended: When Chauri Chaura violence occurred (Gandhi called it off)\n• Participants: More urban initially\n\nCIVIL DISOBEDIENCE (1930-34):\n• Focus: ACTIVELY BREAKING unjust laws (making salt, entering forests)\n• More radical — deliberate law-breaking not just non-cooperation\n• Massive women's participation — new development\n• Wide geographic spread\n• International attention through Salt March\n\nSIMILARITY: Both used non-violent methods; both organised by Gandhi and Congress; both anti-British."}
      ],
      passage: [
        {q:"'The Jallianwala Bagh massacre: On 13 April 1919, General Dyer entered Amritsar with his troops. He marched them to a public garden called Jallianwala Bagh. Dyer's troops opened fire on the crowd. This continued for 10 to 15 minutes till the ammunition was exhausted. Hundreds were killed.'\n\n(a) What was the context that led to the Jallianwala Bagh massacre?\n(b) What was the significance of this event for the Indian nationalist movement?\n(c) Who wrote about this as 'an monstrous event'?\n(d) What was Rabindranath Tagore's response to this event?",a:"(a) Context leading to Jallianwala Bagh:\n• British had passed the Rowlatt Act (1919) allowing imprisonment without trial\n• Gandhi had called for a nationwide satyagraha on April 6, 1919\n• In Amritsar and Punjab, there were widespread protests and hartals\n• Two local leaders — Dr. Saifuddin Kitchlew and Dr. Satyapal — had been deported\n• Amritsar was placed under martial law\n• On April 13 (Baisakhi day), thousands had gathered in Jallianwala Bagh for a peaceful protest meeting unaware of the ban on gatherings\n\n(b) Significance for nationalist movement:\n• Turned millions against British rule — the outrage was universal\n• Demonstrated the true nature of British 'civilising mission' — brutal violence against peaceful protesters\n• Inspired new generation of revolutionaries (Bhagat Singh witnessed it as a child)\n• Hunter Commission inquiry revealed British had no regret — further alienated Indians\n• Gandhi described it as 'satanic' — became more committed to non-cooperation\n• United Hindus and Muslims in condemning the massacre\n• Became a defining moment in India's independence movement\n\n(c) Rabindranath Tagore described this as a monstrous event and renounced his knighthood in protest.\n\n(d) Rabindranath Tagore's response:\n• He renounced (gave back) his KNIGHTHOOD that the British had awarded him\n• He wrote to the Viceroy saying he could not accept honours from a government that committed such acts\n• This was a powerful symbolic protest by India's most internationally respected figure"}
      ]
    },

      short: [
        {q:"What were the Silk Routes? How did they promote trade and cultural exchange?",a:"SILK ROUTES:\nAncient network of overland and sea routes connecting Asia with Europe and North Africa. Named after West-bound Chinese silk trade.\n\nEXISTED: Since before Christian Era to about 15th century.\n\nPROMOTED TRADE:\n• Chinese silk, pottery travelled westward\n• Indian and Southeast Asian textiles and spices\n• Gold and silver flowed from Europe to Asia\n• Created entire trading civilisations along the routes\n\nPROMOTED CULTURAL EXCHANGE:\n• Religious missionaries used these routes — Buddhism spread from India to East Asia\n• Early Christian missionaries to Asia\n• Muslim preachers spread Islam to Central Asia and China\n• Ideas, inventions, technologies travelled with traders\n• Food plants: Spaghetti may have come from Chinese noodles via Arab traders\n• Cowrie shells from Maldives found in China and East Africa — common currency\n\nSIGNIFICANCE:\nDemonstrates that globalisation did not begin with modern capitalism — ancient human societies were already interconnected through trade, religion and culture."},
        {q:"What was indentured labour? How was it used in British colonies?",a:"INDENTURED LABOUR:\nA system where labourers signed a contract (indenture) to work for a plantation owner for a fixed period (usually 5 years) in a distant colony in exchange for passage, food and accommodation.\n\nCONTEXT:\n• After abolition of slavery (1833), British plantation owners needed cheap labour\n• They turned to India, China, Sri Lanka, and Africa\n• Workers from Bihar, UP, Tamil Nadu, etc. recruited under false promises\n\nCONDITIONS:\n• Workers told they would return after 5 years (often couldn't afford to)\n• Conditions on ships and plantations were harsh — like slavery\n• Could not leave employer during contract — breach was criminal offence\n• Low wages, long hours, poor living conditions\n\nDESTINATIONS:\n• Caribbean (Trinidad, Guiana), Fiji, South Africa, Mauritius, Malaya, Ceylon\n\nRESISTANCE:\n• Workers resisted — slow work, sabotage, running away, suicide\n• Some strikes\n• Abolition campaigns — system abolished 1921\n\nLEGACY:\n• Significant Indian diaspora in Caribbean, Fiji, Mauritius\n• Cultural mixing — bhojpuri music in Caribbean, Hindi religions in Fiji\n• Created social inequalities and racial tensions that persist"},
        {q:"Describe the Great Depression (1929). What were its causes and effects on colonies like India?",a:"GREAT DEPRESSION (1929-1930s):\n\nCAUSES:\n1. WALL STREET CRASH (October 1929): US stock market collapsed — billions wiped out\n2. BANK FAILURES: Banks called in loans, businesses couldn't repay, banks collapsed\n3. OVERPRODUCTION: Factories and farms had produced more than people could buy\n4. AGRICULTURAL CRISIS: Farm prices had been falling through 1920s\n5. TRADE COLLAPSE: Countries raised tariffs to protect domestic industries — global trade fell\n\nEFFECTS ON USA/EUROPE:\n• 25% unemployment in USA\n• Businesses closed, wages fell\n• Poverty and hunger widespread\n• Political consequences — rise of fascism in Europe\n\nEFFECTS ON COLONIES (India):\n1. AGRICULTURAL PRICES COLLAPSED: Wheat prices fell 50% — farmers' incomes devastated\n2. COLONIAL EXPLOITATION CONTINUED: India was forced to export more to earn foreign exchange\n3. EXPORTS FELL BUT IMPORTS CONTINUED: India had trade surplus but living standards fell\n4. RURAL DISTRESS: Peasants borrowed to pay taxes — debt increased\n5. URBAN WORKERS: Some industries reduced production — unemployment increased\n6. POLITICAL EFFECT: Economic distress increased support for independence movement — fuelled Civil Disobedience Movement (1930)"}
      ],
      long: [
        {q:"How did the post-World War II Bretton Woods system shape the global economy? Why did it eventually collapse?",a:"BRETTON WOODS SYSTEM (1944-1971):\n\nESTABLISHMENT:\nIn July 1944, Allied nations met at Bretton Woods, New Hampshire, USA to plan post-war international economic order.\n\nINSTITUTIONS CREATED:\n1. IMF (International Monetary Fund): For dealing with external surpluses and deficits of member nations\n2. World Bank: For financing post-war reconstruction and development\n\nFEATURES:\n1. FIXED EXCHANGE RATES: All currencies pegged to US Dollar; Dollar pegged to gold ($35 per ounce)\n2. US DOMINANCE: USA held most of world's gold — dollar was international reserve currency\n3. CAPITAL CONTROLS: Countries could control flows of money in and out\n4. RECONSTRUCTION: Marshall Plan ($13 billion from USA) rebuilt Western Europe\n\nAGE OF PROSPERITY (1950s-60s):\n• Rapid economic growth in Western countries\n• Low unemployment\n• Rising living standards\n• Global trade expanded enormously\n• Post-war industrial reconstruction\n\nWHY IT COLLAPSED (1971):\n1. USA SPENT TOO MUCH: Vietnam War and domestic programmes drained US gold reserves\n2. DOLLAR WEAKENED: USA printed too many dollars; confidence in dollar-gold link weakened\n3. US TRADE DEFICITS: Europe and Japan became competitive — USA lost trade surplus\n4. CAPITAL FLOWS: Multinational corporations moving money made fixed rates untenable\n5. 1971: President Nixon ended dollar's convertibility to gold — Bretton Woods system collapsed\n6. FLOATING EXCHANGE RATES: Currencies now 'float' against each other — determined by market\n\nLEGACY: IMF and World Bank continue but with different roles — key institutions of globalisation."}
      ],
      passage: [
        {q:"'Many of our common foods such as potatoes, soya, groundnuts, maize, tomatoes, chillies, sweet potatoes were not known to our ancestors until about five centuries ago. These foods were only introduced in Europe and Asia after Christopher Columbus accidentally discovered the Americas.'\n\n(a) How did these food plants spread globally?\n(b) What other things spread along with trade and exploration?\n(c) How did the discovery of America affect indigenous peoples?\n(d) Give an example of how food spread represents cultural exchange.",a:"(a) How food plants spread globally:\n• European colonisers brought plants from the Americas back to Europe, Asia and Africa\n• Traders, missionaries and explorers carried seeds and plants as they travelled\n• Colonial agriculture introduced American plants to colonial territories\n• Portuguese and Spanish sailors spread plants through their global trade routes\n• Over centuries, plants naturalised in new environments — today Bangladesh grows potatoes everywhere though potato is American!\n\n(b) Other things that spread with trade and exploration:\n• Germs and diseases: Smallpox, measles devastated native American populations\n• Animals: Horses reintroduced to Americas (had been extinct there)\n• Technologies: Printing, navigation techniques, manufacturing\n• Religion: Christianity spread by missionaries following colonisers\n• Culture: Music, dress, language\n• Ideas: Enlightenment ideas spread to colonies\n• Labour systems: Slavery, indentured labour moved people around the globe\n\n(c) Impact on indigenous peoples of Americas:\n• DEVASTATING: An estimated 90% of indigenous population died within a century of European contact\n• MAIN CAUSE: Diseases (smallpox, measles) to which natives had NO immunity — not guns\n• CONQUEST: Weakened populations easily conquered\n• FORCED LABOUR: Survivors enslaved in mines and plantations\n• CULTURAL DESTRUCTION: Languages, religions, traditions suppressed\n• LAND SEIZURE: Vast territories taken over\n\n(d) Example of food as cultural exchange:\n• Spaghetti (Italian) likely originated from Chinese noodles brought by Arab traders to Sicily in 5th century\n• The same food — in different forms — exists in China (noodles), India, Japan, Italy\n• This shows that even centuries ago, cultures were connected through trade routes and exchange"}
      ]
    },

      short: [
        {q:"What was proto-industrialisation? How did it differ from the factory system?",a:"PROTO-INDUSTRIALISATION:\nIndustrial production that existed in the countryside BEFORE factory system emerged — producing for regional and international markets.\n\nFEATURES:\n• Production happened in rural homes and cottages, not factories\n• Merchants supplied raw materials to rural producers\n• Workers produced goods at home using own tools (cottage industries)\n• Merchants collected finished goods and sold in distant markets\n• Existed across Europe and other parts of world before Industrial Revolution\n• Helped families supplement farm income — seasonal work\n\nEXAMPLE:\n• In 17th-18th century England, merchants gave wool to rural families who spun and wove cloth at home\n• Merchant supplied raw material, collected finished cloth, sold internationally\n\nDIFFERENCES FROM FACTORY SYSTEM:\n• LOCATION: Proto-industry was in homes; factories were centralised buildings\n• CONTROL: Worker had more control; factory owner had total control\n• TECHNOLOGY: Proto-industry used simple tools; factories had power machinery\n• WORK RHYTHM: Proto-industry followed seasons; factories had fixed hours\n• SCALE: Factories produced more, faster\n• RELATIONSHIP: Proto-industry was family-based; factory was wage labour"},
        {q:"Why did Indian weavers and artisans decline in the 19th century?",a:"DECLINE OF INDIAN WEAVERS AND ARTISANS:\n\n1. MACHINE-MADE IMPORTS:\n• British machine-made cotton and silk textiles flooded Indian markets after 1820s\n• Machine goods were CHEAPER than handloom goods\n• Indian weavers could not compete on price\n\n2. COLONIAL POLICIES:\n• British imposed IMPORT DUTIES on Indian goods exported to Britain (protecting British industry)\n• Simultaneously REMOVED protection for Indian industries\n• Unequal trade — Indian markets open to British goods; Indian goods restricted in Britain\n\n3. LOSS OF PATRONAGE:\n• Nawabs, kings and nobles who patronised weavers lost power\n• Colonial officers preferred European goods\n• Local courts disappeared — major customers gone\n\n4. RAW MATERIAL DIVERSION:\n• Raw cotton increasingly exported to Britain rather than used by Indian weavers\n\n5. COMPETITION IN EXPORT MARKETS:\n• Indian textiles lost traditional export markets in Africa and Southeast Asia to cheaper British goods\n\nRESULT:\n• Traditional weaving centres like Dacca (muslin), Surat and Murshidabad declined sharply\n• Weavers became agricultural labourers or migrated to cities\n• 'De-industrialisation' — reverse of industrial progress in India\n\nEXCEPTION: Some weavers survived by producing cheaper, coarser cloth or by finding niches like silk weaving"},
        {q:"Why did the growth of factory industries in India happen slowly? What were the obstacles?",a:"SLOW GROWTH OF FACTORY INDUSTRIES IN INDIA:\n\nOBSTACLES:\n1. COLONIAL POLICY:\n• British discouraged Indian industrialisation to protect British industries\n• Free trade policy forced on India — British goods competed without restrictions\n• Government contracts and railways mainly benefited British companies\n\n2. CAPITAL AND TECHNOLOGY:\n• Limited access to capital for Indian entrepreneurs\n• Technology had to be imported — costly\n• Technical skills were concentrated in Britain\n\n3. COMPETITION:\n• Cheaper British machine-made goods dominated markets — difficult to compete\n• British companies had advantages of established reputation and connections\n\n4. INFRASTRUCTURE:\n• Railways initially built to transport raw materials OUT of India, not to promote industrialisation\n• Ports and communication served British needs\n\nDESPITE OBSTACLES — INDIAN INDUSTRIALISATION:\n• First cotton mill: Bombay 1854 (Kawasji Davar)\n• Tata Iron and Steel Company: Jamshedpur 1912 (J.N. Tata)\n• Jute mills in Bengal\n• Cotton mills in Bombay and Ahmedabad\n• Mainly Indian capital in cotton; mainly British in jute\n\nWWI BOOST:\n• When British goods could not reach India during WWI, Indian factories grew — showed potential of Indian industry"}
      ],
      long: [
        {q:"Describe the features of early industrial society in Britain. What were the conditions for workers?",a:"EARLY INDUSTRIAL BRITAIN:\n\nFEATURES OF INDUSTRIAL SOCIETY:\n1. URBANISATION: Rural population moved to industrial cities — Manchester, Birmingham, Leeds\n2. FACTORIES: Large buildings housing hundreds of workers with machines\n3. CHILD AND WOMEN LABOUR: Factory owners used cheaper labour extensively\n4. LONG WORKING HOURS: 14-16 hours daily were common\n5. POOR CONDITIONS: Dangerous machinery, dust, chemicals, no safety measures\n6. SEASONAL UNEMPLOYMENT: Even in factories, some work was seasonal — idle periods\n7. LOW WAGES: Workers poorly paid; had to work constantly or face destitution\n\nCONDITIONS FOR WORKERS:\nBAD:\n• No job security — could be dismissed any time\n• No minimum wage or unions initially\n• Child labour — children as young as 5 worked in mines and factories\n• Dangerous conditions — accidents, respiratory diseases, injuries common\n• Poor housing in industrial slums — overcrowded, no sanitation\n• Long hours with no breaks\n• Women paid less than men for same work\n\nIMPROVEMENTS OVER TIME:\n• Labour laws gradually introduced (Factory Acts restricting child labour)\n• Trade unions formed — bargained for better conditions\n• Working hours reduced\n• Safety regulations introduced\n• Universal education eventually provided\n\nCONTRADICTION:\nIndustrialisation created enormous wealth but also created new forms of poverty and exploitation — challenging the simple narrative of 'progress'."}
      ],
      passage: [
        {q:"Read the following:\n\n'In 1900, a popular music publisher produced a music book with a picture of the angel of progress bearing the flag of the new century. She is gently perched on a wheel with wings, symbolising time. Floating about, behind her, are the signs of progress: railway, camera, machines, printing press and factory.'\n\n(a) What does this image tell us about the attitude towards industrialisation in 1900?\n(b) Is this a complete or one-sided view of industrialisation? Explain.\n(c) What were the negative effects of industrialisation that this image ignores?\n(d) What is the historian's task when studying such sources?",a:"(a) The image reflects the TRIUMPHANT, OPTIMISTIC attitude towards industrialisation in 1900. Society at that time viewed:\n• Technology and machines as symbols of human progress and achievement\n• Railways, factories, cameras as markers of civilisation and modernity\n• Industrial progress as something god-given (the angel) and inevitable (wheel of time)\n• The West's industrial power as natural and beneficial\nThis reflected the dominant ideology of the age — that modernisation and industrialisation meant progress for all humanity.\n\n(b) This is a ONE-SIDED and incomplete view of industrialisation because it shows only the positive aspects. It represents the perspective of industrialists, manufacturers and the ruling class who benefited most from industrialisation. It ignores the experiences of workers, colonised peoples, and those displaced by machines.\n\n(c) Negative effects ignored by this image:\n• WORKER EXPLOITATION: Long hours, dangerous conditions, child labour, low wages\n• URBANISATION PROBLEMS: Overcrowded industrial slums, disease, pollution\n• ENVIRONMENTAL DAMAGE: Coal smoke, river pollution, destruction of landscapes\n• COLONIAL IMPACT: Industrialisation in Europe meant de-industrialisation in colonies like India — weavers lost livelihoods\n• SOCIAL DISRUPTION: Traditional communities broken up; skilled artisans lost status\n• CLASS INEQUALITY: Massive wealth created for few owners; poverty for many workers\n\n(d) The historian's task when studying such sources:\n• Recognise the source's PERSPECTIVE and BIAS — who created it? For what purpose?\n• Consider WHOSE experience is represented and whose is left out\n• Use multiple sources — including workers' memoirs, official records, newspaper reports — to get a complete picture\n• Critically question the dominant narrative — 'progress for whom?'\n• Understand the historical context — why did people see industrialisation this way?\n• Provide a balanced history that includes experiences of all groups"}
      ]
    },

      short: [
        {q:"How did Gutenberg's printing press change Europe? What was its impact?",a:"GUTENBERG'S PRINTING PRESS (c. 1448):\nJohannes Gutenberg of Mainz, Germany, developed the first movable type printing press in Europe, adapting wine and olive press technology.\n\nCHANGES IT BROUGHT:\n\n1. BOOK PRODUCTION REVOLUTIONISED:\n• Before: Each book hand-copied — took months, very expensive\n• After: 150-200 copies per day, much cheaper\n• First book printed: Bible (1448) — 180 copies in 3 years\n• By 1500: 20 million books printed in Europe\n\n2. SPREAD OF IDEAS:\n• Ideas could now spread quickly and widely\n• Martin Luther's 95 Theses (1517) — spread across Europe in weeks through print\n• Protestant Reformation powered by print\n• Scientific ideas of Copernicus, Galileo spread widely\n\n3. LITERACY EXPANSION:\n• Books became affordable for middle classes\n• Chapbooks (cheap pocket books) sold to lower classes\n• Demand for literacy increased — reading became important\n\n4. NEW READERS:\n• Women began reading more\n• Working classes accessed books\n• Diverse literature: Novels, political pamphlets, science books\n\n5. QUESTIONING AUTHORITY:\n• Ideas could challenge Church and monarchy\n• People could read Bible themselves — didn't depend on priest\n• Led to political revolutions (pamphlets in French Revolution)\n\nFEAR:\nChurch and rulers recognised the danger — tried to control print through censorship and index of banned books."},
        {q:"How did print culture contribute to the development of nationalism in India?",a:"PRINT AND NATIONALISM IN INDIA:\n\n1. SPREADING IDEAS:\n• Nationalist ideas could be printed and distributed widely\n• Newspapers reached literate people across vast distances\n• Pamphlets and books in vernacular languages reached non-English speakers\n\n2. KEY NEWSPAPERS:\n• Bengal Gazette (Hickey, 1780) — first Indian newspaper\n• Sambad Kaumudi (Ram Mohan Roy) — promoted social reform and nationalism\n• Kesari (Tilak, Marathi) — 'Swaraj is my birthright'\n• Al Hilal (Maulana Azad) — for Muslim nationalists\n• Young India (Gandhi)\n\n3. SOCIAL REFORM MOVEMENTS:\n• Print debate on Sati, child marriage, widow remarriage\n• Ram Mohan Roy used print to campaign against Sati\n• Jyotiba Phule used print to challenge caste discrimination\n\n4. VERNACULAR LANGUAGES:\n• Literature in Bengali, Marathi, Tamil, Hindi connected people culturally\n• Shared language through print created sense of common identity\n• Songs, poems, stories of national pride spread through print\n\n5. COLONIAL CONCERNS:\n• Vernacular Press Act (1878) — British tried to curb vernacular press\n• Shows that British recognised print's power for nationalism\n\n6. GANDHI'S USE:\n• Gandhi's Hind Swaraj and writings spread through newspapers\n• Congress pamphlets printed in millions for mass campaigns"},
        {q:"What impact did print culture have on women and lower castes in colonial India?",a:"IMPACT ON WOMEN:\n\nPOSITIVE:\n1. REFORMERS USED PRINT: Social reformers (Ram Mohan Roy, Ishwarchandra Vidyasagar) used print to campaign for women's rights — widow remarriage, education\n2. WOMEN'S LITERATURE: Educated women began writing — Tarabai Shinde's Stri Purush Tulana (1882) criticised male dominance\n3. WOMEN'S MAGAZINES: Published in 1880s-90s for women — addressed their issues\n4. EDUCATION DEBATE: Print debates on women's education led to establishment of girls' schools\n5. NATIONALIST WOMEN: Women's participation in nationalism spread through printed words\n\nNEGATIVE:\n• Conservative men worried print would give women too much independence\n• Some men controlled what women read\n• Some prints reinforced traditional gender roles\n\nIMPACT ON LOWER CASTES:\n1. JYOTIBA PHULE (Maharashtra): Used print to challenge Brahmin dominance and advocate rights for lower castes\n2. DALIT LITERATURE: Writings of Dalit intellectuals spread through print\n3. AMBEDKAR'S MOOKNAYAK (1920): Newspaper for Dalit rights\n4. AWARENESS: Lower caste people could read about their rights\n5. BIRSA MUNDA: Tribal leader whose ideas spread partly through printed reports\n6. REGIONAL LANGUAGES: Print in local languages helped marginalised groups access information\n\nCONCLUSION: Print democratised access to knowledge and debate, though its benefits were unequal — those already literate and educated gained most."}
      ],
      long: [
        {q:"'The print revolution transformed the lives of people in Europe.' Discuss.",a:"PRINT REVOLUTION — TRANSFORMATION OF EUROPEAN LIFE:\n\nBEFORE PRINT (Manuscript culture):\n• Books were handwritten by monks — took months, very expensive\n• Only clergy and wealthy could afford books\n• Knowledge confined to monasteries, courts and universities\n• Church controlled information\n\nAFTER GUTENBERG (1448 onwards):\n\n1. DEMOCRATISATION OF KNOWLEDGE:\n• Books affordable for middle class\n• Chapbooks (cheap pamphlets) reached working class\n• By 1500: 20 million books; by 1600: 200 million\n• Literacy rates increased gradually\n\n2. RELIGIOUS TRANSFORMATION:\n• Martin Luther's 95 Theses (1517) spread in weeks — Protestant Reformation\n• People could read Bible in their own languages — didn't need priests to interpret\n• Church lost monopoly on religious knowledge\n• Religious wars followed — print spread conflicting views rapidly\n\n3. SCIENTIFIC REVOLUTION:\n• Copernicus, Galileo, Newton — ideas spread beyond their immediate circle\n• Scientists could build on each other's work — cumulative knowledge\n• Questioning received wisdom became possible\n\n4. POLITICAL CHANGE:\n• French Revolution pamphlets spread radical ideas\n• American Revolution — Common Sense (Thomas Paine) sold 100,000+ copies\n• Monarchies and aristocracy questioned\n\n5. CULTURAL CHANGE:\n• Novel as new literary form emerged — private reading\n• Women began reading and writing\n• Print created shared cultural references — national literature\n\n6. NEW ANXIETIES:\n• Church tried to control print — Index of Forbidden Books (1558)\n• Rulers feared seditious literature\n• Print spread both truth and falsehood\n\nCONCLUSION: Print was arguably the most revolutionary technology before the internet — transforming religious, scientific, political and cultural life in Europe."}
      ],
      passage: [
        {q:"'By the seventeenth century, as urban culture bloomed in China, the uses of print diversified. Print was no longer used just by scholar-officials. Merchants used print in their everyday life, as they collected trade information. Reading increasingly became a leisure activity. New readership preferred fictional narratives, poetry, autobiographies, romantic plays. Rich women began to read, and many began publishing their poetry and plays.'\n\n(a) What does this passage tell us about print culture in 17th century China?\n(b) How did print change the role of women in China?\n(c) Compare this with the role of print for women in 19th century India.\n(d) What does the phrase 'uses of print diversified' mean?",a:"(a) The passage tells us that in 17th century China:\n• Print had moved beyond its original purpose (civil service examination texts) to serve diverse needs\n• Urban middle class — merchants — used print for practical purposes (trade information)\n• A new leisure reading culture had emerged among the educated urban population\n• Literature diversified — fiction, poetry, autobiography, drama became popular genres\n• Print had become accessible enough for wealthy women to participate as readers AND writers\n• It shows that print's social impact was significant — changing leisure, gender roles, and class in Chinese society\n\n(b) Print changed women's role in China by:\n• Giving wealthy women access to literature and education outside the home\n• Creating opportunities for women to WRITE and PUBLISH their own works\n• Women's poetry and plays circulated in print — giving them public voice\n• Challenging the traditionally private, domestic role of women\n• Creating a community of women readers and writers\nHowever, this was limited to rich, educated women — poor women had no access to print culture\n\n(c) Comparison with 19th century India:\nSIMILARITIES:\n• In both: Educated upper-class women benefited from print culture\n• Both: Women began writing and publishing (though later in India)\n• Both: Print expanded women's mental world\n\nDIFFERENCES:\n• In India: Print was also used to DEBATE women's social conditions (Sati, child marriage, widow remarriage)\n• India: Social reformers (mostly men) used print to advocate women's rights\n• India: Women's own writing was more political (Tarabai Shinde) — directly challenging patriarchy\n• India: Colonial context added dimensions — nationalist women used print for independence movement too\n\n(d) 'Uses of print diversified' means that print was no longer used for just one purpose (government/religious texts) but served multiple functions:\n• Entertainment (novels, plays, poetry)\n• Business (trade information, contracts)\n• Education (beyond official examinations)\n• News and current affairs\n• Personal expression (autobiography, memoirs)\nThis shows print becoming integrated into everyday life, not just official/scholarly use."}

      q:"From the pH scale diagram: (a) What pH indicates neutral solution? (b) Which pH range indicates acids? (c) Name one substance each at pH≈1 and pH≈14.",
      a:"(a) pH=7 indicates a neutral solution (e.g., pure water at 25°C).\n\n(b) Acids have pH < 7 (range 0 to 6)\n    Bases have pH > 7 (range 8 to 14)\n\n(c) pH ≈ 1: Hydrochloric acid (HCl) — strong acid used in stomach\n    pH ≈ 14: Sodium hydroxide (NaOH) — strong base used in soap making\n\nImportant examples:\n• pH 2-3: Lemon juice, vinegar\n• pH 4-5: Tomato juice, black coffee\n• pH 7: Pure water, blood (7.4)\n• pH 8-9: Baking soda, sea water\n• pH 11-13: Bleach, ammonia\n\nIndicators like litmus, phenolphthalein and methyl orange help determine pH."
    }],
    "Metals and Non-metals": [{
      svg:`<svg viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg" style="background:#1a1d28;border-radius:8px">

        <text x="250" y="174" text-anchor="middle" fill="#fff" font-size="11">Hg, Ag, Au, Pt (Least Reactive)</text>
        <text x="50" y="110" fill="#ff5c5c" font-size="11">More</text>
        <text x="50" y="123" fill="#ff5c5c" font-size="11">Reactive</text>

        <text x="250" y="210" text-anchor="middle" fill="#6b7394" font-size="10">More reactive metals displace less reactive metals from their salt solutions</text>

      caption:"Reactivity series of metals from most to least reactive",
      q:"From the reactivity series: (a) Which metal can displace copper from copper sulphate solution? (b) Why is gold found in free state in nature?",
      a:"(a) Any metal above copper in the reactivity series can displace it.\nZinc (Zn) can displace copper:\nZn + CuSO₄ → ZnSO₄ + Cu\nIron (Fe) can also displace copper:\nFe + CuSO₄ → FeSO₄ + Cu\n(Blue colour of CuSO₄ fades and copper deposits on iron)\n\n(b) Gold (Au) is at the BOTTOM of reactivity series — it is the least reactive metal. It does not react with air, water, or dilute acids easily. Since it doesn't react with other elements, it naturally exists in its pure metallic (free) state, not combined in ores.\n\nSame reason: Platinum and silver are also sometimes found in free state.\n\nHighly reactive metals (K, Na, Ca) are NEVER found free — always found in combined form in compounds."
    }],

        <text x="250" y="165" text-anchor="middle" fill="#dde1f0" font-size="11">Homologous Series Properties:</text>
        <text x="250" y="180" text-anchor="middle" fill="#6b7394" font-size="10">• Same general formula • Differ by −CH₂− (14 mass units)</text>
        <text x="250" y="195" text-anchor="middle" fill="#6b7394" font-size="10">• Similar chemical properties • Gradual change in physical properties</text>
        <text x="250" y="220" text-anchor="middle" fill="#6b7394" font-size="10">Alkenes: CₙH₂ₙ (double bond)  |  Alkynes: CₙH₂ₙ₋₂ (triple bond)</text>
      </svg>`,
      caption:"Homologous series of alkanes showing pattern",
      q:"From the diagram, define homologous series. Why do boiling points increase from methane to butane?",
      a:"Homologous Series: A series of organic compounds having the same general formula, same functional group, and similar chemical properties, where each member differs from the next by a −CH₂− group (14 mass units).\n\nFor Alkanes: General formula CₙH₂ₙ₊₂\n\nWhy boiling points increase (Methane -162°C → Butane -1°C):\n• As the carbon chain length increases, the molecular mass increases.\n• Larger molecules have stronger intermolecular forces (van der Waals forces).\n• More energy is needed to overcome these forces → higher boiling point.\n• This is a gradual, predictable trend — a key feature of homologous series.\n\nThe same trend applies to viscosity (thicker) and melting points as chain length increases."
    }],
    "Control and Coordination": [{
      svg:`<svg viewBox="0 0 500 240" xmlns="http://www.w3.org/2000/svg" style="background:#1a1d28;border-radius:8px">
        <text x="250" y="20" text-anchor="middle" fill="#7c6dff" font-size="13" font-weight="bold">Reflex Arc</text>
        <ellipse cx="80" cy="120" rx="35" ry="25" fill="#2d1a5c" stroke="#7c6dff" stroke-width="2"/>
        <text x="80" y="118" text-anchor="middle" fill="#dde1f0" font-size="10">Receptor</text>
        <text x="80" y="130" text-anchor="middle" fill="#6b7394" font-size="9">(skin/sense)</text>
        <rect x="170" y="95" width="80" height="50" rx="6" fill="#1a3a2c" stroke="#00c9a7" stroke-width="2"/>

        <text x="380" y="118" text-anchor="middle" fill="#dde1f0" font-size="10">Effector</text>
        <text x="380" y="130" text-anchor="middle" fill="#6b7394" font-size="9">(muscle/gland)</text>
        <path d="M 115,105 L 170,105" stroke="#ffcb47" stroke-width="2" marker-end="url(#a1)"/>
        <path d="M 250,135 L 340,135" stroke="#ff5c5c" stroke-width="2" marker-end="url(#a2)"/>

        <text x="140" y="110" fill="#ffcb47" font-size="10">nerve</text>

        <ellipse cx="250" cy="195" rx="60" ry="20" fill="#1a2535" stroke="#7c6dff" stroke-width="1.5" stroke-dasharray="4"/>
        <text x="250" y="199" text-anchor="middle" fill="#7c6dff" font-size="10">Brain (informed later)</text>
        <line x1="210" y1="145" x2="250" y2="175" stroke="#7c6dff" stroke-width="1" stroke-dasharray="3"/>
        <defs>
          <marker id="a1" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ffcb47"/></marker>
          <marker id="a2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ff5c5c"/></marker>
        </defs>
        <text x="250" y="230" text-anchor="middle" fill="#6b7394" font-size="10">Reflex action bypasses brain for quick response</text>
      </svg>`,
      caption:"Reflex arc showing pathway of a reflex action",
      q:"From the diagram, describe the pathway of a reflex action. Why does the spinal cord (not brain) control reflex actions?",
      a:"Pathway of Reflex Action:\n1. Receptor detects stimulus (e.g., touching a hot object)\n2. Sensory nerve carries impulse to spinal cord\n3. Spinal cord (relay centre) processes and generates response\n4. Motor nerve carries impulse to effector\n5. Effector (muscle) responds immediately (withdraw hand)\n6. Brain is informed AFTER the action (we feel pain later)\n\nWhy Spinal Cord controls reflex actions:\n• Reflex actions require IMMEDIATE response to protect the body\n• Sending signals to brain and back would take longer time\n• Brain is busy processing complex thoughts\n• Spinal cord acts as a local relay centre for quick, automatic responses\n• This is an involuntary action — does not require conscious thought\n\nExamples: Blinking, knee-jerk, pulling hand from hot object, sneezing"
    }],
    "How do Organisms Reproduce?": [{
      svg:`<svg viewBox="0 0 500 230" xmlns="http://www.w3.org/2000/svg" style="background:#1a1d28;border-radius:8px">
        <text x="250" y="20" text-anchor="middle" fill="#7c6dff" font-size="13" font-weight="bold">Types of Reproduction</text>
        <rect x="185" y="32" width="130" height="30" rx="6" fill="#7c6dff" opacity="0.8"/>
        <text x="250" y="52" text-anchor="middle" fill="#fff" font-size="12">Reproduction</text>
        <line x1="220" y1="62" x2="130" y2="90" stroke="#6b7394" stroke-width="1.5"/>
        <line x1="280" y1="62" x2="370" y2="90" stroke="#6b7394" stroke-width="1.5"/>
        <rect x="60" y="90" width="140" height="30" rx="5" fill="#00c9a7" opacity="0.7"/>
        <text x="130" y="110" text-anchor="middle" fill="#fff" font-size="12">Asexual</text>
        <rect x="300" y="90" width="140" height="30" rx="5" fill="#ff8c42" opacity="0.7"/>
        <text x="370" y="110" text-anchor="middle" fill="#fff" font-size="12">Sexual</text>
        <text x="60" y="140" fill="#00c9a7" font-size="10">• Fission (Amoeba)</text>
        <text x="60" y="155" fill="#00c9a7" font-size="10">• Budding (Hydra, Yeast)</text>
        <text x="60" y="170" fill="#00c9a7" font-size="10">• Regeneration (Planaria)</text>
        <text x="60" y="185" fill="#00c9a7" font-size="10">• Vegetative (plants)</text>
        <text x="60" y="200" fill="#00c9a7" font-size="10">• Spore formation</text>
        <text x="300" y="140" fill="#ff8c42" font-size="10">• Involves gametes</text>
        <text x="300" y="155" fill="#ff8c42" font-size="10">• Male + Female gametes</text>
        <text x="300" y="170" fill="#ff8c42" font-size="10">• Fertilisation occurs</text>
        <text x="300" y="185" fill="#ff8c42" font-size="10">• Genetic variation</text>
        <text x="300" y="200" fill="#ff8c42" font-size="10">• Animals, flowering plants</text>
        <text x="250" y="225" text-anchor="middle" fill="#6b7394" font-size="10">Asexual: single parent, identical offspring | Sexual: two parents, variation in offspring</text>
      </svg>`,
      caption:"Classification of types of reproduction",
      q:"From the diagram, distinguish between asexual and sexual reproduction. Give two advantages of sexual reproduction.",
      a:"Asexual Reproduction:\n• Only ONE parent involved\n• No gametes (sex cells) needed\n• Offspring are genetically identical to parent (clones)\n• Examples: Fission (Amoeba), Budding (Hydra), Spore formation (Rhizopus)\n• Fast, requires less energy\n\nSexual Reproduction:\n• TWO parents (male and female) involved\n• Requires gametes — sperm and egg\n• Fertilisation produces a new individual\n• Offspring show genetic variation\n• Examples: Humans, flowering plants, fish\n\nAdvantages of Sexual Reproduction:\n1. Genetic Variation: Offspring are not identical to parents — creates diversity which helps species adapt to changing environments\n2. Better adaptability: Variation means some individuals may survive disease or environmental changes that would kill clones\n3. Elimination of defects: Recombination can reduce harmful mutations over generations"
    }],
    "Heredity": [{

        <text x="250" y="220" text-anchor="middle" fill="#6b7394" font-size="10">F2: Tall:Dwarf = 3:1  (Phenotypic ratio) | TT:Tt:tt = 1:2:1 (Genotypic)</text>

      caption:"Mendel's monohybrid cross — Tall × Dwarf pea plants",
      q:"From the cross diagram: (a) What is the F1 phenotype and genotype? (b) What is the F2 ratio? (c) Which trait is dominant?",
      a:"(a) F1 Generation:\nPhenotype: ALL plants are Tall\nGenotype: All are Tt (heterozygous)\nConclusion: Tallness is dominant over Dwarfness\n\n(b) F2 Generation (F1 × F1 = Tt × Tt):\nGenotypes: TT : Tt : tt = 1 : 2 : 1\nPhenotypes: Tall : Dwarf = 3 : 1\n• TT (1) = Pure tall\n• Tt (2) = Hybrid tall (tall appearance)\n• tt (1) = Pure dwarf\n\n(c) TALL is the dominant trait.\nEven one copy of 'T' allele causes tall phenotype.\n'T' (capital) = dominant allele\n't' (small) = recessive allele\nDwarf trait 'disappeared' in F1 but 'reappeared' in F2 — proving it was hidden (recessive), not lost."

    "The Human Eye and the Colourful World": [{
      svg:`<svg viewBox="0 0 500 230" xmlns="http://www.w3.org/2000/svg" style="background:#1a1d28;border-radius:8px">
        <text x="250" y="20" text-anchor="middle" fill="#7c6dff" font-size="13" font-weight="bold">Human Eye — Cross Section</text>
        <ellipse cx="220" cy="120" rx="120" ry="95" fill="#1a2535" stroke="#7c6dff" stroke-width="2"/>

        <circle cx="160" cy="120" r="12" fill="#1a1d28"/>
        <text x="160" y="158" text-anchor="middle" fill="#00c9a7" font-size="9">Cornea</text>

        <circle cx="318" cy="120" r="6" fill="#ff5c5c"/>
        <text x="305" y="110" fill="#ff5c5c" font-size="9">Fovea</text>
        <circle cx="320" cy="145" r="5" fill="#ffcb47"/>
        <text x="332" y="148" fill="#ffcb47" font-size="9">Optic nerve</text>
        <line x1="100" y1="100" x2="185" y2="115" stroke="#ff8c42" stroke-width="1.5"/>
        <line x1="100" y1="140" x2="185" y2="125" stroke="#ff8c42" stroke-width="1.5"/>
        <line x1="185" y1="115" x2="318" y2="125" stroke="#ff8c42" stroke-width="1" stroke-dasharray="3"/>
        <line x1="185" y1="125" x2="318" y2="115" stroke="#ff8c42" stroke-width="1" stroke-dasharray="3"/>
        <text x="250" y="220" text-anchor="middle" fill="#6b7394" font-size="10">Light → Cornea → Pupil → Lens → Retina → Optic Nerve → Brain</text>
      </svg>`,
      caption:"Cross-section diagram of the human eye",
      q:"Label the main parts of the eye shown. Explain the function of the lens and retina.",
      a:"Main parts of the Human Eye:\n• Cornea: Transparent front part, first refraction of light occurs here\n• Iris: Coloured part, controls size of pupil\n• Pupil: Opening that controls amount of light entering\n• Lens: Biconvex, focuses light on retina (changes shape = accommodation)\n• Retina: Screen at the back — contains rods (dim light) and cones (colour)\n• Fovea/Yellow spot: Point of sharpest vision\n• Optic Nerve: Carries visual signals to brain\n\nFunction of Lens:\n• Focuses light rays on the retina\n• Changes shape (accommodation) — thicker for near objects, thinner for far objects\n• Controlled by ciliary muscles\n\nFunction of Retina:\n• Contains photoreceptor cells — rods and cones\n• Converts light into electrical signals\n• These signals travel via optic nerve to brain where image is processed"
    }],

      caption:"Fleming's Left Hand Rule for direction of force on current-carrying conductor",
      q:"State Fleming's Left Hand Rule. When is it used? A wire carries current northward in a field pointing upward — find direction of force.",
      a:"Fleming's Left Hand Rule:\nStretch the thumb, forefinger and middle finger of the LEFT hand mutually perpendicular:\n• Forefinger points in direction of Magnetic Field (B)\n• Middle finger points in direction of Current (I)\n• Thumb points in direction of Force/Motion on conductor\n\nUsed for: Electric Motors — to find direction of motion of a current-carrying conductor in a magnetic field.\n\n(Fleming's Right Hand Rule is for generators — to find direction of induced current)\n\nSolution to the problem:\n• Current direction: Northward\n• Magnetic field: Upward\nUsing Left Hand Rule:\n• Middle finger = North (current)\n• Forefinger = Up (field)\n• Thumb = points West (force direction)\nForce on the wire acts in the Westward direction."
    }],
    "Our Environment": [{
      svg:`<svg viewBox="0 0 500 230" xmlns="http://www.w3.org/2000/svg" style="background:#1a1d28;border-radius:8px">

        <text x="250" y="175" text-anchor="middle" fill="#7c6dff" font-size="11">10% Energy Rule</text>

      caption:"Food chain showing energy transfer through trophic levels",
      q:"From the food chain diagram: (a) State the 10% energy rule. (b) If plants have 10,000J of energy, how much reaches the tertiary consumer?",
      a:"(a) 10% Energy Rule (Lindemann's Law):\nOnly 10% of the energy available at one trophic level is transferred to the next trophic level. The remaining 90% is lost as heat during metabolic processes (respiration, movement, etc.).\n\n(b) Energy calculation:\nProducers (Plants) = 10,000 J\n↓ 10%\nPrimary Consumer (Herbivore) = 1,000 J\n↓ 10%\nSecondary Consumer (Carnivore) = 100 J\n↓ 10%\nTertiary Consumer (Top predator) = 10 J\n\nOnly 10J reaches the tertiary consumer from 10,000J!\n\nThis is why:\n• Food chains rarely have more than 4-5 levels\n• Vegetarian diet is more energy-efficient than non-vegetarian\n• Large predators need huge territories to get enough food"

  english_ff: {

      svg:`<svg viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg" style="background:#1a1d28;border-radius:8px">

      caption:"Story map showing plot structure of 'A Letter to God'",
      q:"From the story map, explain the central irony of 'A Letter to God'. What does the story reveal about Lencho's character?",
      a:"Central Irony of the Story:\nLencho has absolute, unshakeable faith in God. When his crops are destroyed by hail, he writes a letter directly to God asking for 100 pesos. The post office workers, moved by his faith, collect money and send him 70 pesos. However, when Lencho receives only 70 instead of 100, he immediately suspects the post office people of stealing, calling them 'a bunch of crooks.'\n\nThe IRONY: The very people who helped him — who were moved by his faith and sacrificed their own money — are accused of dishonesty by the man who claims to have pure faith. He trusts an unseen God completely but distrusts the humans who actually helped him.\n\nLencho's Character:\n• Deep religious faith — believes God will help him\n• Simple, hardworking farmer\n• Lacks awareness of human kindness\n• Somewhat naive — cannot see the irony of his situation\n• His faith is genuine but his understanding of people is limited\n\nTheme: The story explores naive religious faith versus human goodness and the paradox of blind faith."

  social_dp: {
    "Power Sharing": [{
      svg:`<svg viewBox="0 0 500 230" xmlns="http://www.w3.org/2000/svg" style="background:#1a1d28;border-radius:8px">
        <text x="250" y="20" text-anchor="middle" fill="#7c6dff" font-size="13" font-weight="bold">Forms of Power Sharing</text>
        <rect x="30" y="38" width="210" height="55" rx="6" fill="#2d1a5c" stroke="#7c6dff" stroke-width="1.5"/>
        <text x="135" y="58" text-anchor="middle" fill="#dde1f0" font-size="11" font-weight="bold">Horizontal Distribution</text>
        <text x="135" y="74" text-anchor="middle" fill="#6b7394" font-size="10">Legislature, Executive, Judiciary</text>
        <text x="135" y="87" text-anchor="middle" fill="#6b7394" font-size="9">(Separation of powers)</text>
        <rect x="260" y="38" width="210" height="55" rx="6" fill="#1a3a2c" stroke="#00c9a7" stroke-width="1.5"/>
        <text x="365" y="58" text-anchor="middle" fill="#dde1f0" font-size="11" font-weight="bold">Vertical Distribution</text>
        <text x="365" y="74" text-anchor="middle" fill="#6b7394" font-size="10">Central, State, Local Govt.</text>
        <text x="365" y="87" text-anchor="middle" fill="#6b7394" font-size="9">(Federalism)</text>
        <rect x="30" y="108" width="210" height="55" rx="6" fill="#3d2000" stroke="#ff8c42" stroke-width="1.5"/>
        <text x="135" y="128" text-anchor="middle" fill="#dde1f0" font-size="11" font-weight="bold">Among Social Groups</text>
        <text x="135" y="144" text-anchor="middle" fill="#6b7394" font-size="10">Community Govt. (Belgium)</text>
        <text x="135" y="157" text-anchor="middle" fill="#6b7394" font-size="9">(Religious, linguistic groups)</text>
        <rect x="260" y="108" width="210" height="55" rx="6" fill="#3d3a00" stroke="#ffcb47" stroke-width="1.5"/>
        <text x="365" y="128" text-anchor="middle" fill="#dde1f0" font-size="11" font-weight="bold">Political Parties, Pressure</text>
        <text x="365" y="144" text-anchor="middle" fill="#6b7394" font-size="10">Opposition, Movements,</text>
        <text x="365" y="157" text-anchor="middle" fill="#6b7394" font-size="9">Media, Interest groups</text>
        <text x="250" y="185" text-anchor="middle" fill="#7c6dff" font-size="11">Why Power Sharing is important:</text>
        <text x="250" y="200" text-anchor="middle" fill="#6b7394" font-size="10">Reduces conflict | Ensures stability | Protects minority rights | Prevents tyranny</text>
        <text x="250" y="220" text-anchor="middle" fill="#6b7394" font-size="10">Belgium: Shared among communities | Sri Lanka: Majoritarianism led to conflict</text>
      </svg>`,
      caption:"Four forms of power sharing in a democracy",
      q:"From the diagram, explain any two forms of power sharing with examples from India or the world.",
      a:"Power Sharing is the distribution of power among different groups, levels and institutions to prevent concentration of power.\n\n1. Horizontal Distribution (Among equal organs of government):\nLegislature, Executive, and Judiciary each have separate and independent powers.\nExample: In India — Parliament makes laws, the Government (executive) implements them, Courts check if they follow the Constitution.\nThis ensures 'checks and balances' — no single organ becomes too powerful.\n\n2. Vertical Distribution (Federalism — among different levels):\nPower shared between Central Government and State/Provincial Governments.\nExample: In India — Union Government handles defence, foreign affairs; States handle police, education, agriculture; some subjects are on the Concurrent List (both can legislate).\nLocal governments (Panchayats, Municipal corporations) are the third tier.\n\nOther forms:\n3. Among Social Groups: Belgium created separate community governments for French, Dutch, German speakers to prevent ethnic conflict.\n\n4. Among Political Parties/Pressure Groups: Opposition parties, trade unions, and media keep the ruling party in check — a crucial democratic power balance."
    }]
  },
