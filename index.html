      short: [
        {q:"Describe the biological stages of human life cycle as per the textbook.",a:"BIOLOGICAL STAGES OF HUMAN LIFE CYCLE:\n\n1. PRENATAL (280 days/9 months): Development of foetus in mother's womb till delivery\n\n2. NEONATAL (Birth to 28 days): Rapid growth; smiling, recognising mother; very dependent on care\n\n3. INFANCY (28 days to 1 year): Speedy growth in size and height; milk teeth begin; trying to stand and take steps\n\n4. CHILDHOOD (1 to 10 years): Rapid to moderate growth depending on nutrition; permanent molar teeth eruption; developing motor skills\n\n5. ADOLESCENCE (10 to 19 years): RAPID PHYSICAL, MENTAL, EMOTIONAL AND SOCIAL CHANGES; onset of puberty; reproductive development; growth spurt; crucial and challenging period\n\n6. ADULTHOOD (20 years onwards): Maturation; reproductive period; peak physical and mental capacity; responsibilities increase\n\n7. OLD AGE (60 years and above): Slow weakening of body functions, organs and organ systems; reduced mobility and strength\n\nNOTE: Adolescence is highlighted as a CRUCIAL period — it bridges childhood and adulthood, involves the most dramatic changes and requires special guidance and support."},
        {q:"What are the physical, emotional and social changes during adolescence?",a:"CHANGES DURING ADOLESCENCE:\n\nPHYSICAL CHANGES:\n• GROWTH SPURT: Rapid increase in height and weight\n• SECONDARY SEXUAL CHARACTERISTICS:\n  Males: Voice deepens, facial hair, broader shoulders, muscle development\n  Females: Breast development, wider hips, menarche (first menstruation)\n• Both: Body hair growth (pubic and axillary)\n• Hormonal activation: testosterone (males), estrogen and progesterone (females)\n• Acne (pimples) due to increased sebaceous gland activity\n\nEMOTIONAL CHANGES:\n• Increased emotional intensity — mood swings\n• Development of romantic feelings\n• Greater self-consciousness and concern about body image\n• Desire for privacy and independence\n• May experience stress, anxiety about appearance and performance\n• Wide range of emotions: happiness, frustration, sadness, excitement\n\nSOCIAL CHANGES:\n• Peer group becomes very important\n• Desire for independence from parents\n• Formation of personal identity\n• Interest in relationships and friendships deepens\n• Greater awareness of social issues\n• May face peer pressure (positive and negative)\n\nIMPORTANCE OF GUIDANCE:\n• Adolescents need accurate information about changes\n• Physical education and health education help them understand and manage changes"}
      ],
      long: [
        {q:"Why is adolescence called a 'crucial period' in the human life cycle? What are the nutritional needs of adolescents?",a:"WHY ADOLESCENCE IS CRUCIAL:\n\n1. MOST RAPID CHANGES: More physical and psychological change occurs in adolescence than at any other period except infancy — height, weight, hormones, brain development all change dramatically\n\n2. IDENTITY FORMATION: This is when a person forms their sense of who they are — values, beliefs, personality, career aspirations\n\n3. REPRODUCTIVE DEVELOPMENT: Capacity for reproduction develops — a fundamental biological milestone\n\n4. LIFELONG HABITS FORMED: Eating habits, exercise habits, social behaviours formed during adolescence often persist for life\n\n5. VULNERABILITY: High susceptibility to peer pressure, substance abuse, risky behaviours; need for guidance is greatest\n\n6. FOUNDATION FOR ADULTHOOD: Physical health, mental health and social skills developed during adolescence form the foundation for adult life\n\n7. DECISION MAKING: Adolescents begin making increasingly important decisions about education, career, relationships\n\nNUTRITIONAL NEEDS OF ADOLESCENTS:\nAdolescents grow at a fast pace and are active — they need extra nourishment:\n\n1. ENERGY (CALORIES): High — active metabolism, rapid growth\n2. PROTEIN: For muscle and tissue development during growth spurt\n3. CALCIUM: Critical for bone density development (bones grow most during adolescence) — milk, dairy products\n4. IRON: Especially for girls (menstruation increases iron loss); for haemoglobin production in boys\n5. VITAMINS: A, C, D — for immunity, bone health, tissue repair\n6. ZINC: For growth and sexual development\n\nCHALLENGES:\n• Food preferences often influenced by friends and media rather than nutrition\n• Fast food, junk food popular but nutritionally poor\n• Guidance needed — nutritious food can be made appealing (spinach paratha, vegetable soups)"}
      ],
      passage: [
        {q:"'The period of adolescence begins with the onset of puberty, during which certain hormones get activated. It is an increase in secretion of sex hormones (testosterone in males, estrogen and progesterone in females). Puberty merges into adolescence. Adolescence is a crucial period in the life cycle of human beings.'\n\n(a) What triggers the onset of puberty?\n(b) What are the roles of testosterone and estrogen in the body?\n(c) What is the difference between puberty and adolescence?\n(d) How does understanding adolescence help young people?",a:"(a) Puberty is triggered by the activation of the endocrine (hormone) system, specifically the pituitary gland (master gland) which signals the gonads (testes in males, ovaries in females) to begin producing sex hormones. This is triggered by a complex combination of genetic factors, body weight/fat percentage, and environmental signals.\n\n(b) Roles of sex hormones:\nTESTOSTERONE (males):\n• Causes voice deepening (Adam's apple enlargement)\n• Promotes muscle development and increase in body size\n• Causes facial and body hair growth\n• Stimulates sperm production\n• Associated with increased aggression and energy\n\nESTROGEN AND PROGESTERONE (females):\n• Stimulate breast development\n• Cause redistribution of fat (hips, thighs)\n• Regulate menstrual cycle (menarche — first menstruation)\n• Prepare the body for potential pregnancy\n• Influence mood and emotional changes\n\n(c) Difference between puberty and adolescence:\n• PUBERTY is the BIOLOGICAL process — the physical changes triggered by hormones (voice change, breast development, body hair, reproductive maturity). It's relatively brief.\n• ADOLESCENCE is the BROADER PERIOD (10-19 years) that includes puberty PLUS the psychological, social and emotional development that accompanies and follows these physical changes.\n• Puberty is a subset of adolescence — adolescence is bigger and more comprehensive.\n\n(d) How understanding adolescence helps:\n• Reduces anxiety — knowing changes are NORMAL and expected makes them less frightening\n• Helps make healthy choices about diet, exercise, hygiene\n• Helps navigate emotional changes without distress\n• Enables better peer relationships — understanding others are going through similar changes\n• Helps avoid risky behaviours by understanding their dangers\n• Allows adolescents to seek appropriate help when needed"}
      ]

        {q:"Describe the basic rules and court dimensions of Badminton.",a:"BADMINTON — BASIC RULES AND COURT:\n\nCOURT DIMENSIONS:\n• Length: 44 feet (13.4 m)\n• Width — SINGLES: 17 feet (5.18 m)\n• Width — DOUBLES: 20 feet (6.1 m)\n• Net height at centre: 5 feet (1.524 m)\n\nSCORING:\n• Rally point system — a point is scored on every rally\n• Each game is played to 21 points\n• Must win by 2 clear points\n• If 20-20, play continues until one side leads by 2 points\n• At 29-29, whoever reaches 30 first wins\n• Match is best of 3 games\n\nSERVICE RULES:\n• Server and receiver must be in diagonal service courts\n• Service must be hit below the waist (below server's last rib)\n• Shuttle must travel upward after service\n• Only one serve allowed (no second service)\n\nFUNDAMENTAL TECHNIQUES:\n• Serves: High serve, low serve, flick serve, drive serve\n• Strokes: Clear, drop, smash, drive\n• Footwork is critical for court coverage\n\nFAULTS:\n• Shuttle lands outside court boundary\n• Service fault (wrong position, above waist)\n• Net fault (racket or body touches net)\n• Shuttle fails to pass over net"},
        {q:"What are the fundamental techniques and rules of Table Tennis?",a:"TABLE TENNIS — RULES AND TECHNIQUES:\n\nCOURT/TABLE:\n• Table: 274 cm × 152.5 cm, 76 cm high\n• Net height: 15.25 cm\n• Ball: White or orange, 40 mm diameter\n\nSCORING:\n• First to 11 points wins a game (with 2-point lead)\n• If 10-10: first to gain 2-point advantage wins\n• Match: Best of 5 or 7 games\n\nSERVICE RULES:\n• Ball rests freely on open palm of free hand\n• Throw ball nearly vertically upward without imparting spin\n• Strike ball as it falls below table level\n• Server must not hide ball from receiver\n\nFAULTS:\n• If player causes table to move while ball is in play, player loses point\n• If opponent's free hand touches playing surface — point to opponent\n• Ball must bounce on server's side first then cross net to receiver's side\n\nFUNDAMENTAL TECHNIQUES:\n• Forehand drive, backhand drive\n• Topspin, backspin, sidespin shots\n• Smash, push, loop, chop\n• Footwork: side-to-side movement, staying low\n• Grip: Shakehand grip or penhold grip"}

      long: [
        {q:"Write notes on the history, rules and importance of Kabaddi as a traditional Indian game.",a:"KABADDI — HISTORY, RULES AND IMPORTANCE:\n\nHISTORY:\n• Kabaddi is an ancient Indian game — played for thousands of years\n• Originated as a contact sport requiring breath control and strength\n• Became a competitive sport at national level\n• INCLUDED IN ASIAN GAMES: 1990 (Beijing)\n• ASIAN KABADDI FEDERATION (AKF) founded in 1978, affiliated to Olympic Council of Asia\n• INTERNATIONAL KABADDI FEDERATION (IKF) governs at world level\n• KABADDI WORLD CUP: First played 2004, then 2007, 2010 — INDIA UNBEATEN CHAMPIONS\n\nFIELD DIMENSIONS:\n• Men: 13m × 10m with 1m lobby\n• Women: 12m × 8m with 1m lobby\n• Baulk line divides the court\n\nBASIC RULES:\n• Two teams of 7 players each\n• A 'raider' enters the opponent's half chanting 'kabaddi kabaddi' continuously (in one breath)\n• Raider tries to tag defenders and return safely to own half\n• Defenders try to tackle the raider (hold until the raider takes a breath)\n• Point for raider: successfully tags and returns\n• Point for defenders: raider is tackled before returning\n\nWHY KABADDI IS IMPORTANT:\n1. Promotes physical fitness — speed, strength, agility\n2. Develops breath control and lung capacity\n3. Promotes teamwork and strategy\n4. Part of Indian cultural heritage\n5. Requires minimal equipment — can be played anywhere\n6. Now an international sport with growing global following\n7. Pro Kabaddi League (PKL) has given it massive popularity"}

      passage: [
        {q:"'Swimming is an individual and cyclic sport. It is highly competitive with the application of science. It is getting transformed from an art to science. Now, the importance is given to strategy and tactics for completing and pacing the race. Turns in swimming follow this sequence: (i) Approach to the wall (ii) Turn or touch (iii) Push off (iv) Glide (v) First stroke.'\n\n(a) Why is swimming described as both an 'art' and a 'science'?\n(b) What are 'turns' in swimming and why are they important?\n(c) Name any four swimming strokes.\n(d) What are the health benefits of swimming?",a:"(a) Swimming as 'art' and 'science':\n• ART: Historically, swimming was learned and perfected through feel, intuition and practice — a physical art requiring grace, rhythm and coordination\n• SCIENCE: Modern competitive swimming uses biomechanics (drag reduction, stroke mechanics), physiology (training zones, VO2 max), nutrition (fuelling for races), technology (swimsuits, pool design, timing systems)\n• The shift from art to science means swimmers now train with heart rate monitors, video analysis, computerised stroke timing — everything is measured and optimised\n\n(b) Turns in swimming:\n• Turns are executed when the swimmer reaches the pool wall at the end of a lane and must change direction to continue the race\n• They are critical because even fractions of a second gained in a turn can win or lose a race\n• The sequence: approach → touch/turn → push off → glide → first stroke\n• A good flip turn (tumble turn) in freestyle or backstroke can be faster than an open turn\n• Poor turns waste energy and time\n\n(c) Four swimming strokes:\n1. Freestyle (Front Crawl) — fastest competitive stroke\n2. Backstroke — only stroke swum on the back\n3. Breaststroke — oldest competitive stroke, frog-like leg kick\n4. Butterfly — most energy-intensive stroke, dolphin kick\n\n(d) Health benefits of swimming:\n• Full-body workout — engages all major muscle groups\n• Low impact — no strain on joints (good for injury rehabilitation)\n• Improves cardiovascular and respiratory fitness\n• Builds muscle strength and endurance\n• Improves flexibility\n• Excellent for stress relief and mental health\n• Good for people with asthma — humid pool air"}

      short: [
        {q:"What is stress? How does yoga help in managing stress?",a:"STRESS:\nStress can be understood as a state of physiological and psychological imbalance resulting from demanding or difficult situations which the person is not able to cope with.\n\nTYPES:\n• BENEFICIAL STRESS (Eustress): Motivates performance — getting admission in a new course, examination preparation. Contributes to growth.\n• HARMFUL STRESS (Distress): When severe and chronic — reduces efficiency, adversely affects ability to feel, think and act.\n\nEFFECTS OF CHRONIC STRESS:\n• Physical: Peptic ulcer, migraine, diabetes, hypertension, heart attack, brain stroke\n• Mental: Anxiety attacks, depression, irritability, poor memory\n• During COVID-19: Fear, panic, anxiety were common stress responses\n\nHOW YOGA HELPS:\n1. ASANAS: Physical postures calm the nervous system, reduce cortisol (stress hormone)\n2. PRANAYAMA: Deep breathing activates parasympathetic nervous system — relaxation response\n3. MEDITATION: Calms the mind, improves focus, reduces anxiety\n4. YOGA AS WAY OF LIFE: Regular practice of Ahara (right food), Vihara (relaxation), Achara (right conduct), Vichara (positive thinking) and Vyavahara (right behaviour) prevents stress accumulation\n5. MITAHARA: Proper eating habits support physical health that reduces stress\n6. COMMUNITY: Yoga classes provide social support\n\nPRACTICAL STEPS:\n• Deep breaths (count 5), count to 10, drink water, walk, funny activities — all help release anger and stress"},
        {q:"Explain the five components of Yoga as a Way of Life.",a:"FIVE COMPONENTS OF YOGIC WAY OF LIFE:\n\n1. AHARA (Food):\n• Principles related to food consumption\n• MITAHARA: Right quality (fresh, nutritious, natural), right quantity (2/4 food, 1/4 liquid, 1/4 empty) and positive state of mind while eating\n• Not eating while watching TV or in angry mood\n• Sportspeople need more food than desk workers\n\n2. VIHARA (Relaxation/Recreation):\n• Adequate rest and recreation\n• Proper sleep and relaxation between activities\n• Balance between work and rest\n• Recreational activities that refresh mind and body\n\n3. ACHARA (Conduct/Discipline):\n• Right conduct and disciplined behaviour\n• Following ethical principles in daily life\n• Discipline in routine — sleeping on time, waking on time, regular exercise\n\n4. VICHARA (Thinking/Thought):\n• Positive thinking and positive mental attitude\n• Controlling negative thoughts\n• Focusing on solutions, not problems\n• Cultivating optimism and gratitude\n\n5. VYAVAHARA (Behaviour/Actions):\n• How we behave and act with others\n• Treating others with respect and kindness\n• Acting in alignment with values\n• Consistent, ethical behaviour\n\nCONCLUSION: These five together create a holistic lifestyle that prevents stress, promotes health and leads to wellbeing for all, regardless of age or profession."}

      long: [
        {q:"Describe the importance of Suryanamaskar (Sun Salutation) and its benefits. What is the significance of pranayama?",a:"SURYANAMASKAR (SUN SALUTATION):\n\nDEFINITION:\nSuryanamaskar is a series of 12 yoga postures performed in a flowing sequence, traditionally done at sunrise facing the sun.\n\nTHE 12 POSITIONS:\n1. Pranamasana (Prayer pose)\n2. Hastauttanasana (Raised arms)\n3. Hastapadasana (Standing forward bend)\n4. Ashwa Sanchalanasana (Equestrian pose)\n5. Dandasana (Stick pose)\n6. Ashtanga Namaskara (Eight limbs)\n7. Bhujangasana (Cobra)\n8. Adho Mukha Svanasana (Downward dog)\n9. Ashwa Sanchalanasana (Equestrian — other leg)\n10. Hastapadasana (Forward bend)\n11. Hastauttanasana (Raised arms)\n12. Pranamasana (Prayer pose)\n\nBENEFITS:\n• Improves blood circulation throughout the body\n• Makes lungs strong — chest expansion and contraction in alternating postures\n• Strengthens muscles of chest, abdomen, arms, legs\n• Improves flexibility of entire spine\n• Stimulates digestive system\n• Helps manage weight\n• Reduces stress and anxiety\n• Improves concentration and focus\n• One round takes only 1-2 minutes — very time-efficient total body workout\n\nPRANAYAMA:\nPranayama means controlled regulation of breath (Prana = life force, Ayama = control).\n\nTYPES:\n• Nadi Shodhana (Alternate nostril breathing) — calms mind\n• Kapalabhati — energising, clears respiratory tract\n• Bhramari — reduces anxiety\n• Anulom-Vilom — balances nervous system\n\nBENEFITS:\n• Strengthens respiratory muscles\n• Increases lung capacity\n• Activates parasympathetic nervous system — relaxation\n• Reduces cortisol (stress hormone)\n• Improves mental clarity and concentration\n• Helps in management of hypertension and asthma"}

      passage: [
        {q:"'Stress can be understood as a state of physiological and psychological imbalance resulting from demanding or difficult situations which the person is not able to cope with. Chronic and severe stress reduces our body's ability to fight diseases. It can lead to various psychosomatic diseases such as peptic ulcer, migraine, diabetes mellitus, high blood pressure.'\n\n(a) What is a 'psychosomatic disease'? Give two examples from the passage.\n(b) How does chronic stress affect the immune system?\n(c) What is the difference between beneficial and harmful stress?\n(d) How can yoga help a student stressed about examinations?",a:"(a) A psychosomatic disease is a physical illness caused or worsened by mental/emotional factors like stress and anxiety (psyche = mind, soma = body). The mind-body connection means mental stress can create real physical symptoms.\n\nExamples from passage:\n1. Peptic ulcer — stomach ulcers worsened or triggered by stress\n2. Migraine — severe headaches triggered or worsened by stress\n(Others mentioned: Diabetes mellitus, High blood pressure/hypertension)\n\n(b) Effects of chronic stress on immune system:\n• Stress causes prolonged release of cortisol (stress hormone)\n• Chronically elevated cortisol suppresses the immune system's response\n• The body redirects resources from immune function to the 'fight or flight' response\n• This reduces production of infection-fighting white blood cells\n• Result: Increased susceptibility to infections and diseases\n• The body literally becomes less able to defend itself against pathogens\n\n(c) Beneficial vs harmful stress:\n• BENEFICIAL STRESS (Eustress): Motivates and improves performance — examination preparation, getting a new job, learning a new skill. Causes temporary stress but leads to growth and achievement. Short-term and manageable.\n• HARMFUL STRESS (Distress): Chronic, severe stress that the person cannot manage. Reduces efficiency, causes physical illness (psychosomatic diseases), mental disorders (anxiety, depression). Long-term and overwhelming.\n\n(d) How yoga helps examination-stressed students:\n1. PRANAYAMA: 5 deep breaths before studying reduces cortisol and activates relaxation response — immediate calm\n2. ASANAS: Regular yoga practice reduces chronic stress levels over time\n3. MEDITATION: Improves concentration and memory — helps in studying\n4. VICHARA (positive thinking): Yoga's emphasis on positive thinking helps reframe examination as opportunity, not threat\n5. AHARA: Proper eating habits improve brain function and energy levels\n6. VIHARA: Adequate rest incorporated in yogic lifestyle ensures recovery between study sessions\n7. PHYSICAL EXERCISE: Even 10-15 minutes of yoga before study sessions can significantly improve focus"}

      short: [
        {q:"What is a balanced diet? Why do adolescents have special nutritional needs?",a:"BALANCED DIET:\nA balanced diet contains all essential nutrients in the right proportions to maintain good health, provide energy and support all body functions.\n\nCOMPONENTS:\n1. CARBOHYDRATES: Energy — cereals, rice, bread, potatoes\n2. PROTEINS: Growth and repair — pulses, dairy, eggs, meat, fish, soya\n3. FATS: Energy store, fat-soluble vitamins — oils, ghee, nuts\n4. VITAMINS: Various metabolic functions — fruits and vegetables\n5. MINERALS: Structural and functional — dairy (calcium), green leafy (iron)\n6. WATER: All metabolic processes, 2-3 litres daily\n7. DIETARY FIBRE: Digestion — fruits, vegetables, whole grains\n\nADOLESCENTS' SPECIAL NUTRITIONAL NEEDS:\n\n1. HIGHER ENERGY: Rapid growth + high activity = more calories needed\n2. PROTEIN: Growth spurt demands extra protein for muscle and tissue building\n3. CALCIUM: Bones grow fastest during adolescence — 1200 mg/day recommended; insufficient calcium → lower bone density → risk of osteoporosis later\n4. IRON:\n   - Boys: Increased blood volume and muscle mass building\n   - Girls: Lost during menstruation — iron deficiency anaemia common in adolescent girls\n5. ZINC: For sexual development and growth\n6. VITAMINS B, C, D: For energy metabolism, immunity, bone health\n\nCHALLENGE: Adolescents often prefer junk food, fast food — influenced by peers and media rather than nutrition. Parents and educators must guide healthy choices."},
        {q:"What are the major vitamins, their sources and deficiency diseases?",a:"MAJOR VITAMINS:\n\nVITAMIN A:\n• Function: Vision (night vision), immune function, skin health\n• Sources: Carrots, leafy greens, dairy, eggs, liver, orange/yellow fruits\n• Deficiency disease: NIGHT BLINDNESS, xerophthalmia (dry eyes)\n\nVITAMIN B COMPLEX:\n• Function: Energy metabolism, nerve function, red blood cell production\n• Sources: Whole grains, legumes, meat, dairy, eggs\n• Deficiency: B1→Beriberi, B3→Pellagra, B12→Pernicious anaemia, B9(Folate)→Neural tube defects\n\nVITAMIN C:\n• Function: Antioxidant, collagen synthesis, wound healing, iron absorption\n• Sources: Citrus fruits, amla, guava, capsicum, tomatoes\n• Deficiency disease: SCURVY — bleeding gums, weakness, poor wound healing\n\nVITAMIN D:\n• Function: Calcium absorption, bone health, immune function\n• Sources: Sunlight (main source), fish, egg yolk, fortified milk\n• Deficiency disease: RICKETS (children — soft bones), Osteomalacia (adults)\n\nVITAMIN E:\n• Function: Antioxidant, protects cell membranes\n• Sources: Nuts, seeds, vegetable oils\n• Deficiency: Nerve damage (rare)\n\nVITAMIN K:\n• Function: Blood clotting, bone health\n• Sources: Green leafy vegetables, liver\n• Deficiency: Excessive bleeding, poor clotting"}
      ],
      long: [
        {q:"Describe the major minerals needed by the human body, their food sources and importance.",a:"MAJOR MINERALS FOR THE HUMAN BODY:\n\n1. CALCIUM:\n• Importance: Bone and teeth formation and strength; muscle contraction; blood clotting; nerve impulse transmission\n• Sources: Milk, dairy products, cheese, yoghurt, green leafy vegetables, sesame seeds, ragi\n• Deficiency: Rickets (children), Osteoporosis (adults), muscle cramps\n• Adolescents need: ~1200 mg/day (critical period for peak bone mass)\n\n2. IRON:\n• Importance: Component of haemoglobin (carries oxygen), energy production, immune function\n• Sources: Red meat, liver, spinach, legumes, jaggery, fortified cereals\n• Deficiency: ANAEMIA — fatigue, weakness, pallor, reduced immunity\n• Special need: Adolescent girls (menstruation), pregnant women\n\n3. PHOSPHORUS:\n• Importance: Bone and teeth (with calcium), energy metabolism (ATP), cell membrane structure\n• Sources: Dairy, meat, fish, nuts, legumes, whole grains\n• Usually adequate in normal diet\n\n4. IODINE:\n• Importance: Thyroid hormone production — regulates metabolism\n• Sources: Iodised salt, seafood, dairy\n• Deficiency: GOITRE (swelling of thyroid gland), hypothyroidism, cretinism in infants\n\n5. ZINC:\n• Importance: Growth, immunity, wound healing, enzyme functions, sexual development\n• Sources: Meat, shellfish, legumes, nuts, seeds\n• Deficiency: Growth retardation, delayed sexual maturity, poor immunity\n\n6. MAGNESIUM:\n• Importance: Enzyme reactions, muscle and nerve function, bone health\n• Sources: Green leafy vegetables, nuts, whole grains, legumes\n\n7. SODIUM AND POTASSIUM:\n• Importance: Fluid balance, nerve function, muscle contraction\n• Balance important — excess sodium → hypertension\n• Sources: Salt (sodium), fruits and vegetables (potassium)"}
      ],
      passage: [
        {q:"'Food preferences of adolescents are often influenced by friends and media rather than nutritional requirement. They need guidance in this regard. Nutritious food preparations can be planned in the form they enjoy, like spinach paratha or spinach, carrot and potato soup instead of spinach vegetable.'\n\n(a) Why are adolescents particularly vulnerable to unhealthy food choices?\n(b) What is the strategy suggested in the passage for healthy eating?\n(c) What nutrients might be missing from a fast food diet?\n(d) Plan a balanced meal for an adolescent for one day.",a:"(a) Why adolescents are vulnerable to unhealthy food choices:\n• PEER INFLUENCE: Adolescents strongly value peer acceptance — they eat what their friends eat\n• MEDIA INFLUENCE: Advertising for fast food, soft drinks targets young people effectively\n• DEVELOPING AUTONOMY: Adolescents want to make their own choices, often rejecting parental advice\n• CONVENIENCE: Fast food is quick and accessible — busy school schedules make this appealing\n• TASTE OVER NUTRITION: Junk food is engineered to taste good — high salt, sugar, fat combinations\n• LACK OF NUTRITIONAL KNOWLEDGE: Many adolescents don't understand what their body needs\n• EMOTIONAL EATING: Stress and social situations often involve fast food\n\n(b) Strategy suggested in passage:\n• Make nutritious food in FORMS ADOLESCENTS ENJOY — not forcing 'healthy' versions they dislike\n• Examples: Spinach paratha (instead of plain spinach), spinach-carrot-potato soup (appealing and nutritious)\n• The key is incorporating nutritious ingredients into familiar, enjoyable formats\n• Involve adolescents in meal planning and preparation — increases acceptance\n\n(c) Nutrients missing from typical fast food diet:\n• CALCIUM (no dairy or not enough)\n• IRON (little red meat or leafy greens)\n• FIBRE (refined flour, few vegetables)\n• VITAMINS A and C (few fruits and vegetables)\n• OMEGA-3 FATTY ACIDS (too much saturated fat instead)\n• B VITAMINS (refined foods lose B vitamins)\n• WATER — replaced by sugary drinks\n\n(d) Balanced meal plan for adolescent:\nBREAKFAST: Whole wheat toast + boiled egg + banana + glass of milk\nMID-MORNING SNACK: Handful of nuts + seasonal fruit\nLUNCH: Brown rice + dal + sabzi + raita + salad + buttermilk\nEVENING SNACK: Sprouts chaat or fruit yoghurt\nDINNER: Whole wheat roti + paneer/chicken + vegetable curry + salad\nBEFORE BED: Warm milk with turmeric\n\nThis provides: Energy from complex carbs, protein for growth, calcium for bones, iron, fibre and vitamins."}
      ]

      short: [
        {q:"What is first aid? Describe the RICE method for soft tissue injuries.",a:"FIRST AID:\nFirst aid is the immediate emergency care given to an injured or ill person before professional medical help arrives. Its purpose is to preserve life, prevent the condition from worsening and promote recovery.\n\nPRINCIPLES OF FIRST AID (3 Ps):\n1. PRESERVE life — keep the person alive\n2. PREVENT deterioration — stop the condition getting worse\n3. PROMOTE recovery — provide comfort and basic care\n\nRICE METHOD (for soft tissue injuries — sprains, strains):\n\nR — REST:\n• Stop all activity immediately\n• Rest the injured part — do not continue playing\n• Prevents further injury\n\nI — ICE:\n• Apply ice pack or cold compress to the injured area\n• Apply for 15-20 minutes every 2-3 hours\n• Reduces pain, swelling and inflammation\n• Never apply ice directly on skin — use a cloth between ice and skin\n\nC — COMPRESSION:\n• Wrap the injured area with an elastic bandage\n• Provides support and reduces swelling\n• Not too tight — should not cut off circulation\n\nE — ELEVATION:\n• Raise the injured part above heart level\n• Reduces blood flow to the area\n• Minimises swelling\n\nAPPLICATION: For ankle sprain — stop activity, apply ice pack, wrap with compression bandage, elevate leg on pillow. If pain is severe or bone damage suspected, seek medical attention."},
        {q:"What are the common sports injuries and how can they be prevented?",a:"COMMON SPORTS INJURIES:\n\n1. SPRAINS:\n• Stretching or tearing of LIGAMENTS (bone to bone connectors)\n• Common: Ankle sprain, knee sprain\n• Treatment: RICE method\n\n2. STRAINS (MUSCLE PULL):\n• Stretching or tearing of MUSCLES or TENDONS\n• Common: Hamstring strain, calf strain\n• Treatment: RICE method\n\n3. FRACTURES:\n• Bone is cracked or broken\n• Types: Simple (skin intact), compound (bone through skin)\n• Treatment: Immobilise, do not move patient, seek medical help immediately\n\n4. DISLOCATION:\n• Bone displaced from its joint\n• Common: Shoulder dislocation\n• Treatment: Do NOT try to relocate; immobilise and get medical help\n\n5. CONCUSSION:\n• Brain injury from blow to head\n• Symptoms: Confusion, dizziness, headache\n• Treatment: Rest, no further sport until cleared by doctor\n\n6. BLISTERS AND ABRASIONS:\n• Minor skin injuries\n• Treatment: Clean, dress wound, prevent infection\n\nPREVENTION:\n1. Proper warm-up and cool-down before/after exercise\n2. Use correct technique (coaching)\n3. Appropriate, well-fitting footwear and protective equipment\n4. Gradual increase in training intensity (no sudden overloading)\n5. Adequate rest between sessions\n6. Maintain proper nutrition and hydration\n7. Strengthen muscles through resistance training\n8. Learn and follow rules of the sport"}
      ],
      long: [
        {q:"Describe the safety measures to be followed at home, in school and during sports activities.",a:"SAFETY MEASURES IN DIFFERENT SETTINGS:\n\nAT HOME:\n1. Kitchen safety: Keep sharp objects safely stored, handle hot vessels carefully, turn off stove when not in use\n2. Electrical safety: Don't touch switches with wet hands, use ISI-marked appliances\n3. Fall prevention: Keep floors dry, use non-slip mats, secure rugs\n4. Fire safety: Keep fire extinguisher, know evacuation routes, keep matches away from children\n5. Chemical safety: Keep medicines, cleaning agents out of children's reach, read labels carefully\n6. First aid kit: Maintain a stocked first aid kit at home\n\nIN SCHOOL:\n1. Laboratory safety: Follow instructions, wear protective equipment (goggles, gloves), no horseplay\n2. Sports ground safety: Properly maintained equipment, no dangerous objects on field\n3. Staircase safety: Use handrails, no running on stairs\n4. Machine safety (workshop): Concentrate on work, wear appropriate clothes (no loose clothing), switch off machines when not in use, keep spare parts organised\n5. Fire drills: Know exit routes and assembly points\n6. Road safety when crossing school roads: Use zebra crossings, designated school zones\n\nDURING SPORTS:\n1. Proper warm-up: 10-15 minutes before activity\n2. Appropriate footwear and protective gear (helmet, pads, guards)\n3. Correct technique — learn proper form to reduce injury risk\n4. Hydration: Drink water before, during and after exercise\n5. Avoid exercising in extreme heat — risk of heat stroke\n6. Know first aid: RICE method, CPR basics\n7. Gradual progression: Increase training load slowly\n8. Cool-down and stretching after exercise\n9. Report injuries immediately — don't 'play through pain'\n10. Qualified supervision for contact sports\n11. Check equipment condition before use"}
      ],
      passage: [
        {q:"'Safety is not an accident — it is planned, practised and part of daily living. When someone is injured during a sports activity, the initial response can determine the outcome. Proper first aid can prevent a minor injury from becoming a major one. It can even save lives.'\n\n(a) What does 'safety is not an accident' mean?\n(b) Give two examples of how proper first aid can prevent a minor injury from becoming major.\n(c) What basic first aid skills should every student know?\n(d) Why is immediate response so important in sports injuries?",a:"(a) 'Safety is not an accident' means:\nSafety doesn't happen by chance or luck — it is DELIBERATELY created through planning, preparation and consistent practice of safety habits. Accidents happen when safety is NOT planned. This means: wearing helmets, following rules, learning first aid, maintaining equipment — all are intentional, planned actions. Safety culture must be built consciously, not left to chance.\n\n(b) Examples of first aid preventing minor from becoming major:\n1. SPRAIN: Immediate RICE treatment (rest, ice, compression, elevation) reduces swelling and inflammation within hours. Without this, the injury could develop into chronic joint instability requiring months of rehabilitation.\n2. BLEEDING WOUND: Applying pressure immediately controls bleeding. Without this, blood loss could lead to shock. Cleaning the wound prevents infection that could become serious.\n3. HEAT EXHAUSTION: Moving the person to shade and giving fluids prevents progression to heat stroke, which can be fatal.\n4. CONCUSSION: Recognising symptoms and stopping play prevents a second head injury that could cause permanent brain damage.\n\n(c) Basic first aid skills every student should know:\n1. RICE method for sprains and strains\n2. Basic wound care — cleaning, dressing, bandaging\n3. Recognising signs of fracture and how to immobilise\n4. Recovery position for unconscious person\n5. Basic CPR (chest compressions and rescue breaths)\n6. Choking — Heimlich manoeuvre\n7. How to handle nose bleeds\n8. Treatment for burns (cool water, not ice)\n9. Signs of concussion\n10. When and how to call for emergency help\n\n(d) Why immediate response is critical:\n• Pain and swelling increase rapidly after injury — prompt treatment limits these\n• Blood loss from wounds must be controlled immediately — delay leads to shock\n• Cardiac arrest: Brain damage begins within 4-6 minutes without oxygen — CPR must begin immediately\n• Spinal injuries: Incorrect movement of a spinal injury victim can cause permanent paralysis\n• Heat stroke: Every minute without cooling increases risk of organ damage\n• The first few minutes after injury are called the 'golden hour/window' — what happens then often determines the long-term outcome"}
      ]

      short: [
        {q:"What is meant by 'healthy community living'? What are its essential features?",a:"HEALTHY COMMUNITY LIVING:\nA healthy community is one where all members have access to clean environment, adequate resources, social support and opportunities for physical and mental wellbeing.\n\nESSENTIAL FEATURES:\n\n1. SAFE DRINKING WATER:\n• Free from disease-causing microorganisms and harmful chemicals\n• Access to water purification — boiling, chlorination, filtration\n• Proper storage in clean, covered containers\n\n2. SANITATION:\n• Safe disposal of human waste (toilets, sewage systems)\n• Clean public spaces\n• No open defecation — major public health goal in India (Swachh Bharat)\n\n3. WASTE MANAGEMENT:\n• Segregation of biodegradable and non-biodegradable waste\n• Proper collection and disposal\n• Promotion of 3Rs: Reduce, Reuse, Recycle\n\n4. VECTOR CONTROL:\n• Control of mosquitoes, flies, rats\n• No stagnant water (mosquito breeding sites)\n• Proper food storage\n\n5. CLEAN AIR:\n• Reduction of air pollution sources\n• Adequate ventilation in homes\n• No open burning of waste\n\n6. IMMUNISATION PROGRAMMES:\n• Community-wide vaccination for preventable diseases\n• Herd immunity protection\n\n7. HEALTHY SOCIAL RELATIONSHIPS:\n• Cooperation, mutual respect, social support\n• Community participation in health programmes\n\n8. SOCIAL DISTANCING (during epidemics):\n• Maintaining physical distance to prevent spread of respiratory infections"},
        {q:"What are communicable diseases? How do they spread and how can they be prevented?",a:"COMMUNICABLE DISEASES:\nDiseases that can be transmitted from one person to another (or from animal to person) through various means.\n\nHOW THEY SPREAD (Routes of Transmission):\n1. AIRBORNE/DROPLET: Coughing, sneezing — Tuberculosis, influenza, COVID-19, common cold\n2. DIRECT CONTACT: Touching infected person/surface — skin infections, sexually transmitted diseases\n3. CONTAMINATED FOOD AND WATER: Cholera, typhoid, hepatitis A, food poisoning\n4. VECTOR-BORNE: Through organisms:\n   • Mosquito: Malaria (Anopheles), Dengue (Aedes), Chikungunya (Aedes)\n   • Housefly: Typhoid, cholera (mechanical transmission)\n   • Rats: Plague, leptospirosis\n5. BLOOD AND BODILY FLUIDS: HIV, Hepatitis B and C\n\nPREVENTION:\n1. IMMUNISATION: Vaccines for polio, measles, tuberculosis, hepatitis B\n2. PERSONAL HYGIENE: Regular handwashing (before eating, after toilet)\n3. SAFE WATER: Boiling, filtration, chlorination\n4. FOOD SAFETY: Proper cooking, storage, hygiene in preparation\n5. VECTOR CONTROL: Eliminate mosquito breeding sites, use nets\n6. SOCIAL DISTANCING: During outbreak of respiratory diseases\n7. ISOLATION: Infected people should avoid contact with others\n8. SANITATION: Proper sewage disposal, clean toilets\n9. EDUCATION: Community awareness about disease spread"}

      long: [
        {q:"How can individuals and communities work together to ensure healthy community living? Give examples.",a:"COLLECTIVE ACTION FOR HEALTHY COMMUNITY:\n\nINDIVIDUAL RESPONSIBILITIES:\n1. Personal hygiene — regular bathing, handwashing, dental care\n2. Proper waste disposal — not littering, segregating waste\n3. Using toilets — not defecating in open\n4. Getting vaccinated\n5. Not polluting water sources\n6. Following social distancing during disease outbreaks\n7. Reporting disease symptoms promptly\n8. Conserving water\n\nCOMMUNITY-LEVEL ACTIONS:\n1. WATER MANAGEMENT: Building and maintaining water treatment plants, ensuring clean piped water supply, community tube wells\n2. SANITATION INFRASTRUCTURE: Sewage treatment, public toilets, waste collection systems\n3. VECTOR CONTROL PROGRAMMES: Fogging campaigns, draining stagnant water, rat control\n4. IMMUNISATION DRIVES: Polio eradication, measles elimination, COVID-19 vaccination\n5. HEALTH EDUCATION: Community awareness campaigns, school health programmes\n6. PARKS AND RECREATION: Green spaces for physical activity\n7. AIR QUALITY: Regulations on industrial pollution, encouraging clean cooking fuels\n\nGOVERNMENT ROLE:\n1. Swachh Bharat Abhiyan — open defecation free India\n2. National Rural Drinking Water Programme\n3. Pulse Polio immunisation\n4. National Vector Borne Disease Control Programme\n\nSCHOOL'S ROLE:\n• Teaching hygiene habits that children take home\n• School health check-ups\n• Clean, safe school environment as model\n\nCONCLUSION: Individual health and community health are inseparable — a community is only as healthy as its practices, and individuals are protected by community health measures. Cooperation is essential."}

      passage: [
        {q:"'In today's world, maintaining of social distance is very important especially during coronavirus. A healthy way of living in the community is ensured not only by the optimal use of resources but also by keeping our environment clean and hygienic. Our way of life, and the utilisation of resources, decide the quality of our personal and community life.'\n\n(a) What is 'social distancing' and why was it important during COVID-19?\n(b) How does individual behaviour affect the whole community's health?\n(c) What resources need to be 'optimally used' for community health?\n(d) What can students do to improve community health?",a:"(a) Social distancing is the practice of maintaining physical distance (at least 1-2 metres) between individuals in public spaces to prevent the spread of infectious diseases, particularly those transmitted through respiratory droplets.\n\nImportance during COVID-19:\n• COVID-19 spreads primarily through respiratory droplets when an infected person coughs, sneezes or speaks\n• Maintaining distance reduces the likelihood of droplets reaching another person\n• Combined with masks and hand hygiene, social distancing significantly slowed transmission\n• It was particularly important before vaccines were available — the only way to break the transmission chain\n• Even with vaccines, it remained important during high transmission periods\n\n(b) Individual behaviour affects community health because:\n• ONE person not washing hands can infect many others in a community\n• ONE person defecating in the open contaminates water sources used by hundreds\n• ONE littering habit multiplied by thousands = major sanitation crisis\n• Vaccination: If 95% of people are vaccinated → herd immunity protects even the 5% who cannot be vaccinated (infants, immunocompromised)\n• Positive: One person practising good hygiene and educating family creates a ripple effect\n• Communities are interconnected — diseases don't respect individual boundaries\n\n(c) Resources that need optimal use:\n• Water: Used efficiently without wastage; kept clean; not polluted\n• Land: Proper use without creating slums; green spaces maintained\n• Public infrastructure: Roads, sewage, waste systems used appropriately\n• Community facilities: Hospitals, schools, parks maintained and used well\n• Air: Not polluted through burning waste or excessive emissions\n• Food: Not wasted; distributed fairly\n\n(d) What students can do:\n1. Practice and model good hygiene at home and school\n2. Participate in Swachh Bharat activities — school/area clean-up drives\n3. Plant trees — improve air quality and green cover\n4. Educate younger siblings and community members about health\n5. Report unsafe conditions (stagnant water, open sewage) to authorities\n6. Not litter; encourage others not to litter\n7. Save water — close taps, report leaks\n8. Participate in immunisation awareness\n9. Promote physical activity in the community"}

      short: [
        {q:"What is social health? How do schools promote social health?",a:"SOCIAL HEALTH:\nSocial health refers to the ability to interact with others, maintain healthy relationships, perform social roles and function effectively in social settings. It includes:\n• Quality of interpersonal relationships\n• Ability to adapt to social situations\n• Communication skills\n• Community participation\n• Ability to give and receive support\n\nROLE OF SCHOOLS IN PROMOTING SOCIAL HEALTH:\n\n1. SOCIAL SKILLS DEVELOPMENT:\n• Children learn to interact with peers from different backgrounds\n• Develop communication, cooperation and conflict resolution skills\n\n2. PHYSICAL ACTIVITY AND SPORTS:\n• Team games teach teamwork, fair play, following rules, leadership\n• Yoga develops discipline and inner harmony\n• Sports teach accepting both victory and defeat gracefully\n\n3. HEALTH EDUCATION:\n• Knowledge about nutrition, hygiene, substance abuse prevention\n• Promotes informed decision-making\n\n4. LIFE SKILLS EDUCATION:\n• Decision-making, critical thinking, coping with stress\n• Peer relationships, handling peer pressure\n\n5. INCLUSIVE ENVIRONMENT:\n• Schools model equality and respect for diversity\n• Anti-bullying programmes\n• Support for students with difficulties\n\n6. TEAM SPIRIT:\n• Learning to work toward shared goals\n• Building trust and cooperation skills\n\n7. ROLE MODELS:\n• Teachers model good social behaviour, empathy and values"},
        {q:"What is peer pressure? How can adolescents handle negative peer pressure?",a:"PEER PRESSURE:\nPeer pressure is the influence exerted by peers (people of similar age/group) that causes a person to change their behaviour, values or attitudes to conform to the group.\n\nTYPES:\n• POSITIVE: Friends encouraging exercise, studying, healthy habits, participation in activities\n• NEGATIVE: Pressure to try drugs, alcohol, cigarettes, skip school, engage in risky behaviour\n\nWHY ADOLESCENTS ARE VULNERABLE:\n• Strong need for peer acceptance and belonging during adolescence\n• Identity still forming — influenced by others\n• Fear of being excluded from the group\n• Belief that 'everyone is doing it'\n\nHOW TO HANDLE NEGATIVE PEER PRESSURE:\n1. KNOW YOUR VALUES: Clear values make it easier to refuse — 'I don't do that'\n2. ASSERTIVE COMMUNICATION: Learn to say 'No' clearly and confidently without aggression\n3. CHOOSE FRIENDS WISELY: Spend time with people who share positive values\n4. HAVE REASONS READY: 'I'm in training, I can't drink'\n5. WALK AWAY: If pressure persists, remove yourself from the situation\n6. TRUSTED ADULT: Talk to parents, teacher or counsellor for support\n7. PEER REFUSAL SKILLS: Role-play saying no in safe environments\n8. UNDERSTAND CONSEQUENCES: Think through long-term effects of giving in"}
      ],
      long: [
        {q:"Explain the importance of life skills for adolescents. Name and describe any five important life skills.",a:"IMPORTANCE OF LIFE SKILLS:\nLife skills are abilities that help people adapt and deal effectively with the demands and challenges of life. WHO defines them as 'abilities for adaptive and positive behaviour that enable individuals to deal effectively with the demands and challenges of everyday life.'\n\nFor adolescents, life skills are especially important because:\n• They are transitioning to greater independence\n• Facing new social and academic challenges\n• Making decisions that affect their future\n• Navigating peer pressure and risky situations\n\nFIVE IMPORTANT LIFE SKILLS:\n\n1. DECISION-MAKING AND PROBLEM-SOLVING:\n• Ability to make informed, thoughtful choices\n• Evaluating options and consequences\n• Example: Choosing healthy food over junk food; refusing drugs\n• How to develop: Practice making small decisions consciously, discuss consequences\n\n2. CRITICAL THINKING:\n• Ability to analyse information objectively\n• Not accepting everything at face value — questioning advertisements, social media\n• Example: Critically evaluating health claims in advertisements\n\n3. EFFECTIVE COMMUNICATION:\n• Verbal (speaking clearly), non-verbal (body language), written communication\n• Active listening — truly hearing what others say\n• Assertive communication — expressing yourself without aggression\n• Example: Talking to parents about concerns; presenting ideas in class\n\n4. EMPATHY AND INTERPERSONAL SKILLS:\n• Understanding others' feelings and perspectives\n• Building and maintaining healthy relationships\n• Cooperation and teamwork\n• Example: Supporting a friend going through difficulty\n\n5. COPING WITH STRESS AND EMOTIONS:\n• Recognising and managing emotions (anger, anxiety, sadness)\n• Healthy coping strategies — exercise, talking, creative expression\n• Avoiding unhealthy coping — substance use, aggression\n• Example: Using yoga and deep breathing to manage exam stress\n\nCONCLUSION: These skills together enable adolescents to make healthy choices, resist peer pressure, build good relationships and become responsible citizens."}
      ],
      passage: [
        {q:"'Schools have a very significant role to play in the promotion of health and safety of children. Children learn team spirit and training in rules and regulations of social wellbeing just as in the defence services, which are inbuilt in training of defence service personnel, so they work together as a team to protect our nation.'\n\n(a) What is the comparison made between schools and defence services?\n(b) What does 'team spirit' mean and why is it important?\n(c) How does Physical Education specifically contribute to social health?\n(d) What other social health outcomes does school education promote?",a:"(a) The comparison between schools and defence services:\nJust as defence personnel are trained to follow rules, work as a team and subordinate individual interests to the group's mission — schools train children in exactly these same social values. Defence training instills discipline, cooperation, respect for rules, and teamwork so soldiers protect the nation effectively. Schools, through Physical Education, sports, games and yoga, instill the same values so students can function as responsible, cooperative members of society. The parallel suggests that social wellbeing training in schools is as systematic and important as military training — both require rules, discipline, cooperation and shared purpose.\n\n(b) Team spirit:\nTeam spirit means the feeling of unity, cooperation and shared purpose among members of a group — where individual interests are subordinated to the success of the whole team.\n\nWhy it's important:\n• Essential for any collective achievement in life — family, workplace, community, nation\n• Teaches that success is often collaborative, not purely individual\n• Builds empathy — learning to consider how your actions affect teammates\n• Develops trust — relying on others and being reliable yourself\n• Teaches how to handle both victory and defeat as a group\n• Fundamental civic value — a healthy society requires people to work together\n\n(c) How Physical Education contributes to social health:\n• TEAM GAMES: Teach cooperation, strategy, communication, conflict resolution\n• RULES: Learning to follow rules even when inconvenient — fundamental social skill\n• FAIR PLAY AND SPORTSMANSHIP: Respecting opponents, accepting decisions gracefully\n• LEADERSHIP OPPORTUNITIES: Captaining a team develops communication and responsibility\n• INCLUSION: Playing with people from different backgrounds — breaking social barriers\n• HEALTHY COMPETITION: Learning to compete without aggression\n• SHARED EXPERIENCES: Sports create bonds and friendships\n\n(d) Other social health outcomes promoted by school education:\n• Literacy and knowledge that enable informed social participation\n• Development of critical thinking to resist manipulation\n• Exposure to diversity — different people, cultures, perspectives\n• Democratic values — voting for student council, group decision-making\n• Conflict resolution — classroom discussions, group projects\n• Career awareness — understanding social roles and contributions\n• Civic responsibility — community service projects"}

        {q:"Name and describe the major sports awards in India.",a:"MAJOR SPORTS AWARDS IN INDIA:\n\n1. MAJOR DHYAN CHAND KHEL RATNA AWARD (formerly Rajiv Gandhi Khel Ratna):\n• HIGHEST sports award in India\n• Given for spectacular and most outstanding performance in sport over the preceding four years\n• Named after legendary hockey player Major Dhyan Chand\n• Cash prize: ₹25 lakhs\n\n2. ARJUNA AWARD:\n• Given for outstanding achievement in sports over 4 years\n• Consistent performance in national/international events\n• Named after the legendary Mahabharata warrior Arjuna\n• Cash prize: ₹15 lakhs + bronze statue of Arjuna\n\n3. DRONACHARYA AWARD:\n• Given to coaches for producing medal winners at Olympic Games, Asian Games, Commonwealth Games\n• Named after Dronacharya, the great teacher of the Pandavas in the Mahabharata\n• Cash prize: ₹15 lakhs + bronze statue of Dronacharya\n\n4. DHYAN CHAND AWARD:\n• For lifetime contribution to sports and games (given after retirement)\n• Named after Major Dhyan Chand — greatest hockey player India has produced\n\n5. MAULANA ABUL KALAM AZAD (MAKA) TROPHY:\n• Given to the best overall performing university in inter-university tournaments\n• Encourages sports at university level\n\n6. RASHTRIYA KHEL PROTSAHAN PURASKAR:\n• For companies, sports control boards that have contributed to sports promotion"},
        {q:"What is the role of Sports Authority of India (SAI) and NSNIS?",a:"SPORTS AUTHORITY OF INDIA (SAI):\n\nESTABLISHMENT: 1984, under Ministry of Youth Affairs and Sports\n\nROLE AND FUNCTIONS:\n1. INFRASTRUCTURE DEVELOPMENT: Building and maintaining national stadiums, swimming pools, sports complexes\n2. TRAINING CENTRES: Running national coaching centres and residential sports hostels\n3. TALENT IDENTIFICATION: Identifying talented athletes at school and grassroots level\n4. ELITE ATHLETE SUPPORT: Providing coaching, diet, medical support to top national athletes\n5. SCHEMES: Target Olympic Podium Scheme (TOPS) — supports athletes with Olympic medal potential\n6. COACHING EDUCATION: Training coaches for various sports\n7. SPORTS SCIENCE: Research and sports science support\n\nNSNIS (NETAJI SUBHAS NATIONAL INSTITUTE OF SPORTS):\n• LOCATION: Patiala, Punjab\n• ESTABLISHED: 1961\n• PURPOSE: Premier coaching institute — produces qualified coaches\n• PROGRAMMES:\n  - Diploma in Sports Coaching\n  - Certificate courses for various sports\n  - Research in physical education and sports science\n• Coaches from NSNIS serve national teams and state associations\n• Has residential facilities for trainees\n• Named after Netaji Subhas Chandra Bose — revolutionary leader\n\nBOTH SAI AND NSNIS work together to build India's sports infrastructure, identify talent, train coaches and support elite athletes toward international excellence."}

      long: [
        {q:"Describe the role of international organisations in promoting sports and health globally.",a:"INTERNATIONAL ORGANISATIONS IN SPORTS AND HEALTH:\n\n1. INTERNATIONAL OLYMPIC COMMITTEE (IOC):\n• Headquarters: Lausanne, Switzerland\n• Purpose: Organising Olympic Games (Summer and Winter), promoting Olympism\n• Role: Setting rules and values of sport, anti-doping, supporting sports globally\n• Website: www.ioc.org\n• Organises games every 4 years for Summer Olympics, every 4 years for Winter (offset by 2)\n\n2. WORLD HEALTH ORGANISATION (WHO):\n• Part of United Nations system\n• Purpose: 'The attainment by all peoples of the highest possible level of health'\n• Role:\n  - Disease surveillance (COVID-19, Ebola, influenza)\n  - Health standards and guidelines\n  - Supporting vaccination programmes\n  - Research on health issues\n  - Coordinating global health emergency responses\n\n3. SPORT-SPECIFIC INTERNATIONAL FEDERATIONS:\n• FIFA (Football): Governs world football, organises FIFA World Cup\n• World Athletics (IAAF): Athletics events, world championships\n• FIBA: Basketball\n• FIVB: Volleyball\n• IHF: Handball\n• BWF: Badminton\n• ITTF: Table Tennis\n• IKF: International Kabaddi Federation\nAll set rules and regulations, qualify athletes, organise world championships\n\n4. ASIAN KABADDI FEDERATION (AKF):\n• Founded 1978, affiliated to Olympic Council of Asia\n• Promotes kabaddi across Asia\n• Organises Asian Kabaddi Championships\n\n5. WORLD ANTI-DOPING AGENCY (WADA):\n• Promotes, coordinates and monitors the fight against doping in sport\n• Maintains the list of prohibited substances\n• Works with IOC and national anti-doping organisations\n\nCONCLUSION: These organisations create the framework that ensures sports are played fairly, health standards are maintained globally and both sports and health opportunities are available worldwide."}

      passage: [
        {q:"'S. No. Name of Player Year: 1. Sachin Tendulkar 1994, 2. Sourav Ganguly 1997, 3. Rahul Dravid 1998, 4. Mithali Raj 2003... [Cricket Arjuna Award recipients]'\n\n(a) What is the Arjuna Award given for? When was it established?\n(b) What does the inclusion of Mithali Raj in this list signify?\n(c) Why is it important to recognise sports achievements with national awards?\n(d) Name any other sports award in India and state who it honours.",a:"(a) The Arjuna Award:\n• Given for outstanding achievement in sports and consistent good performance over the previous four years at international level\n• Established in 1961 by the Government of India\n• Named after Arjuna, the legendary archer and hero of the Mahabharata\n• Recipients receive a bronze statue of Arjuna, a cash prize, and a scroll of honour\n• Given across a wide range of sports — cricket, athletics, wrestling, swimming, tennis, football and many others\n\n(b) Significance of Mithali Raj's inclusion:\n• Mithali Raj is one of India's greatest female cricketers — captain of India women's cricket team for many years\n• Her inclusion represents recognition of WOMEN'S SPORTS achievements at the highest national level\n• It signals that women's achievements in sport are as worthy of recognition as men's\n• Shows that sports awards in India include both male and female athletes\n• Mithali Raj became an inspiration for millions of young girls to take up cricket and sport\n• Her recognition helped promote gender equality in Indian sports\n\n(c) Why recognition with national awards is important:\n1. MOTIVATION: Recognising excellence motivates athletes to continue striving\n2. INSPIRATION: Award winners inspire millions of young people to take up sport\n3. NATIONAL PRIDE: Creates role models and sources of national pride\n4. VALIDATION: Tells athletes that their sacrifice and dedication is valued by the nation\n5. INVESTMENT: Athletes who know they can be recognised are more likely to commit to sport\n6. CULTURAL VALUE: Shows the nation values health, fitness and sporting excellence\n7. VISIBILITY: Awards create media attention that promotes sports across India\n\n(d) Another sports award:\nDRONACHARYA AWARD: Honours outstanding coaches who have trained athletes to win medals at Olympic Games, Asian Games or Commonwealth Games. Named after Dronacharya, the legendary teacher of the Pandava archers in the Mahabharata. This award recognises that great sportspersons are made by great coaches — acknowledging the essential role of coaching in sporting excellence."}

      short: [
        {q:"What is a resource? How are resources classified on the basis of origin and exhaustibility?",a:"RESOURCE: Everything available in our environment which can be used to satisfy our needs, provided it is technologically accessible, economically feasible and culturally acceptable.\n\nON THE BASIS OF ORIGIN:\n• Biotic resources: Obtained from the biosphere and have life. Examples: forests, fish, livestock, human beings\n• Abiotic resources: Composed of non-living things. Examples: rocks, metals, minerals, water, air\n\nON THE BASIS OF EXHAUSTIBILITY:\n• Renewable resources: Can be renewed or reproduced by physical, chemical or mechanical processes. Examples: solar energy, wind energy, water, forests (if properly managed)\n• Non-renewable resources: Take millions of years to form and cannot be renewed quickly. Examples: coal, petroleum, minerals"},
        {q:"What is sustainable development? What happened at the Rio Earth Summit 1992?",a:"SUSTAINABLE DEVELOPMENT: Development that meets the needs of the present without compromising the ability of future generations to meet their own needs. It means 'development should take place without damaging the environment, and development in the present should not compromise with the needs of future generations.'\n\nRIO EARTH SUMMIT 1992:\n• Held in Rio de Janeiro, Brazil in June 1992\n• More than 100 heads of states attended\n• Addressed urgent problems of environmental protection and socio-economic development\n• Leaders signed the Declaration on Global Climatic Change and Biological Diversity\n• Agreed upon the concept of Sustainable Development\n• Adopted 'Agenda 21' — a global agenda for sustainable development in the 21st century"},
        {q:"Describe four types of soil found in India and their characteristics.",a:"1. ALLUVIAL SOIL:\n• Found in: Northern plains, river valleys\n• Characteristics: Very fertile, deposited by rivers (Indus, Ganga, Brahmaputra)\n• Crops: Rice, wheat, sugarcane, cotton, jute\n\n2. BLACK SOIL (Regur):\n• Found in: Deccan Plateau (Maharashtra, MP, Gujarat)\n• Characteristics: Fine texture, high moisture retention, rich in calcium, magnesium\n• Crops: Cotton (best), wheat, jowar, linseed\n\n3. RED AND YELLOW SOIL:\n• Found in: Odisha, Chhattisgarh, eastern MP, parts of AP\n• Characteristics: Red due to iron content, develops on crystalline rocks\n• Crops: Rice, wheat, pulses (less fertile)\n\n4. LATERITE SOIL:\n• Found in: Kerala, Karnataka, Tamil Nadu, Meghalaya, Odisha\n• Characteristics: Develops in high temperature + heavy rainfall areas, not very fertile, acidic\n• Crops: Tea, coffee, cashew, rubber (after adding manures)"},
        {q:"What is land degradation? What are its causes and how can it be conserved?",a:"LAND DEGRADATION: The reduction in the quality and productivity of land due to various activities.\n\nCAUSES:\n1. Deforestation — loss of tree cover leads to soil erosion\n2. Overgrazing — exposes soil to wind/water erosion\n3. Mining — creates pits, dumps waste, damages land\n4. Over-irrigation — leads to waterlogging and salinisation\n5. Industrialisation — effluents deposited on land\n6. Shifting cultivation (slash and burn)\n\nCONSERVATION MEASURES:\n1. Afforestation and shelter belts\n2. Control of overgrazing\n3. Proper management of mining activities\n4. Contour bunding and terracing on slopes\n5. Strip cropping and crop rotation\n6. Proper drainage to prevent waterlogging\n7. Treating effluents before disposal"}

      long: [
        {q:"Explain the importance of resource planning in India. What are the problems of indiscriminate resource use?",a:"RESOURCE PLANNING IN INDIA:\nIndia is rich in resources but their distribution is unequal. Resource planning is essential because:\n1. Some states are rich in certain resources but deficient in others\n2. Resources need to be used in a balanced, sustainable manner\n3. Planning ensures equitable distribution\n\nTHREE STAGES OF RESOURCE PLANNING:\n1. Identification and inventory of resources through surveys\n2. Evolving a planning structure with appropriate technology, skill and institutional framework\n3. Matching resource development plans with national development plans\n\nPROBLEMS OF INDISCRIMINATE RESOURCE USE:\n1. DEPLETION: Resources being consumed faster than they can be replenished\n2. INEQUALITY: Accumulation in few hands — divided society into 'haves' and 'have nots'\n3. ECOLOGICAL CRISIS: Global warming, ozone depletion, environmental pollution, land degradation\n4. LOSS FOR FUTURE GENERATIONS: Non-renewable resources once used cannot be recovered\n\nIMPORTANCE:\n• Ensures resources are available for current AND future generations\n• Prevents environmental damage\n• Promotes equitable access\n• Vital for national security and development\n• India needs to balance economic growth with conservation"}

      passage: [
        {q:"Read the following:\n\n'Sustainable economic development means development should take place without damaging the environment, and development in the present should not compromise with the needs of the future generations.' (Brundtland Commission, 1987)\n\n(a) What is the core principle of sustainable development?\n(b) Why is resource planning essential for sustainable development?\n(c) Give two examples of unsustainable resource use in India.\n(d) What was Agenda 21?",a:"(a) Core principle: Current development must meet present needs WITHOUT compromising the ability of future generations to meet their own needs. It means balancing economic growth with environmental protection.\n\n(b) Resource planning is essential because:\n• Resources are unevenly distributed\n• Without planning, resources are overexploited\n• It ensures resources are available for future generations\n• It prevents ecological imbalance\n\n(c) Examples of unsustainable resource use:\n1. Over-extraction of groundwater for irrigation — falling water table across India\n2. Deforestation for agriculture and industry — loss of forest cover and biodiversity\n\n(d) Agenda 21 was adopted at the Rio Earth Summit (1992). It is a global action plan for sustainable development in the 21st century. It addresses global problems like poverty, health, housing, pollution, managing fragile ecosystems. Each local government is supposed to create its own Local Agenda 21."}

      short: [
        {q:"Why is conservation of forests and wildlife important?",a:"Conservation of forests and wildlife is important because:\n\n1. ECOLOGICAL BALANCE: Forests and wildlife maintain the ecological diversity and our life support systems — water, air and soil.\n\n2. GENETIC DIVERSITY: Preserves genetic diversity of plants and animals for better growth of species and breeding. Agriculture depends on traditional crop varieties; fisheries depend on aquatic biodiversity.\n\n3. OXYGEN AND CARBON: Forests absorb CO₂ and release O₂; regulate climate change.\n\n4. WATER CYCLE: Trees help maintain the water cycle, prevent floods, maintain groundwater.\n\n5. LIVELIHOODS: Millions of people (especially tribal communities) depend on forests for food, medicine, shelter and livelihood.\n\n6. HERITAGE AND CULTURE: Many species have cultural, religious and aesthetic value.\n\n7. MEDICINES: Many important medicines come from forest plants."},
        {q:"What are the different categories of forests in India based on protection?",a:"1. RESERVED FORESTS:\n• Most valuable and most protected category\n• More than half of total forest land is reserved\n• No grazing, felling or any other activities allowed without government permission\n\n2. PROTECTED FORESTS:\n• Forest land protected from further depletion\n• About one-third of total forest area\n• Government allows some activities with restrictions\n\n3. UNCLASSED FORESTS:\n• Other forests and wastelands\n• Owned by government, private individuals or communities\n• Least protected category\n\nNational Parks, Sanctuaries and Biosphere Reserves are established within reserved and protected forests for conservation of biodiversity."},
        {q:"What is the role of local communities in forest conservation? Give two examples.",a:"Local communities play a crucial role in forest conservation through traditional knowledge and collective action.\n\nEXAMPLES:\n1. SACRED GROVES: In many parts of India (Meghalaya, Rajasthan, Chhattisgarh, Uttarakhand), local communities protect patches of forest for religious reasons. No one is allowed to cut trees or harm wildlife here. These sacred groves are patches of forest dedicated to gods or spirits.\n\n2. BISHNOI COMMUNITY: The Bishnois of Rajasthan have been protecting forests and wildlife for centuries. Amrita Devi Bishnoi sacrificed her life in 1731 to protect Khejri trees. The community still actively conserves the blackbuck and other wildlife.\n\n3. CHIPKO MOVEMENT: Local people (especially women) in Uttarakhand hugged trees to prevent felling in the 1970s.\n\n4. JOINT FOREST MANAGEMENT (JFM): Involves local communities and government jointly protecting and benefiting from forests."}
      ],
      long: [
        {q:"Discuss the factors that have led to depletion of forests and wildlife in India. What conservation measures have been taken?",a:"FACTORS LEADING TO DEPLETION:\n\n1. EXPANSION OF AGRICULTURE: Forest land converted to farmland, especially during colonial period\n2. LARGE-SCALE DEVELOPMENT PROJECTS: Dams, industries, mining, roads destroy forest habitats\n3. COLONIAL EXPLOITATION: British cleared vast forests for timber, agriculture and railways\n4. POPULATION GROWTH: Increased demand for agricultural land, fuel wood, fodder\n5. OVERGRAZING: Destroys vegetation and prevents regeneration\n6. UNEQUAL ACCESS: Commercial interests of industry often override conservation needs\n7. FOREST FIRES: Both natural and man-made\n8. POACHING: Illegal hunting of endangered animals\n\nCONSERVATION MEASURES:\n1. Wildlife Protection Act 1972 — legal protection for endangered species\n2. Project Tiger (1973) — to protect tiger population\n3. National Parks and Wildlife Sanctuaries (over 600 in India)\n4. Biosphere Reserves — protect whole ecosystems\n5. Joint Forest Management Programme — community participation\n6. Affirmative action for tribal rights and community forests\n7. Sacred groves and traditional conservation practices\n8. Van Panchayats in Uttarakhand\n9. Beej Bachao Andolan in Tehri — saving seed diversity"}
      ],
      passage: [
        {q:"'Sacred groves are found in Meghalaya, Rajasthan, Himachal Pradesh and Karnataka. In Sariska Wildlife Sanctuary, villagers have fought to protect habitat from mining. In Alwar district of Rajasthan, 5 villages declared 1200 hectares of forest as Bhairodev Dakav Sonchuri.'\n\n(a) What are sacred groves?\n(b) What does the Bhairodev Dakav Sonchuri example show?\n(c) Why is community involvement in conservation important?\n(d) Name two wildlife conservation projects in India.",a:"(a) Sacred groves are patches of forest or trees dedicated to gods or spirits by local communities. These are protected for religious reasons. No one is allowed to cut trees or harm wildlife in sacred groves. They represent traditional nature conservation.\n\n(b) The Bhairodev Dakav Sonchuri example shows that local communities can take the initiative to protect forests even without government orders. The villagers themselves declared the forest a protected sanctuary with their own rules — no hunting, no commercial felling — showing the power of community-led conservation.\n\n(c) Community involvement is important because:\n• Local people have traditional knowledge of the ecosystem\n• They have a direct stake in the forest's survival\n• Government alone cannot monitor every area\n• Communities can enforce rules more effectively at local level\n\n(d) Two wildlife conservation projects:\n1. Project Tiger (launched 1973) — to protect the tiger\n2. Project Elephant — to protect elephant corridors and habitats"}
      ]

      short: [
        {q:"What are multipurpose river valley projects? What are their advantages and disadvantages?",a:"MULTIPURPOSE PROJECTS: Dams built across rivers for multiple purposes simultaneously.\n\nADVANTAGES:\n1. Irrigation — provide water to dry areas year-round\n2. Flood control — regulate river flow\n3. Hydroelectric power generation\n4. Navigation — reservoirs can be used for navigation\n5. Drinking water supply\n6. Recreation and tourism\n7. Inland fisheries development\n\nDISADVANTAGES (why Nehru's 'temple of modern India' view is questioned):\n1. Displacement of local communities — thousands displaced without proper rehabilitation\n2. Submerge agricultural land and forests\n3. Affect aquatic ecosystems\n4. Cause submergence of habitats and biodiversity\n5. Cause disputes between states over water sharing\n6. Cause earthquake risk (reservoir-induced seismicity)\n7. Increase in social inequalities — benefits not equally distributed\n\nNarmada Bachao Andolan challenged Sardar Sarovar Dam for these reasons."},
        {q:"What is rainwater harvesting? Describe any three traditional methods used in India.",a:"RAINWATER HARVESTING: The technique of collecting and storing rainwater at the point of rainfall or surface runoff to meet water demands.\n\nTRADITIONAL METHODS:\n\n1. TANKAS (Western Rajasthan): Underground cylindrical tanks to store rainwater collected from rooftops. Connected to rooftop by pipes. Water is clean and cool; used in drought. Found in most traditional houses in desert areas.\n\n2. BAMBOO DRIP IRRIGATION (Meghalaya): 200-year-old system. Bamboo pipes divert river/spring water to fields. Precise water delivery to plants. Used to grow black pepper.\n\n3. KULS/GULS (Western Himalayas): Diversion channels built in hilly areas to direct meltwater/stream water to terraced fields.\n\n4. BAOLIS/STEPWELLS: Ancient wells with steps, found in Rajasthan and Delhi. Store water in deep wells accessible year-round.\n\n5. ROOF-TOP HARVESTING (Tamil Nadu): Rainwater from rooftops channeled through pipes into storage tanks or used to recharge groundwater."},
        {q:"Explain water scarcity. What are its main causes in India?",a:"WATER SCARCITY: The shortage of water relative to the demand for it. It occurs when freshwater supply is insufficient to meet needs.\n\nMAIN CAUSES IN INDIA:\n1. LARGE AND GROWING POPULATION: More people require more water for drinking, cooking, sanitation AND food production\n2. OVER-EXPLOITATION: Excessive extraction of groundwater for irrigation → falling water tables\n3. UNEQUAL ACCESS: Water is available but not equally accessible to all social groups\n4. IRRIGATED AGRICULTURE: Largest consumer of water — uses enormous amounts for crops\n5. RAPID URBANISATION: More water needed for cities; paved surfaces reduce groundwater recharge\n6. POLLUTION: Rivers and groundwater polluted, reducing usable water supply\n7. SEASONAL VARIABILITY: Rainfall concentrated in monsoon; dry seasons face scarcity\n8. CLIMATE CHANGE: Changing rainfall patterns, melting glaciers affect water availability"}
      ],
      long: [
        {q:"Why are multipurpose projects controversial in India? Discuss with examples.",a:"Multipurpose projects are called 'Temples of Modern India' by Nehru — symbols of development. However, they are CONTROVERSIAL because:\n\nNEGATIVE IMPACTS:\n1. DISPLACEMENT: Sardar Sarovar Dam displaced 320,000 people (mainly tribal communities). Proper rehabilitation was not provided.\n\n2. FOREST AND HABITAT LOSS: Reservoirs submerge large areas of forest and wildlife habitats.\n\n3. AGRICULTURE LOSS: Fertile agricultural land submerged under water.\n\n4. ECOLOGICAL DAMAGE: Dams regulate natural flow → affect aquatic ecosystem, fish migration, change in flood plains.\n\n5. EARTHQUAKE RISK: Heavy water in reservoirs can trigger earthquakes (reservoir-induced seismicity).\n\n6. INTER-STATE DISPUTES: Kaveri water dispute between Karnataka and Tamil Nadu; Narmada dispute.\n\n7. SOCIAL INEQUALITIES: Benefits (electricity, irrigation) often go to urban areas and richer farmers, while poor displaced communities bear the costs.\n\nNARMADA BACHAO ANDOLAN:\nMedha Patkar led movement against Sardar Sarovar Dam → raised issues of displacement of tribal people and lack of proper rehabilitation.\n\nCONCLUSION: While dams provide benefits (irrigation, power, flood control), they must balance development with environmental and social justice. Greater community participation and proper rehabilitation are needed."}
      ],
      passage: [
        {q:"'In Rajasthan, nearly all the houses traditionally had underground tanks or tankas for storing drinking water. The tanks could be as large as a big room. The tanks were part of well-developed rooftop rainwater harvesting system. The tankas were built inside the main house, underground, to keep the water cool. The opening of the tank was kept covered.'\n\n(a) What are tankas? Where are they found?\n(b) Why was the opening of the tank kept covered?\n(c) Why was rainwater harvesting important in Rajasthan?\n(d) Name any two other traditional water harvesting methods in India.",a:"(a) Tankas are underground cylindrical tanks used to store rainwater collected from rooftops. They are found in the houses of western Rajasthan (desert regions like Barmer, Jaisalmer). They are part of a well-developed rooftop rainwater harvesting system.\n\n(b) The opening of the tank was kept covered to:\n• Prevent contamination of water by dust, insects and animals\n• Keep the water clean and cool (underground stays cooler)\n• Prevent evaporation of stored water\n\n(c) Rainwater harvesting was crucial in Rajasthan because:\n• It is a semi-arid/desert region with very low rainfall\n• Rivers and groundwater sources are scarce\n• During droughts, tankas were the only source of drinking water\n• People could survive months without other water sources\n\n(d) Two other traditional water harvesting methods:\n1. Kuls/Guls — diversion channels in the Western Himalayas\n2. Bamboo drip irrigation — in Meghalaya\n(OR: Baolis/stepwells in Rajasthan and Delhi; Johads in Rajasthan)"}
      ]

      short: [
        {q:"What is the difference between subsistence farming and commercial farming?",a:"SUBSISTENCE FARMING:\n• Farming primarily to meet the needs of the farmer's family\n• Uses primitive tools and family/community labour\n• Small land holdings\n• Low capital inputs\n• Examples: Primitive subsistence (jhumming), intensive subsistence farming\n• Output consumed by farmer; little or nothing sold\n\nCOMMERCIAL FARMING:\n• Farming primarily for selling in market\n• Uses modern technology — HYV seeds, chemical fertilisers, pesticides, machinery\n• Large land holdings\n• High capital investment\n• Different regions specialize in different crops based on suitability\n• Output is sold — profit-oriented\n• Examples: Rice and wheat farming in Punjab, cotton in Maharashtra, tea/coffee plantations\n\nKey difference: PURPOSE — subsistence for self-consumption; commercial for market sale."},
        {q:"What are kharif, rabi and zaid crops? Give two examples of each.",a:"KHARIF CROPS:\n• Season: Sown in June-July (beginning of monsoon), harvested September-October\n• Require: Warm climate, good rainfall\n• Examples: Rice, maize, jowar, bajra, cotton, sugarcane, groundnut, jute, soybean\n\nRABI CROPS:\n• Season: Sown in October-November, harvested March-April (winter)\n• Require: Cool growing season, warm and dry climate at ripening\n• Moisture available from winter rains (western disturbances)\n• Examples: Wheat, barley, peas, mustard, gram (chickpea)\n\nZAID CROPS:\n• Season: Short summer season between rabi and kharif (March-June)\n• Require: Irrigation (high temperature, long day length)\n• Examples: Watermelon, musk melon, cucumber, vegetables, fodder crops"},
        {q:"Describe the importance of rice cultivation in India.",a:"RICE — MOST IMPORTANT FOOD CROP:\n• Staple food for majority of Indians, especially in eastern, southern and north-eastern India\n• Kharif crop requiring: High temperature (above 25°C), high humidity, annual rainfall above 100 cm\n• Grown in water-logged conditions (paddy fields)\n\nMAJOR PRODUCING STATES:\nWest Bengal, Uttar Pradesh, Andhra Pradesh, Punjab, Tamil Nadu, Bihar, Odisha\n\nINNOVATIONS:\n• Green Revolution introduced HYV seeds → dramatic increase in production\n• Multiple cropping — 2-3 crops per year in some areas\n\nIMPORTANCE:\n• Provides food security for 1.4 billion people\n• Major employer in rural India\n• India is one of world's top producers and exporters\n• Cultural significance — central to food traditions of South and East India"},
        {q:"What is the Green Revolution? What were its advantages and disadvantages?",a:"GREEN REVOLUTION: Introduction of High Yielding Variety (HYV) seeds of wheat and rice in the 1960s-70s, combined with increased use of chemical fertilisers, pesticides and irrigation.\n\nADVANTAGES:\n1. Dramatic increase in food grain production (especially wheat and rice)\n2. India became self-sufficient in food grains\n3. Reduced dependence on food imports\n4. Increased farmers' income (initially)\n\nDISADVANTAGES:\n1. REGIONAL IMBALANCE: Benefits concentrated mainly in Punjab, Haryana and western UP\n2. ENVIRONMENTAL DAMAGE: Excessive use of chemical fertilisers and pesticides → soil and water pollution\n3. GROUNDWATER DEPLETION: Over-irrigation leading to falling water tables\n4. SOIL DEGRADATION: Continuous monoculture and chemicals reduced soil fertility\n5. SOCIAL INEQUALITY: Small farmers couldn't afford HYV inputs; benefits went to large farmers\n6. NEGLECT OF OTHER CROPS: Focus on wheat and rice; pulses, oilseeds neglected"}
