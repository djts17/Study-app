<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 Kids Study Adventure</title>
  
  <script src="math_questions_db.js"></script>
  <script src="science_questions_db.js"></script>
  <script src="social_hist_questions_db.js"></script>
  <script src="social_ci_questions_db.js"></script>
  <script src="social_dp_questions_db.js"></script>
  <script src="social_eco_questions_db.js"></script>
  <script src="english_ff_questions_db.js"></script>
  <script src="english_fp_questions_db.js"></script>
  <script src="english_we_questions_db.js"></script>
  <script src="hpe_questions_db.js"></script>

  <style>
    :root { 
      --primary: #6366f1; 
      --bg: #f0f9ff; 
      --success: #22c55e; 
      --danger: #ef4444; 
      --card-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }
    
    body { font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; color: #1e293b; margin: 0; }
    .container { max-width: 600px; margin: 0 auto; }
    
    h1 { text-align: center; color: var(--primary); text-shadow: 1px 1px 2px white; }
    
    /* Fun Animated Cards */
    .card { 
      background: white; padding: 20px; margin: 15px 0; border-radius: 20px; 
      border: 3px solid #e2e8f0; cursor: pointer; box-shadow: var(--card-shadow); 
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; overflow: hidden;
    }
    .card:hover { transform: scale(1.03); border-color: var(--primary); }
    .card:active { transform: scale(0.95); }

    .btn-back { 
      background: #f43f5e; color: white; border: none; padding: 12px 20px; 
      border-radius: 50px; cursor: pointer; margin-bottom: 15px; font-weight: bold;
      box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3);
    }

    .hidden { display: none; }
    
    /* Kid-Friendly MCQ Styles */
    .option { 
      border: 2px solid #cbd5e1; padding: 15px; margin: 10px 0; border-radius: 15px; 
      transition: 0.2s; font-weight: 600; background: #fff;
    }
    
    /* Interaction Feedback */
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .correct { 
      background: var(--success) !important; color: white; border-color: #15803d; 
      animation: pop 0.4s ease;
    }
    .correct::after { content: ' ✅ Awesome!'; font-size: 0.8em; }

    .wrong { 
      background: var(--danger) !important; color: white; border-color: #b91c1c; 
      animation: shake 0.3s;
    }
    .wrong::after { content: ' ❌ Try again!'; font-size: 0.8em; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .ans-box { 
      background: #fff9c4; padding: 15px; margin-top: 10px; border-radius: 15px; 
      display: none; border: 2px dashed #facc15; line-height: 1.6;
    }
    
    .show-btn { 
      background: var(--primary); color: white; border: none; padding: 12px 20px; 
      border-radius: 12px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <button id="backBtn" class="btn-back hidden" onclick="location.reload()">🏠 Go Home</button>
  
  <div id="subjectScreen"><h1>🌟 Pick a Mission!</h1></div>
  
  <div id="chapterScreen" class="hidden"></div>
  
  <div id="typeScreen" class="hidden"></div>
  
  <div id="questionScreen" class="hidden"></div>
</div>

<script>
  // FIXED SUBJECT MAPPING
  // Added extra safety checks for HPE and Math variable names
  const subjects = [
    { name: '📐 Mathematics', data: (window.QUESTIONS_DB || {}).mathematics },
    { name: '🧪 Science', data: (window.SCIENCE_QUESTIONS_DB || {}).science },
    { name: '📜 History', data: (window.SOCIAL_HIST_QUESTIONS_DB || {}).social_hist },
    { name: '🌍 Geography', data: (window.SOCIAL_CI_QUESTIONS_DB || {}).social_ci },
    { name: '⚖️ Civics', data: (window.SOCIAL_DP_QUESTIONS_DB || {}).social_dp },
    { name: '💰 Economics', data: (window.SOCIAL_ECO_QUESTIONS_DB || {}).social_eco },
    { name: '📖 English: First Flight', data: (window.ENGLISH_FF_QUESTIONS_DB || {}).english_ff },
    { name: '🐕 English: Footprints', data: (window.ENGLISH_FP_QUESTIONS_DB || {}).english_fp },
    { name: '✍️ English: Expressions', data: (window.ENGLISH_WE_QUESTIONS_DB || {}).english_we },
    { name: '👟 Health & Sports Ed', data: (window.HPE_QUESTIONS_DB || {}).hpe }
  ];

  let currentBook = null;
  let currentChapter = null;

  function init() {
    const screen = document.getElementById('subjectScreen');
    subjects.forEach(sub => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>${sub.name}</h3>`;
      div.onclick = () => { 
        if(!sub.data) {
          alert("Wait! The data for " + sub.name + " is still loading or missing. Check GitHub filenames.");
          return;
        }
        currentBook = sub.data; 
        showChapters(sub.name); 
      };
      screen.appendChild(div);
    });
  }

  function showChapters(name) {
    toggleScreen('chapterScreen');
    const screen = document.getElementById('chapterScreen');
    screen.innerHTML = `<h1>📍 ${name}</h1>`;
    Object.keys(currentBook).forEach(chap => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>${chap}</h3>`;
      div.onclick = () => { currentChapter = chap; showTypes(); };
      screen.appendChild(div);
    });
  }

  function showTypes() {
    toggleScreen('typeScreen');
    const screen = document.getElementById('typeScreen');
    const chapData = currentBook[currentChapter];
    screen.innerHTML = `<h1>🌈 ${currentChapter}</h1><p style="text-align:center">Choose your challenge:</p>`;
    
    // We check for 'mcq' and 'short' (some files use 'short', others 'theory')
    const typesAvailable = [];
    if(chapData.mcq) typesAvailable.push({id: 'mcq', label: '🎮 Multiple Choice'});
    if(chapData.short || chapData.passage) typesAvailable.push({id: 'short', label: '📖 Question & Answer'});

    typesAvailable.forEach(type => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>${type.label}</h3>`;
      div.onclick = () => loadQuestions(type.id);
      screen.appendChild(div);
    });
  }

  function loadQuestions(type) {
    toggleScreen('questionScreen');
    const screen = document.getElementById('questionScreen');
    // Safety check for math/science which use 'passage' vs others which use 'short'
    const questions = type === 'mcq' ? currentBook[currentChapter].mcq : (currentBook[currentChapter].short || currentBook[currentChapter].passage);
    
    screen.innerHTML = `<h1>🚀 Keep Going!</h1>`;

    questions.forEach((q, qIdx) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.style.cursor = 'default';
      div.innerHTML = `<p style="font-size:1.1em"><strong>Q${qIdx+1}:</strong> ${q.q}</p>`;

      if(type === 'mcq') {
        q.opts.forEach((opt, oIdx) => {
          const optDiv = document.createElement('div');
          optDiv.className = 'option';
          optDiv.id = `q${qIdx}o${oIdx}`;
          optDiv.textContent = opt;
          optDiv.onclick = () => checkMCQ(qIdx, oIdx, q.ans);
          div.appendChild(optDiv);
        });
      } else {
        div.innerHTML += `<button class="show-btn" onclick="this.nextElementSibling.style.display='block'; this.style.display='none'">💡 Reveal Secret Answer</button>
                          <div class="ans-box">${(q.a || "").replace(/\n/g, '<br>')}</div>`;
      }
      screen.appendChild(div);
    });
  }

  function checkMCQ(qIdx, selectedIdx, correctIdx) {
    const correctId = `q${qIdx}o${correctIdx}`;
    const selectedId = `q${qIdx}o${selectedIdx}`;
    
    // Show correct answer immediately
    document.getElementById(correctId).classList.add('correct');
    
    if(selectedIdx !== correctIdx) {
      document.getElementById(selectedId).classList.add('wrong');
    }
  }

  function toggleScreen(id) {
    document.querySelectorAll('.container > div').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.getElementById('backBtn').classList.remove('hidden');
    window.scrollTo(0,0);
  }

  init();
</script>
</body>
</html>
