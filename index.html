<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 Kids Study Adventure</title>
  
  <script src="math_questions_db.js"></script>
  <script src="science_questions_db.js"></script>
  <script src="social_hist_questions_db.js"></script>
  <script src="social_ci_questions_db.js"></script>
  <script src="social_dp_questions_db.js"></script>
  <script src="social_eco_questions_db.js"></script>
  <script src="english_ff_questions_db.js"></script>
  <script src="english_fp_questions_db.js"></script>
  <script src="english_we_questions_db.js"></script>
  <script src="hpe_questions_db.js"></script>

  <style>
    :root { 
      --primary: #6366f1; 
      --bg: #f8fafc; 
      --success: #22c55e; 
      --danger: #ef4444; 
    }
    
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 15px; color: #1e293b; line-height: 1.5; }
    .container { max-width: 600px; margin: 0 auto; }
    
    h1 { text-align: center; color: var(--primary); font-size: 1.8rem; margin-bottom: 20px; }
    
    /* Interactive Cards */
    .card { 
      background: white; padding: 20px; margin: 12px 0; border-radius: 16px; 
      border: 2px solid #e2e8f0; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
    }
    .card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .card:active { transform: scale(0.98); }

    .btn-back { 
      background: #64748b; color: white; border: none; padding: 10px 20px; 
      border-radius: 50px; cursor: pointer; margin-bottom: 15px; font-weight: bold;
    }

    .hidden { display: none; }
    
    /* MCQ Fun Styles */
    .option { 
      border: 1px solid #cbd5e1; padding: 14px; margin: 10px 0; border-radius: 12px; 
      transition: 0.3s; font-weight: 500; background: #fff;
    }
    
    /* Correct Answer Animation */
    @keyframes success-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); background-color: #dcfce7; }
      100% { transform: scale(1); }
    }

    .correct { 
      background: var(--success) !important; color: white; border-color: #15803d; 
      animation: success-pop 0.4s ease forwards;
    }

    /* Wrong Answer Shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .wrong { 
      background: var(--danger) !important; color: white; border-color: #b91c1c; 
      animation: shake 0.3s ease;
    }
    
    .ans-box { 
      background: #fef9c3; padding: 15px; margin-top: 10px; border-radius: 12px; 
      display: none; border-left: 5px solid #facc15; font-size: 0.95rem;
    }
    
    .show-btn { 
      background: var(--primary); color: white; border: none; padding: 10px 15px; 
      border-radius: 8px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: 600;
    }
  </style>
</head>
<body>

<div class="container">
  <button id="backBtn" class="btn-back hidden" onclick="location.reload()">⬅ Back to Menu</button>
  <div id="subjectScreen"><h1>📚 Select a Subject</h1></div>
  <div id="chapterScreen" class="hidden"></div>
  <div id="typeScreen" class="hidden"></div>
  <div id="questionScreen" class="hidden"></div>
</div>

<script>
  /** * SMART DATA CHECKER 
   * This function tries multiple ways to find the subject data 
   * even if the variable names in the .js files vary slightly.
   */
  function getSubjectData(name) {
    try {
      if (name === 'Mathematics') return (window.QUESTIONS_DB || {}).mathematics;
      if (name === 'Science') return (window.SCIENCE_QUESTIONS_DB || {}).science;
      if (name === 'History') return (window.SOCIAL_HIST_QUESTIONS_DB || {}).social_hist;
      if (name === 'Geography') return (window.SOCIAL_CI_QUESTIONS_DB || {}).social_ci;
      if (name === 'Civics') return (window.SOCIAL_DP_QUESTIONS_DB || {}).social_dp;
      if (name === 'Economics') return (window.SOCIAL_ECO_QUESTIONS_DB || {}).social_eco;
      if (name === 'English: First Flight') return (window.ENGLISH_FF_QUESTIONS_DB || {}).english_ff;
      if (name === 'English: Footprints') return (window.ENGLISH_FP_QUESTIONS_DB || {}).english_fp;
      if (name === 'English: Expressions') return (window.ENGLISH_WE_QUESTIONS_DB || {}).english_we;
      
      // THE HPE FIX: 
      // It checks both HPE_QUESTIONS_DB.hpe AND window.hpe just in case
      if (name === 'Health & Sports Ed') {
        return (window.HPE_QUESTIONS_DB && window.HPE_QUESTIONS_DB.hpe) ? window.HPE_QUESTIONS_DB.hpe : null;
      }
    } catch(e) { console.error("Error loading " + name, e); }
    return null;
  }

  const subjectList = [
    'Mathematics', 'Science', 'History', 'Geography', 'Civics', 
    'Economics', 'English: First Flight', 'English: Footprints', 
    'English: Expressions', 'Health & Sports Ed'
  ];

  let currentBook = null;
  let currentChapter = null;

  function init() {
    const screen = document.getElementById('subjectScreen');
    subjectList.forEach(subName => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>${subName}</h3>`;
      div.onclick = () => { 
        const data = getSubjectData(subName);
        if(!data) {
          alert("Data for " + subName + " is not ready. Please make sure the .js file is correctly uploaded to GitHub.");
          return;
        }
        currentBook = data; 
        showChapters(subName); 
      };
      screen.appendChild(div);
    });
  }

  function showChapters(name) {
    toggleScreen('chapterScreen');
    const screen = document.getElementById('chapterScreen');
    screen.innerHTML = `<h1>${name}</h1>`;
    Object.keys(currentBook).forEach(chap => {
      const div = document.createElement('div');
      div.className = 'card';
      div.textContent = chap;
      div.onclick = () => { currentChapter = chap; showTypes(); };
      screen.appendChild(div);
    });
  }

  function showTypes() {
    toggleScreen('typeScreen');
    const screen = document.getElementById('typeScreen');
    const chapData = currentBook[currentChapter];
    screen.innerHTML = `<h1>${currentChapter}</h1><p style="text-align:center">Select Question Type:</p>`;
    
    // Auto-detect available types
    const types = [];
    if(chapData.mcq) types.push('mcq');
    if(chapData.short) types.push('short');
    if(chapData.passage) types.push('passage');

    types.forEach(type => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<h3>${type.toUpperCase()} Questions</h3>`;
      div.onclick = () => loadQuestions(type);
      screen.appendChild(div);
    });
  }

  function loadQuestions(type) {
    toggleScreen('questionScreen');
    const screen = document.getElementById('questionScreen');
    const questions = currentBook[currentChapter][type];
    screen.innerHTML = `<h1>Ready? Go!</h1>`;

    questions.forEach((q, qIdx) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.style.cursor = 'default';
      div.innerHTML = `<p><strong>Q${qIdx+1}:</strong> ${q.q}</p>`;

      if(type === 'mcq') {
        q.opts.forEach((opt, oIdx) => {
          const optDiv = document.createElement('div');
          optDiv.className = 'option';
          optDiv.id = `q${qIdx}o${oIdx}`;
          optDiv.textContent = opt;
          optDiv.onclick = () => checkMCQ(qIdx, oIdx, q.ans);
          div.appendChild(optDiv);
        });
      } else {
        div.innerHTML += `<button class="show-btn" onclick="this.nextElementSibling.style.display='block'">👁 Reveal Answer</button>
                          <div class="ans-box">${(q.a || "").replace(/\n/g, '<br>')}</div>`;
      }
      screen.appendChild(div);
    });
  }

  function checkMCQ(qIdx, selectedIdx, correctIdx) {
    const selectedId = `q${qIdx}o${selectedIdx}`;
    const correctId = `q${qIdx}o${correctIdx}`;
    
    // Always highlight the correct one in green
    document.getElementById(correctId).classList.add('correct');
    
    // If user picked wrong, highlight theirs in red
    if(selectedIdx !== correctIdx) {
      document.getElementById(selectedId).classList.add('wrong');
    }
  }

  function toggleScreen(id) {
    document.getElementById('subjectScreen').classList.add('hidden');
    document.getElementById('chapterScreen').classList.add('hidden');
    document.getElementById('typeScreen').classList.add('hidden');
    document.getElementById('questionScreen').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
    document.getElementById('backBtn').classList.remove('hidden');
    window.scrollTo(0,0);
  }

  init();
</script>
</body>
</html>
